<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#0c1a3a" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Estrellas y luna -->
<circle cx="100" cy="62" r="18" fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
<path d="M100,62 m-18,0 a18,18 0 0,1 18,-18" fill="#1e3a5f" opacity="0.8"/>
<path d="M90,62 a10,10 0 0,0 20,0 Z" fill="#dbeafe" opacity="0.15"/>
<circle cx="65" cy="45" r="2.5" fill="#e2e8f0" opacity="0.9"/>
<circle cx="135" cy="42" r="2" fill="#e2e8f0" opacity="0.8"/>
<circle cx="50" cy="70" r="1.8" fill="#bae6fd" opacity="0.7"/>
<circle cx="148" cy="68" r="2.2" fill="#e2e8f0" opacity="0.85"/>
<circle cx="78" cy="38" r="1.5" fill="#bae6fd" opacity="0.6"/>
<circle cx="122" cy="85" r="1.8" fill="#e2e8f0" opacity="0.7"/>
<circle cx="155" cy="55" r="1.5" fill="#bae6fd" opacity="0.6"/>
<path d="M65,45 l1.5,4 l4,0 l-3,2.5 l1.5,4 l-4,-2.5 l-4,2.5 l1.5,-4 l-3,-2.5 l4,0 Z" fill="#fde68a" opacity="0.8" transform="scale(0.7) translate(28,18)"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#0c1a3a" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#eff6ff" opacity="0.95">"Mira las estrellas</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#eff6ff" opacity="0.95">y sueña en grande"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#93c5fd" letter-spacing="1" opacity="0.9">— Carl Sagan</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#93c5fd" letter-spacing="2" opacity="1">CIELO ESTRELLADO</text>
</svg>
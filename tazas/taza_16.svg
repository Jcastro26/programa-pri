<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#0a2436" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Coral marino -->
<path d="M80,100 L80,78 Q78,62 85,55 Q90,50 88,42 M80,78 Q70,65 65,58 M80,72 Q72,68 68,72" stroke="#0e7490" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M115,100 L115,75 Q117,60 110,52 Q106,47 108,40 M115,75 Q125,62 130,56 M115,70 Q122,65 126,70" stroke="#0891b2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<circle cx="88" cy="40" r="4" fill="#67e8f9" opacity="0.8"/>
<circle cx="108" cy="38" r="4" fill="#a5f3fc" opacity="0.8"/>
<ellipse cx="65" cy="56" rx="5" ry="3" fill="#22d3ee" opacity="0.7" transform="rotate(-30,65,56)"/>
<ellipse cx="132" cy="54" rx="5" ry="3" fill="#67e8f9" opacity="0.7" transform="rotate(30,132,54)"/>
<path d="M55,90 Q100,82 145,90" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#0a2436" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#cffafe" opacity="0.95">"La curiosidad es el</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#cffafe" opacity="0.95">motor de la ciencia"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#67e8f9" letter-spacing="1" opacity="0.9">— Marie Curie</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#67e8f9" letter-spacing="2" opacity="1">CORAL Y MAR</text>
</svg>
<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#1e1b4b" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Puente/ingeniería orgánico -->
<path d="M30,90 L170,90" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
<path d="M30,90 Q100,45 170,90" stroke="#818cf8" stroke-width="2.5" fill="none" opacity="0.8"/>
<line x1="60" y1="90" x2="72" y2="63" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
<line x1="85" y1="90" x2="93" y2="50" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
<line x1="100" y1="90" x2="100" y2="46" stroke="#c7d2fe" stroke-width="2" opacity="0.8"/>
<line x1="115" y1="90" x2="107" y2="50" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
<line x1="140" y1="90" x2="128" y2="63" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7"/>
<rect x="95" y="40" width="10" height="50" fill="#4f46e5" opacity="0.2"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#1e1b4b" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#e0e7ff" opacity="0.95">"La imaginación es más</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#e0e7ff" opacity="0.95">importante que el conocimiento"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#818cf8" letter-spacing="1" opacity="0.9">— Albert Einstein</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#818cf8" letter-spacing="2" opacity="1">INGENIERÍA</text>
</svg>
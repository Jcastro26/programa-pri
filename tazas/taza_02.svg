<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#0d2b4e" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Ballena jorobada orgánica -->
<path d="M40,90 Q55,55 85,52 Q115,49 135,65 Q150,75 145,90 Q138,100 120,97 Q90,100 65,95 Z" fill="#1d4ed8" opacity="0.85"/>
<path d="M135,68 Q155,50 165,58 Q158,70 142,72 Z" fill="#2563eb" opacity="0.8"/>
<circle cx="90" cy="65" r="3" fill="white" opacity="0.9"/>
<path d="M60,92 Q75,105 90,100 Q105,96 118,101" stroke="#93c5fd" stroke-width="1.5" fill="none" opacity="0.6"/>
<path d="M40,80 Q55,65 70,70" stroke="#bfdbfe" stroke-width="1" fill="none" opacity="0.5"/>
<ellipse cx="35" cy="85" rx="8" ry="3" fill="#60a5fa" opacity="0.4" transform="rotate(-20,35,85)"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#0d2b4e" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#dbeafe" opacity="0.95">"La educación es</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#dbeafe" opacity="0.95">el arma más poderosa"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#60a5fa" letter-spacing="1" opacity="0.9">— Nelson Mandela</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#60a5fa" letter-spacing="2" opacity="1">BALLENAS</text>
</svg>
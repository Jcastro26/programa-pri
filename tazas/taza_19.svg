<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#2c1810" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Cacao y café -->
<ellipse cx="85" cy="62" rx="14" ry="20" fill="#92400e" opacity="0.85"/>
<path d="M80,48 Q85,40 90,48" stroke="#b45309" stroke-width="2" fill="none"/>
<line x1="78" y1="55" x2="72" y2="52" stroke="#a16207" stroke-width="1.5" opacity="0.7"/>
<line x1="78" y1="62" x2="71" y2="62" stroke="#a16207" stroke-width="1.5" opacity="0.7"/>
<line x1="92" y1="55" x2="98" y2="52" stroke="#a16207" stroke-width="1.5" opacity="0.7"/>
<ellipse cx="120" cy="60" rx="10" ry="14" fill="#78350f" opacity="0.85"/>
<line x1="113" y1="53" x2="107" y2="50" stroke="#92400e" stroke-width="1.5" opacity="0.7"/>
<circle cx="120" cy="58" r="5" fill="#451a03" opacity="0.7"/>
<path d="M108,80 Q120,76 132,80 Q120,86 108,80 Z" fill="#fef3c7" opacity="0.6"/>
<path d="M60,90 Q75,84 90,88 Q85,96 60,90 Z" fill="#fde68a" opacity="0.4"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#2c1810" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#ffedd5" opacity="0.95">"El conocimiento es el único</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#ffedd5" opacity="0.95">bien que crece al darlo"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#fdba74" letter-spacing="1" opacity="0.9">— Sócrates</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#fdba74" letter-spacing="2" opacity="1">CACAO Y CAFÉ</text>
</svg>
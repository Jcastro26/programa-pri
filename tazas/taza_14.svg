<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#14301a" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Colibríes -->
<path d="M85,62 Q70,55 60,58 Q65,65 78,65 Z" fill="#059669" opacity="0.9"/>
<path d="M85,62 Q78,50 82,45 Q88,52 88,60 Z" fill="#047857" opacity="0.85"/>
<path d="M85,62 Q78,72 82,78 Q88,72 88,64 Z" fill="#065f46" opacity="0.8"/>
<circle cx="87" cy="62" r="5" fill="#34d399" opacity="0.9"/>
<circle cx="89" cy="60" r="1.5" fill="white" opacity="0.9"/>
<path d="M91,63 L108,62" stroke="#6b7280" stroke-width="1.5" opacity="0.7"/>
<path d="M115,55 Q100,48 90,52 Q92,60 103,62 Q110,62 115,55 Z" fill="#10b981" opacity="0.8"/>
<path d="M115,70 Q100,76 90,72 Q92,64 103,62 Q110,62 115,70 Z" fill="#6ee7b7" opacity="0.7"/>
<path d="M120,62 L140,58" stroke="#9ca3af" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#14301a" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#d1fae5" opacity="0.95">"Vuela alto; el cielo</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#d1fae5" opacity="0.95">no es el límite"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#34d399" letter-spacing="1" opacity="0.9">— Amelia Earhart</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#34d399" letter-spacing="2" opacity="1">COLIBRÍES</text>
</svg>
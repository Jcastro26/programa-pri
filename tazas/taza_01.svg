<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#0a3d6b" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Ríos serpenteantes -->
<path d="M30,90 Q55,60 80,75 Q105,90 130,65 Q155,40 165,55" stroke="#38bdf8" stroke-width="4" fill="none" opacity="0.9" stroke-linecap="round"/>
<path d="M25,105 Q50,80 75,92 Q100,104 125,82 Q145,63 160,72" stroke="#7dd3fc" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
<circle cx="55" cy="72" r="5" fill="#38bdf8" opacity="0.6"/>
<circle cx="110" cy="80" r="4" fill="#7dd3fc" opacity="0.5"/>
<ellipse cx="100" cy="78" rx="55" ry="28" fill="none" stroke="#bae6fd" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#0a3d6b" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#e0f2fe" opacity="0.95">"Los ríos son las</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#e0f2fe" opacity="0.95">venas de nuestra tierra"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#38bdf8" letter-spacing="1" opacity="0.9">— del Pacífico colombiano</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#38bdf8" letter-spacing="2" opacity="1">RÍOS DEL PACÍFICO</text>
</svg>
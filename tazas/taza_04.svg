<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#312e2b" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Formas geométricas orgánicas -->
<polygon points="100,35 130,65 100,95 70,65" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.8"/>
<circle cx="100" cy="65" r="22" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
<path d="M78,43 L122,87 M122,43 L78,87" stroke="#fde68a" stroke-width="1" opacity="0.5"/>
<polygon points="100,42 120,70 100,88 80,70" fill="#fbbf24" opacity="0.15"/>
<circle cx="100" cy="65" r="5" fill="#f59e0b" opacity="0.9"/>
<circle cx="78" cy="43" r="3" fill="#fbbf24" opacity="0.7"/>
<circle cx="122" cy="43" r="3" fill="#fbbf24" opacity="0.7"/>
<circle cx="78" cy="87" r="3" fill="#fbbf24" opacity="0.7"/>
<circle cx="122" cy="87" r="3" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#312e2b" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#fef3c7" opacity="0.95">"Las matemáticas son</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#fef3c7" opacity="0.95">el lenguaje del universo"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#fbbf24" letter-spacing="1" opacity="0.9">— Galileo Galilei</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#fbbf24" letter-spacing="2" opacity="1">GEOMETRÍA</text>
</svg>
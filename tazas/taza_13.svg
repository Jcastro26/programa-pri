<svg viewBox="0 0 200 145" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo semitransparente (la taza blanca provee el fondo real) -->
  <rect width="200" height="145" fill="#1f2937" opacity="0.12"/>

  <!-- Ilustración central -->
  <g transform="translate(0,-8)">
    <!-- Marimba -->
<rect x="55" y="55" width="10" height="35" rx="2" fill="#92400e" opacity="0.85"/>
<rect x="70" y="50" width="10" height="40" rx="2" fill="#b45309" opacity="0.85"/>
<rect x="85" y="45" width="10" height="45" rx="2" fill="#92400e" opacity="0.85"/>
<rect x="100" y="50" width="10" height="40" rx="2" fill="#b45309" opacity="0.85"/>
<rect x="115" y="55" width="10" height="35" rx="2" fill="#92400e" opacity="0.85"/>
<rect x="130" y="60" width="10" height="30" rx="2" fill="#b45309" opacity="0.85"/>
<circle cx="60" cy="52" r="4" fill="#fbbf24" opacity="0.8"/>
<circle cx="75" cy="46" r="4" fill="#f59e0b" opacity="0.8"/>
<circle cx="90" cy="41" r="4" fill="#fbbf24" opacity="0.8"/>
<circle cx="105" cy="46" r="4" fill="#f59e0b" opacity="0.8"/>
<circle cx="120" cy="51" r="4" fill="#fbbf24" opacity="0.8"/>
<circle cx="135" cy="56" r="4" fill="#f59e0b" opacity="0.8"/>
  </g>

  <!-- Logo PRI pequeño esquina superior derecha -->
  <image href="../logo.png" x="172" y="4" width="22" height="22"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior semitransparente para legibilidad del texto -->
  <rect x="0" y="96" width="200" height="49" fill="#1f2937" opacity="0.55" rx="0"/>

  <!-- Frase inspiradora — 2 líneas, tamaño legible -->
  <text x="100" y="109" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#fce7f3" opacity="0.95">"La música es el</text>
  <text x="100" y="121" text-anchor="middle"
        font-family="Georgia,serif" font-style="italic" font-size="9.5"
        fill="#fce7f3" opacity="0.95">lenguaje del alma educada"</text>
  <!-- Autor -->
  <text x="100" y="131" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="7.5"
        fill="#f9a8d4" letter-spacing="1" opacity="0.9">— Platón</text>
  <!-- Título del diseño -->
  <text x="100" y="141" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="10"
        fill="#f9a8d4" letter-spacing="2" opacity="1">MARIMBA</text>
</svg>
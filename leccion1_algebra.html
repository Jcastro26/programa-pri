<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lección 1 · Álgebra Básica — Programa PRI</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
/* ══════════════════════════════════════════
   BASE RESET & VARIABLES
══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#04080f;
  --card:#080f1e;
  --purple:#7c3aed;
  --purple-g:rgba(124,58,237,.6);
  --orange:#ff5e00;
  --orange-g:rgba(255,94,0,.5);
  --teal:#38bdf8;
  --teal-g:rgba(56,189,248,.5);
  --green:#10b981;
  --green-g:rgba(16,185,129,.5);
  --red:#ef4444;
  --text:#e8f4ff;
  --muted:#6b9ab8;
  --border:rgba(255,255,255,.07);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}

/* ══ PARTICLE CANVAS ══ */
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.15;}

/* ══ APP SHELL ══ */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;padding:1rem;gap:.75rem;max-width:860px;margin:0 auto;}

/* ══ TOPBAR ══ */
#topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}

/* ══ PROGRESS BAR ══ */
#prog-track{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:visible;position:relative;flex-shrink:0;}
#prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--purple),var(--orange),var(--teal));
  border-radius:3px;
  transition:width .65s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 14px var(--purple-g), 0 0 30px rgba(124,58,237,.25);
}
@keyframes prog-pulse{0%,100%{box-shadow:0 0 14px var(--purple-g);}50%{box-shadow:0 0 28px var(--purple-g),0 0 50px rgba(56,189,248,.25);}}
#prog-fill{animation:prog-pulse 2.5s ease-in-out infinite;}

/* ══ SLIDE CARD ══ */
@keyframes card-border-pulse{0%,100%{box-shadow:0 0 30px rgba(124,58,237,.08),inset 0 1px 0 rgba(255,255,255,.04);}50%{box-shadow:0 0 60px rgba(124,58,237,.18),0 0 100px rgba(56,189,248,.05),inset 0 1px 0 rgba(255,255,255,.06);}}
#slide-card{
  flex:1;
  background:rgba(8,15,30,.95);
  border:1px solid rgba(124,58,237,.28);
  border-radius:18px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:0;
  animation:card-border-pulse 3s ease-in-out infinite;
}
#slide-inner{flex:1;padding:2rem;overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-start;}

/* ══ NAV ══ */
#nav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-btn{
  background:rgba(124,58,237,.1);
  border:1px solid rgba(124,58,237,.3);
  color:var(--text);
  padding:.55rem 1.4rem;
  border-radius:10px;
  cursor:pointer;
  font-size:.82rem;
  font-weight:700;
  letter-spacing:.5px;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.nav-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,.25),transparent);
  transform:translateX(-100%);transition:transform .45s ease;
}
.nav-btn:hover:not(:disabled)::before{transform:translateX(100%);}
.nav-btn:hover:not(:disabled){
  background:rgba(124,58,237,.32);
  border-color:var(--purple);
  box-shadow:0 0 22px var(--purple-g);
  transform:translateY(-2px);
}
.nav-btn:disabled{opacity:.2;cursor:not-allowed;}

#dots{display:flex;gap:6px;align-items:center;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);cursor:pointer;transition:all .3s;}
.dot.active{background:var(--purple);transform:scale(1.5);box-shadow:0 0 10px var(--purple-g);}

/* ══ TYPOGRAPHY ══ */
.s-tag{font-size:.58rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);margin-bottom:.6rem;text-shadow:0 0 12px var(--teal-g);}
.s-title{font-size:1.75rem;font-weight:900;line-height:1.2;margin-bottom:.4rem;background:linear-gradient(120deg,#fff 30%,var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-sub{font-size:.88rem;color:var(--muted);margin-bottom:1.2rem;}

/* ══ FORMULA BOX ══ */
.formula{
  background:rgba(124,58,237,.1);
  border:1px solid rgba(124,58,237,.38);
  border-radius:12px;
  padding:.9rem 1.4rem;
  font-size:1.25rem;
  font-weight:700;
  text-align:center;
  color:#c4b5fd;
  font-family:'Courier New',monospace;
  margin:.9rem 0;
  box-shadow:0 0 24px rgba(124,58,237,.12),inset 0 1px 0 rgba(255,255,255,.04);
}

/* ══ STEPS ══ */
.step{display:flex;align-items:flex-start;gap:.7rem;margin:.45rem 0;font-size:.87rem;line-height:1.5;}
.step-n{min-width:26px;height:26px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:1px;box-shadow:0 0 12px var(--purple-g);}

.example{background:rgba(56,189,248,.06);border-left:3px solid var(--teal);padding:.7rem 1rem;border-radius:0 8px 8px 0;margin:.7rem 0;font-size:.87rem;box-shadow:inset 0 0 20px rgba(56,189,248,.03);}

/* ══ AREA (interactive zone) ══ */
.area{
  background:rgba(0,0,0,.28);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:1rem;
  margin:.8rem 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.7rem;
}

/* ══ SLIDER ROWS ══ */
.sl-row{display:flex;align-items:center;gap:.9rem;width:100%;max-width:380px;}
.sl-lbl{font-size:.75rem;color:var(--muted);min-width:18px;font-weight:700;}
input[type=range]{flex:1;accent-color:var(--purple);}
.sl-val{font-weight:900;color:var(--teal);min-width:22px;text-align:right;font-size:.9rem;text-shadow:0 0 10px var(--teal-g);}

/* ══ SUMMARY CARDS ══ */
.cards-grid{display:flex;flex-direction:column;gap:.7rem;margin-top:.5rem;}
.n-card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;
  padding:.9rem 1.1rem;
  cursor:pointer;
  transition:border-color .3s,box-shadow .3s,transform .15s;
}
.n-card:hover{
  border-color:rgba(124,58,237,.45);
  box-shadow:0 0 20px rgba(124,58,237,.12);
  transform:translateX(4px);
}
.n-name{font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:.35rem;text-shadow:0 0 10px var(--orange-g);}
.n-formula{font-family:'Courier New',monospace;font-size:.98rem;color:#c4b5fd;font-weight:600;}
.n-ex{font-size:.73rem;color:var(--muted);margin-top:.25rem;}

/* ══ QUIZ ══ */
.q-q{font-size:.93rem;font-weight:600;margin-bottom:.9rem;}
.q-opts{display:flex;flex-direction:column;gap:.45rem;}
.q-opt{
  padding:.65rem 1rem;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);cursor:pointer;font-size:.84rem;
  transition:all .2s;text-align:left;color:var(--text);
}
.q-opt:hover:not(.locked){background:rgba(124,58,237,.2);border-color:var(--purple);box-shadow:0 0 12px rgba(124,58,237,.2);}
.q-opt.ok{background:rgba(16,185,129,.18);border-color:var(--green);color:#a7f3d0;box-shadow:0 0 16px rgba(16,185,129,.2);}
.q-opt.bad{background:rgba(239,68,68,.14);border-color:var(--red);color:#fca5a5;}
.q-fb{margin-top:.65rem;font-size:.82rem;padding:.5rem .75rem;border-radius:8px;display:none;}
.q-fb.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#a7f3d0;display:block;}
.q-fb.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;display:block;}
details summary{color:#a78bfa;font-size:.84rem;cursor:pointer;margin-top:.35rem;}
details div{color:#86efac;margin-top:.25rem;}

/* ══ FACTOR COMÚN INTERACTIVE ══ */
.eq-block{
  padding:.4rem .9rem;
  border-radius:8px;
  font-family:'Courier New',monospace;
  font-weight:800;
  font-size:1.15rem;
  display:inline-block;
  cursor:pointer;
  transition:transform .15s, filter .15s;
  user-select:none;
}
.eq-block:hover{transform:scale(1.1);filter:brightness(1.35);}
.eq-block:active{transform:scale(.95);}
.eq-block.term1{background:rgba(124,58,237,.22);border:1.5px solid #7c3aed;color:#c4b5fd;box-shadow:0 0 14px rgba(124,58,237,.28);}
.eq-block.term2{background:rgba(56,189,248,.16);border:1.5px solid #38bdf8;color:#7dd3fc;box-shadow:0 0 14px rgba(56,189,248,.25);}
.eq-block.factor{background:rgba(16,185,129,.22);border:1.5px solid #10b981;color:#6ee7b7;box-shadow:0 0 14px rgba(16,185,129,.28);}
.eq-op{color:var(--muted);font-size:1.2rem;margin:0 .25rem;font-weight:300;font-family:monospace;}
</style>
</head>
<body>

<!-- Floating math particle canvas -->
<canvas id="particle-canvas"></canvas>

<div id="app">
  <div id="topbar">
    <span style="font-size:.6rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;">PROGRAMA·PRI · MATEMÁTICAS</span>
    <span id="counter" style="font-size:.7rem;color:var(--muted);letter-spacing:.5px;">1 / 6</span>
  </div>
  <div id="prog-track"><div id="prog-fill" style="width:16.67%;"></div></div>
  <div id="slide-card"><div id="slide-inner"></div></div>
  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>← Anterior</button>
    <div id="dots"></div>
    <button class="nav-btn" id="btn-next" onclick="go(1)">Siguiente →</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════
   PARTICLE CANVAS — símbolos matemáticos flotantes
════════════════════════════════════════════════ */
(function initParticles(){
  const cv = document.getElementById('particle-canvas');
  const ctx = cv.getContext('2d');
  const syms = ['x','y','a','b','²','³','√','∑','π','÷','×','+','−','=','(',')','^','∞','n','k'];
  const cols = ['#7c3aed','#38bdf8','#10b981','#ff5e00','#a78bfa'];
  const P = [];

  function resize(){ cv.width = window.innerWidth; cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for(let i=0;i<40;i++) P.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx: (Math.random()-.5)*.35,
    vy: -(Math.random()*.45+.08),
    s: syms[Math.floor(Math.random()*syms.length)],
    sz: 10+Math.random()*16,
    a: .2+Math.random()*.65,
    c: cols[Math.floor(Math.random()*cols.length)],
    rot: Math.random()*Math.PI*2,
    rv: (Math.random()-.5)*.012
  });

  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv;
      if(p.y<-30){p.y=cv.height+20; p.x=Math.random()*cv.width;}
      if(p.x<-20) p.x=cv.width+20;
      if(p.x>cv.width+20) p.x=-20;
      ctx.save();
      ctx.globalAlpha=p.a;
      ctx.fillStyle=p.c;
      ctx.font=`bold ${p.sz}px Courier New`;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillText(p.s,0,0);
      ctx.restore();
    });
    requestAnimationFrame(tick);
  })();
})();

/* ════════════════════════════════════════════════
   PARTICLE BURST — explosión de partículas
════════════════════════════════════════════════ */
function burst(el, color, count){
  count = count||12;
  if(!el||!el.getBoundingClientRect) return;
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    const sz=3+Math.random()*7;
    p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${color};border-radius:50%;pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%);`;
    document.body.appendChild(p);
    const ang=Math.random()*Math.PI*2;
    const d=35+Math.random()*75;
    gsap.to(p,{
      x:Math.cos(ang)*d, y:Math.sin(ang)*d-Math.random()*25,
      opacity:0, scale:0,
      duration:.5+Math.random()*.45,
      ease:'power2.out',
      onComplete:()=>p.remove()
    });
  }
}

/* ════════════════════════════════════════════════
   CORE STATE
════════════════════════════════════════════════ */
const TOTAL=6;
let cur=0, busy=false;
const qAns=[null,null,null];
let _fcExploded=false;

const quiz=[
  {q:'¿Cuál es la factorización correcta de x² − 49?',
   opts:['(x−7)(x−7)','(x+7)(x−7)','(x+49)(x−1)','No factoriza'],ok:1,
   fb:'x²−49 = x²−7² → diferencia de cuadrados = (x+7)(x−7)'},
  {q:'Factoriza completamente: 15a² − 5a',
   opts:['5a(3a−1)','5(3a²−a)','15a(a−1)','a(15a−5)'],ok:0,
   fb:'MCD(15a², 5a) = 5a → 5a(3a−1) ✓'},
  {q:'¿Qué tipo de factorización es x² + 10x + 25 = (x+5)²?',
   opts:['Diferencia de cuadrados','Factor común','Trinomio cuadrado perfecto','Factorización imposible'],ok:2,
   fb:'√(x²)=x, √25=5, y 2·x·5=10x ✓ → trinomio cuadrado perfecto (x+5)²'}
];

/* ════════════════════════════════════════════════
   NAVEGACIÓN
════════════════════════════════════════════════ */
function go(dir){
  if(busy) return;
  const nxt=cur+dir;
  if(nxt<0||nxt>=TOTAL) return;
  busy=true;
  _fcExploded=false; // reset state entre slides
  const el=document.getElementById('slide-inner');
  gsap.to(el,{opacity:0,x:dir<0?65:-65,scale:.94,duration:.28,ease:'power3.in',onComplete:()=>{
    cur=nxt; updateUI(); render();
    gsap.fromTo(el,
      {opacity:0,x:dir<0?-65:65,scale:.94},
      {opacity:1,x:0,scale:1,duration:.38,ease:'power3.out',onComplete:()=>{animate();busy=false;}}
    );
  }});
}

function updateUI(){
  document.getElementById('counter').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width=`${((cur+1)/TOTAL)*100}%`;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===TOTAL-1;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
}

function makeDots(){
  const c=document.getElementById('dots');
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.onclick=()=>{if(!busy){const dir=i-cur;if(!dir)return;cur=i-dir;go(dir);}};
    c.appendChild(d);
  }
}

function render(){
  const el=document.getElementById('slide-inner');
  [s0,s1,s2,s3,s4,s5][cur](el);
}
function animate(){
  [a0,a1,a2,a3,a4,a5][cur]();
}

/* ════════════════════════════════════════════════
   SLIDE 0 — INTRO: letras caen letra a letra
════════════════════════════════════════════════ */
function s0(el){
  const letters=Array.from('ÁLGEBRA BÁSICA');
  el.innerHTML=`
<div style="text-align:center;padding:.4rem 0;">
  <div class="s-tag">Lección 1 · Matemáticas ICFES</div>
  <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:0;margin-bottom:.4rem;" id="title-wrap">
    ${letters.map((c,i)=>`<span id="tl${i}" style="display:inline-block;font-size:${c===' '?'.4rem':'2rem'};font-weight:900;${c===' '?'width:.55rem;':''}background:linear-gradient(135deg,#fff 30%,#38bdf8 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${c}</span>`).join('')}
  </div>
  <div class="s-sub" id="sub0">Factorización visual y productos notables</div>
  <div id="ico-row" style="display:flex;gap:1.2rem;justify-content:center;align-items:center;margin:1rem 0;font-size:2rem;">
    <span id="ic0" style="display:inline-block;">🔢</span>
    <span id="ic1" style="display:inline-block;">✖️</span>
    <span id="ic2" style="display:inline-block;">📐</span>
  </div>
  <div id="obj-box" style="background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.28);border-radius:14px;padding:1.1rem 1.3rem;max-width:460px;margin:0 auto;text-align:left;">
    <div style="font-size:.58rem;font-weight:700;letter-spacing:2px;color:#a78bfa;margin-bottom:.65rem;">🎯 OBJETIVOS DE LA LECCIÓN</div>
    ${['Entender qué significa factorizar una expresión','Aplicar los 3 productos notables del ICFES','Visualizar la geometría detrás de cada fórmula','Verificar tu aprendizaje con el mini quiz final'].map((o,i)=>`<div class="obj" id="ob${i}" style="display:flex;gap:.55rem;align-items:flex-start;margin:.35rem 0;font-size:.82rem;color:#c4b5fd;"><span style="color:var(--teal);flex-shrink:0;">✦</span><span>${o}</span></div>`).join('')}
  </div>
</div>`;
}

function a0(){
  const letters=Array.from('ÁLGEBRA BÁSICA');
  const tl=gsap.timeline();
  // Letras caen desde arriba con bounce, escalonadas
  letters.forEach((c,i)=>{
    if(c!==' '){
      tl.from(`#tl${i}`,{
        y:-130, rotation:(Math.random()-.5)*40, scale:.3, opacity:0,
        duration:.55, ease:'bounce.out'
      }, i*.04);
    }
  });
  tl.from('#sub0',{y:-25,opacity:0,duration:.4,ease:'power2.out'},'-=.25')
    .from('#ic0',{y:-90,rotation:-35,opacity:0,duration:.6,ease:'elastic.out(1,.45)'},'-=.2')
    .from('#ic1',{y:-90,rotation:25,opacity:0,duration:.6,ease:'elastic.out(1,.45)'},'<.1')
    .from('#ic2',{y:-90,rotation:-20,opacity:0,duration:.6,ease:'elastic.out(1,.45)'},'<.1')
    .from(['#ob0','#ob1','#ob2','#ob3'],{x:-50,opacity:0,duration:.42,stagger:.13,ease:'back.out(2.5)'},'-=.15');
}

/* ════════════════════════════════════════════════
   SLIDE 1 — FACTOR COMÚN: explosión interactiva
════════════════════════════════════════════════ */
function s1(el){
  _fcExploded=false;
  el.innerHTML=`
<div>
  <div class="s-tag">Técnica 1 de 3 · Interactiva — ¡haz clic!</div>
  <div class="s-title" id="t1">Factor Común</div>
  <div class="s-sub">Extrae el factor que comparten todos los términos</div>

  <div class="area" id="ar1" style="min-height:120px;">
    <div id="fc-eq" style="display:flex;align-items:center;justify-content:center;gap:.3rem;flex-wrap:wrap;padding:.5rem;">
      <span class="eq-block term1" id="fc-t1" onclick="explodeFC()">6x²</span>
      <span class="eq-op" id="fc-op">+</span>
      <span class="eq-block term2" id="fc-t2" onclick="explodeFC()">9x</span>
      <span class="eq-op" id="fc-sign" style="opacity:0;">=</span>
      <span class="eq-block factor" id="fc-factor" style="opacity:0;" onclick="implodeFC()">3x</span>
      <span id="fc-rem" style="opacity:0;color:#c4b5fd;font-family:monospace;font-weight:700;font-size:1.1rem;">(2x + 3)</span>
    </div>
    <div id="fc-hint" style="font-size:.72rem;color:var(--muted);text-align:center;">👆 Haz clic en <strong style="color:#c4b5fd;">6x²</strong> o <strong style="color:#7dd3fc;">9x</strong> para factorizar</div>
    <div id="fc-mcd" style="display:none;font-size:.78rem;color:#86efac;text-align:center;">✅ MCD(6x², 9x) = <strong>3x</strong> — haz clic en <strong style="color:#6ee7b7;">3x</strong> para revertir</div>
  </div>

  <div id="st1" class="step"><div class="step-n">1</div><div><strong>Identifica los factores de cada término:</strong><br><span style="color:#a78bfa;">6x²</span> = 2·3·x·x &nbsp;&nbsp;&nbsp; <span style="color:#38bdf8;">9x</span> = 3·3·x</div></div>
  <div id="st2" class="step"><div class="step-n">2</div><div><strong>Halla el MCD:</strong> El factor común de 6x² y 9x es <span style="color:#10b981;font-weight:700;font-size:1.05rem;">3x</span></div></div>
  <div id="st3" class="step"><div class="step-n">3</div><div><strong>Divide cada término por 3x:</strong><br>6x²÷3x = <span style="color:#a78bfa;">2x</span> &nbsp;·&nbsp; 9x÷3x = <span style="color:#38bdf8;">3</span><br>∴ 6x² + 9x = <span style="color:#10b981;font-weight:700;">3x</span>(<span style="color:#a78bfa;">2x</span> + <span style="color:#38bdf8;">3</span>)</div></div>
  <div class="example" id="e1"><div style="font-size:.58rem;font-weight:700;letter-spacing:2px;color:var(--teal);margin-bottom:.35rem;">⚡ TU TURNO</div><strong>Factoriza:</strong> 12a³ + 8a² − 4a<details><summary>Ver respuesta</summary><div>= 4a(3a² + 2a − 1)</div></details></div>
</div>`;
}

function explodeFC(){
  if(_fcExploded) return;
  _fcExploded=true;
  const t1=document.getElementById('fc-t1');
  const t2=document.getElementById('fc-t2');
  const factor=document.getElementById('fc-factor');
  const rem=document.getElementById('fc-rem');
  const sign=document.getElementById('fc-sign');
  const hint=document.getElementById('fc-hint');
  const mcd=document.getElementById('fc-mcd');

  burst(t1,'#7c3aed',14);
  burst(t2,'#38bdf8',14);

  gsap.timeline()
    // Términos vibran y se separan
    .to([t1,t2],{scale:1.25,rotation:5,duration:.08,yoyo:true,repeat:5,ease:'none'})
    .to(t1,{x:-22,y:-18,scale:.88,duration:.32,ease:'power2.out'})
    .to(t2,{x:22,y:-18,scale:.88,duration:.32,ease:'power2.out'},'<')
    // El factor emerge del centro con elastic
    .to(factor,{opacity:1,scale:1,duration:.55,ease:'elastic.out(1,.45)',
      onStart:()=>{ gsap.set(factor,{scale:0}); }})
    .to(sign,{opacity:1,duration:.3},'-=.2')
    .to(rem,{opacity:1,duration:.35},'-=.15')
    // Términos vuelven a su lugar
    .to(t1,{x:0,y:0,scale:1,duration:.42,ease:'back.out(2)'},'-=.2')
    .to(t2,{x:0,y:0,scale:1,duration:.42,ease:'back.out(2)'},'<')
    .call(()=>{
      mcd.style.display='block';
      hint.style.display='none';
      gsap.from(mcd,{y:8,opacity:0,duration:.3});
    });
}

function implodeFC(){
  if(!_fcExploded){ explodeFC(); return; }
  _fcExploded=false;
  const factor=document.getElementById('fc-factor');
  const rem=document.getElementById('fc-rem');
  const sign=document.getElementById('fc-sign');
  const t1=document.getElementById('fc-t1');
  const t2=document.getElementById('fc-t2');
  const hint=document.getElementById('fc-hint');
  const mcd=document.getElementById('fc-mcd');

  burst(factor,'#10b981',10);

  gsap.timeline()
    .to([rem,sign],{opacity:0,x:10,duration:.22,stagger:.05,ease:'power2.in'})
    .to(factor,{opacity:0,scale:0,rotation:-30,duration:.3,ease:'back.in(2)'})
    .to([t1,t2],{scale:1.1,duration:.2,ease:'power2.out'})
    .to([t1,t2],{scale:1,duration:.4,ease:'elastic.out(1,.5)'})
    .call(()=>{
      _fcExploded=false;
      mcd.style.display='none';
      hint.style.display='block';
    });
}

function renderQ(i){
  if(i>=quiz.length){setTimeout(showScore,400);return;}
  const q=quiz[i];
  const w=document.getElementById('q-wrap');
  if(!w)return;
  w.innerHTML=`

  gsap.from('.q-opt',{y:18,opacity:0,duration:.32,stagger:.08,ease:'back.out(2)'});

function ansQ(qi,oi){
  if(qAns[qi]!==null)return;
  qAns[qi]=oi;
  const q=quiz[qi];
  const isOk=oi===q.ok;
  document.querySelectorAll(`#qo${qi} .q-opt`).forEach((b,i)=>{
    b.classList.add('locked');b.style.pointerEvents='none';
    if(i===q.ok)b.classList.add('ok');
    else if(i===oi)b.classList.add('bad');
  });
  const fb=document.getElementById(`qf${qi}`);
  if(fb){fb.className='q-fb '+(isOk?'ok':'bad');fb.textContent=(isOk?'✅ ':'❌ ')+q.fb;}

  if(isOk){
    const btn=document.getElementById(`qo${qi}-${oi}`);
    if(btn){
      burst(btn,'#10b981',18);
      gsap.from(btn,{scale:1.15,duration:.4,ease:'elastic.out(1,.4)'});
    }
  } else {
    const btn=document.getElementById(`qo${qi}-${oi}`);
    if(btn) gsap.to(btn,{keyframes:[{x:-6},{x:6},{x:-4},{x:4},{x:0}],duration:.45,ease:'none'});
  }

  setTimeout(()=>renderQ(qi+1),2200);
}

function showScore(){
  const ok=qAns.filter((a,i)=>a===quiz[i].ok).length;
  const pct=Math.round(ok/quiz.length*100);
  const w=document.getElementById('q-wrap');
  const f=document.getElementById('q-final');
  if(w)w.innerHTML='';
  if(f){
    f.style.display='block';
    const e=pct===100?'🏆':pct>=66?'⭐':'📚';
    const m=pct===100?'¡Perfecto! Dominas esta lección.':pct>=66?'¡Bien! Sigue practicando.':'Repasa la lección e intenta de nuevo.';
    document.getElementById('q-score').textContent=`${e} ${ok}/${quiz.length}`;
    document.getElementById('q-msg').textContent=m;
    gsap.from('#q-final',{scale:.55,rotation:-8,opacity:0,duration:.75,ease:'elastic.out(1,.42)'});

    // Lluvia de partículas si es perfecto
    if(pct===100){
      const cols=['#7c3aed','#38bdf8','#10b981','#ff5e00','#fbbf24'];
      for(let i=0;i<28;i++){
        setTimeout(()=>{
          const proxy={getBoundingClientRect:()=>({left:window.innerWidth*.3+Math.random()*window.innerWidth*.4,top:window.innerHeight*.25,width:0,height:0})};
          burst(proxy,cols[i%cols.length],5);
        },i*90);
      }
    }
  }
}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lección 1 · Álgebra Básica — Programa PRI</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg: #06101f;
  --card: #0d1e38;
  --card2: #0a1829;
  --purple: #7c3aed;
  --purple-soft: rgba(124,58,237,.15);
  --orange: #ff5e00;
  --teal: #38bdf8;
  --green: #10b981;
  --red: #ef4444;
  --text: #e8f4ff;
  --muted: #6b9ab8;
  --border: rgba(255,255,255,.09);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;padding:1rem;gap:.75rem;max-width:860px;margin:0 auto;}
#topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#prog-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--orange));border-radius:2px;transition:width .5s ease;}
#slide-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
#slide-inner{flex:1;padding:2rem;overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-start;}
#nav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);padding:.55rem 1.4rem;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;letter-spacing:.4px;transition:all .2s;}
.nav-btn:hover:not(:disabled){background:var(--purple);border-color:var(--purple);transform:translateY(-1px);}
.nav-btn:disabled{opacity:.25;cursor:not-allowed;}
#dots{display:flex;gap:6px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s;}
.dot.active{background:var(--purple);transform:scale(1.4);}
.s-tag{font-size:.58rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);margin-bottom:.6rem;}
.s-title{font-size:1.75rem;font-weight:900;line-height:1.2;margin-bottom:.4rem;background:linear-gradient(120deg,#fff 30%,var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-sub{font-size:.88rem;color:var(--muted);margin-bottom:1.2rem;}
.formula{background:var(--purple-soft);border:1px solid rgba(124,58,237,.35);border-radius:12px;padding:.9rem 1.4rem;font-size:1.3rem;font-weight:700;text-align:center;color:#c4b5fd;font-family:'Courier New',monospace;margin:.9rem 0;}
.step{display:flex;align-items:flex-start;gap:.7rem;margin:.45rem 0;font-size:.87rem;line-height:1.5;}
.step-n{min-width:26px;height:26px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:1px;}
.example{background:rgba(56,189,248,.07);border-left:3px solid var(--teal);padding:.7rem 1rem;border-radius:0 8px 8px 0;margin:.7rem 0;font-size:.87rem;}
.area{background:rgba(0,0,0,.25);border-radius:12px;padding:1rem;margin:.8rem 0;display:flex;flex-direction:column;align-items:center;gap:.7rem;}
.sl-row{display:flex;align-items:center;gap:.9rem;width:100%;max-width:380px;}
.sl-lbl{font-size:.75rem;color:var(--muted);min-width:18px;}
input[type=range]{flex:1;accent-color:var(--purple);}
.sl-val{font-weight:700;color:var(--teal);min-width:22px;text-align:right;font-size:.85rem;}
.cards-grid{display:flex;flex-direction:column;gap:.7rem;margin-top:.5rem;}
.n-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;}
.n-name{font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:.35rem;}
.n-formula{font-family:'Courier New',monospace;font-size:.98rem;color:#c4b5fd;font-weight:600;}
.n-ex{font-size:.73rem;color:var(--muted);margin-top:.25rem;}
.q-q{font-size:.93rem;font-weight:600;margin-bottom:.9rem;}
.q-opts{display:flex;flex-direction:column;gap:.45rem;}
.q-opt{padding:.6rem 1rem;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);cursor:pointer;font-size:.84rem;transition:all .2s;text-align:left;color:var(--text);display:flex;align-items:center;gap:.65rem;}
.q-opt:hover:not(.locked){background:rgba(124,58,237,.2);border-color:var(--purple);}
.q-opt.ok{background:rgba(16,185,129,.18);border-color:var(--green);color:#a7f3d0;}
.q-opt.bad{background:rgba(239,68,68,.14);border-color:var(--red);color:#fca5a5;}
.q-fb{margin-top:.65rem;font-size:.82rem;padding:.5rem .75rem;border-radius:8px;display:none;}
.q-fb.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#a7f3d0;display:block;}
.q-fb.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;display:block;}
details summary{color:#a78bfa;font-size:.84rem;cursor:pointer;margin-top:.35rem;}
details div{color:#86efac;margin-top:.25rem;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span style="font-size:.6rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.22);text-transform:uppercase;">PROGRAMA·PRI · MATEMÁTICAS</span>
    <span id="counter" style="font-size:.7rem;color:var(--muted);letter-spacing:.5px;">1 / 6</span>
  </div>
  <div id="prog-track"><div id="prog-fill" style="width:16.67%;"></div></div>
  <div id="slide-card"><div id="slide-inner"></div></div>
  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>← Anterior</button>
    <div id="dots"></div>
    <button class="nav-btn" id="btn-next" onclick="go(1)">Siguiente →</button>
  </div>
</div>

<script>
const TOTAL = 6;
let cur = 0, busy = false;
const qAns = [null,null,null];

const quiz = [
  {q:'¿Cuál es la factorización correcta de x² − 49?',opts:['(x−7)(x−7)','(x+7)(x−7)','(x+49)(x−1)','No factoriza'],ok:1,fb:'x²−49 = x²−7² → diferencia de cuadrados = (x+7)(x−7)'},
  {q:'Factoriza completamente: 15a² − 5a',opts:['5a(3a−1)','5(3a²−a)','15a(a−1)','a(15a−5)'],ok:0,fb:'MCD(15a², 5a) = 5a → 5a(3a−1) ✓'},
  {q:'¿Qué tipo de factorización es x² + 10x + 25 = (x+5)²?',opts:['Diferencia de cuadrados','Factor común','Trinomio cuadrado perfecto','Factorización imposible'],ok:2,fb:'√(x²)=x, √25=5, y 2·x·5=10x ✓ → trinomio cuadrado perfecto (x+5)²'}
];

function render(){
  const el = document.getElementById('slide-inner');
  const renders = [s0,s1,s2,s3,s4,s5];
  renders[cur](el);
}

function animate(){
  const fns = [a0,a1,a2,a3,a4,a5];
  fns[cur]();
}

function go(dir){
  if(busy) return;
  const nxt = cur+dir;
  if(nxt<0||nxt>=TOTAL) return;
  busy=true;
  const el=document.getElementById('slide-inner');
  gsap.to(el,{opacity:0,x:dir<0?50:-50,duration:.28,ease:'power2.in',onComplete:()=>{
    cur=nxt; updateUI(); render();
    gsap.fromTo(el,{opacity:0,x:dir<0?-50:50},{opacity:1,x:0,duration:.35,ease:'power2.out',onComplete:()=>{animate();busy=false;}});
  }});
}

function updateUI(){
  document.getElementById('counter').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width=`${((cur+1)/TOTAL)*100}%`;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===TOTAL-1;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active',i===cur);
  });
}

function makeDots(){
  const c=document.getElementById('dots');
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.onclick=()=>{if(!busy){const dir=i-cur;if(dir===0)return;cur=i-dir;go(dir);}};
    c.appendChild(d);
  }
}

function s0(el){
  el.innerHTML=`
<div style="text-align:center;padding:.5rem 0;">
  <div class="s-tag">Lección 1 · Matemáticas ICFES</div>
  <div class="s-title" id="t0" style="font-size:2rem;">Álgebra Básica</div>
  <div class="s-sub" id="sub0">Factorización visual y productos notables</div>
  <div id="ico0" style="font-size:2.4rem;margin:1.2rem 0;">🔢 ✖️ 📐</div>
  <div id="obj0" style="background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.28);border-radius:14px;padding:1.1rem 1.3rem;max-width:460px;margin:0 auto;text-align:left;">
    <div style="font-size:.58rem;font-weight:700;letter-spacing:2px;color:#a78bfa;margin-bottom:.65rem;">🎯 OBJETIVOS</div>
    ${['Entender qué significa factorizar una expresión','Aplicar los 3 productos notables del ICFES','Visualizar la geometría detrás de las fórmulas','Verificar tu aprendizaje con un mini quiz'].map(o=>`<div class="obj" style="display:flex;gap:.55rem;align-items:flex-start;margin:.35rem 0;font-size:.82rem;color:#c4b5fd;">✦ <span>${o}</span></div>`).join('')}
  </div>
</div>`;
}
function a0(){
  gsap.timeline()
    .from('#t0',{y:-35,opacity:0,duration:.6,ease:'power3.out'})
    .from('#sub0',{y:-18,opacity:0,duration:.4},'-=.2')
    .from('#ico0',{scale:.2,opacity:0,duration:.5,ease:'back.out(2)'},'-=.1')
    .from('.obj',{x:-25,opacity:0,duration:.4,stagger:.12,ease:'power2.out'});
}

function s1(el){
  el.innerHTML=`
<div>
  <div class="s-tag">Técnica 1 de 3</div>
  <div class="s-title" id="t1">Factor Común</div>
  <div class="s-sub">Extraer el factor que comparten todos los términos</div>
  <div class="formula" id="f1">6x² + 9x = 3x(2x + 3)</div>
  <div id="st1" class="step"><div class="step-n">1</div><div><strong>Identifica los factores de cada término:</strong><br><span style="color:#a78bfa;">6x²</span> = 2·3·x·x &nbsp;&nbsp; <span style="color:#38bdf8;">9x</span> = 3·3·x</div></div>
  <div id="st2" class="step"><div class="step-n">2</div><div><strong>Halla el MCD:</strong><br>El factor común entre 6x² y 9x es <span style="color:#10b981;font-weight:700;font-size:1.05rem;">3x</span></div></div>
  <div id="st3" class="step"><div class="step-n">3</div><div><strong>Divide y reescribe:</strong><br>6x²÷3x = <span style="color:#a78bfa;">2x</span> &nbsp; 9x÷3x = <span style="color:#38bdf8;">3</span><br>∴ 6x² + 9x = <span style="color:#10b981;font-weight:700;">3x</span>(<span style="color:#a78bfa;">2x</span>+<span style="color:#38bdf8;">3</span>)</div></div>
  <div class="example" id="e1"><div style="font-size:.58rem;font-weight:700;letter-spacing:2px;color:var(--teal);margin-bottom:.35rem;">⚡ TU TURNO</div><strong>Factoriza:</strong> 12a³ + 8a² − 4a<details><summary>Ver respuesta</summary><div>= 4a(3a² + 2a − 1)</div></details></div>
</div>`;
}
function a1(){
  gsap.timeline()
    .from('#t1',{y:-30,opacity:0,duration:.5,ease:'power2.out'})
    .from('#f1',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1')
    .from(['#st1','#st2','#st3'],{x:-28,opacity:0,duration:.38,stagger:.22,ease:'power2.out'})
    .from('#e1',{y:18,opacity:0,duration:.4},'-=.1');
}

function s2(el){
  el.innerHTML=`
<div>
  <div class="s-tag">Técnica 2 de 3 · Visual interactiva</div>
  <div class="s-title" id="t2">Diferencia de Cuadrados</div>
  <div class="formula" id="f2">a² − b² = (a + b)(a − b)</div>
  <div class="area" id="ar2">
    <div style="display:flex;gap:1.4rem;align-items:center;flex-wrap:wrap;justify-content:center;">
      <svg id="svgdc" width="200" height="180" viewBox="0 0 200 180">
        <rect id="ra" x="8" y="8" width="1" height="1" fill="rgba(124,58,237,.35)" stroke="#7c3aed" stroke-width="1.8" rx="3"/>
        <rect id="rb" x="8" y="8" width="1" height="1" fill="rgba(239,68,68,.3)" stroke="#ef4444" stroke-width="1.5" rx="2"/>
        <text id="la" x="50" y="160" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">a</text>
        <text id="lb" x="50" y="160" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">b</text>
        <text id="lres" x="100" y="90" text-anchor="middle" fill="#86efac" font-size="10" opacity="0">a²−b²=(a+b)(a−b)</text>
      </svg>
      <div id="dc-calc" style="font-family:monospace;font-size:.95rem;color:#c4b5fd;line-height:1.8;"></div>
    </div>
    <div class="sl-row">
      <span class="sl-lbl" style="color:#a78bfa;">a</span>
      <input type="range" min="3" max="9" value="7" id="sla" oninput="updDC()">
      <span class="sl-val" id="va">7</span>
    </div>
    <div class="sl-row">
      <span class="sl-lbl" style="color:#fca5a5;">b</span>
      <input type="range" min="1" max="5" value="3" id="slb" oninput="updDC()">
      <span class="sl-val" id="vb">3</span>
    </div>
  </div>
</div>`;
  setTimeout(updDC,80);
}
function updDC(){
  const a=+document.getElementById('sla').value, b=+document.getElementById('slb').value;
  document.getElementById('va').textContent=a;
  document.getElementById('vb').textContent=b;
  const sc=15, aW=a*sc, bW=b*sc, off=8;
  const s=(id,x,y,w,h)=>{const e=document.getElementById(id);if(e){e.setAttribute('x',x);e.setAttribute('y',y);e.setAttribute('width',w);e.setAttribute('height',h);}};
  const tx=(id,x,y)=>{const e=document.getElementById(id);if(e){e.setAttribute('x',x);e.setAttribute('y',y);}};
  s('ra',off,off,aW,aW);
  s('rb',off+aW-bW,off,bW,bW);
  tx('la',off+aW/2,off+aW+14);
  tx('lb',off+aW-bW/2,off+aW+14);
  const c=document.getElementById('dc-calc');
  if(c) c.innerHTML=`${a}² − ${b}² = <strong style="color:#86efac;">${a*a-b*b}</strong><br>(${a}+${b})(${a}−${b})<br>= ${a+b} × ${a-b} = <strong style="color:#86efac;">${(a+b)*(a-b)}</strong>`;
}
function a2(){
  gsap.timeline()
    .from('#t2',{y:-30,opacity:0,duration:.5,ease:'power2.out'})
    .from('#f2',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1')
    .from('#ar2',{y:22,opacity:0,duration:.45},'-=.1');
  gsap.fromTo('#ra',{attr:{width:1,height:1}},{attr:{width:105,height:105},duration:.75,ease:'power2.out',delay:.7});
  gsap.fromTo('#rb',{attr:{width:1,height:1}},{attr:{width:45,height:45},duration:.55,ease:'power2.out',delay:1.1});
  gsap.to('#lres',{opacity:1,duration:.4,delay:1.5});
}

function s3(el){
  el.innerHTML=`
<div>
  <div class="s-tag">Técnica 3 de 3 · Demostración geométrica</div>
  <div class="s-title" id="t3">Trinomio Cuadrado Perfecto</div>
  <div class="formula" id="f3">(a + b)² = a² + 2ab + b²</div>
  <div class="area" id="ar3">
    <div style="display:flex;gap:1.4rem;align-items:center;flex-wrap:wrap;justify-content:center;">
      <svg id="svgt" width="180" height="180" viewBox="0 0 180 180">
        <rect id="ta2" x="5" y="5" width="1" height="1" fill="rgba(124,58,237,.4)" stroke="#7c3aed" stroke-width="1.5" rx="2"/>
        <text id="tla2" x="5" y="5" fill="#c4b5fd" font-size="11" font-weight="bold">a²</text>
        <rect id="tab1" x="5" y="5" width="1" height="1" fill="rgba(56,189,248,.22)" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
        <text id="tlab1" x="5" y="5" fill="#7dd3fc" font-size="10">ab</text>
        <rect id="tab2" x="5" y="5" width="1" height="1" fill="rgba(56,189,248,.22)" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
        <text id="tlab2" x="5" y="5" fill="#7dd3fc" font-size="10">ab</text>
        <rect id="tb2" x="5" y="5" width="1" height="1" fill="rgba(16,185,129,.28)" stroke="#10b981" stroke-width="1.5" rx="2"/>
        <text id="tlb2" x="5" y="5" fill="#6ee7b7" font-size="11" font-weight="bold">b²</text>
      </svg>
      <div id="t-vals" style="font-family:monospace;font-size:.87rem;color:#c4b5fd;line-height:2;"></div>
    </div>
    <div class="sl-row">
      <span class="sl-lbl" style="color:#a78bfa;">a</span>
      <input type="range" min="2" max="8" value="5" id="tsa" oninput="updT()">
      <span class="sl-val" id="tva">5</span>
    </div>
    <div class="sl-row">
      <span class="sl-lbl" style="color:#6ee7b7;">b</span>
      <input type="range" min="1" max="5" value="3" id="tsb" oninput="updT()">
      <span class="sl-val" id="tvb">3</span>
    </div>
  </div>
</div>`;
  setTimeout(updT,80);
}
function updT(){
  const a=+document.getElementById('tsa').value, b=+document.getElementById('tsb').value;
  document.getElementById('tva').textContent=a;
  document.getElementById('tvb').textContent=b;
  const tot=a+b, sc=160/tot, aW=a*sc, bW=b*sc, off=5;
  const s=(id,x,y,w,h)=>{const e=document.getElementById(id);if(e){e.setAttribute('x',x);e.setAttribute('y',y);e.setAttribute('width',w);e.setAttribute('height',h);}};
  const tx=(id,x,y)=>{const e=document.getElementById(id);if(e){e.setAttribute('x',x);e.setAttribute('y',y);}};
  s('ta2',off,off,aW,aW); tx('tla2',off+aW/2-7,off+aW/2+4);
  s('tab1',off+aW,off,bW,aW); tx('tlab1',off+aW+bW/2-7,off+aW/2+4);
  s('tab2',off,off+aW,aW,bW); tx('tlab2',off+aW/2-7,off+aW+bW/2+4);
  s('tb2',off+aW,off+aW,bW,bW); tx('tlb2',off+aW+bW/2-7,off+aW+bW/2+4);
  const v=document.getElementById('t-vals');
  if(v) v.innerHTML=`(${a}+${b})² = <strong style="color:#86efac;">${tot*tot}</strong><br><span style="color:#c4b5fd;">${a}²</span>+<span style="color:#7dd3fc;">2·${a}·${b}</span>+<span style="color:#6ee7b7;">${b}²</span><br>= ${a*a}+${2*a*b}+${b*b} = <strong style="color:#86efac;">${tot*tot}</strong>`;
}
function a3(){
  gsap.timeline()
    .from('#t3',{y:-30,opacity:0,duration:.5,ease:'power2.out'})
    .from('#f3',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1')
    .from('#ar3',{y:22,opacity:0,duration:.45},'-=.1');
  setTimeout(()=>{
    gsap.fromTo(['#ta2','#tab1','#tab2','#tb2'],{opacity:0},{opacity:1,duration:.4,stagger:.18,ease:'power2.out'});
    gsap.fromTo(['#tla2','#tlab1','#tlab2','#tlb2'],{opacity:0},{opacity:1,duration:.3,stagger:.18,delay:.2});
  },650);
}

function s4(el){
  el.innerHTML=`
<div>
  <div class="s-tag">Resumen · Los 3 Productos Notables</div>
  <div class="s-title" id="t4">Tres Fórmulas que Debes Dominar</div>
  <div class="s-sub">El ICFES las incluye siempre — aquí las tienes:</div>
  <div class="cards-grid">
    <div class="n-card" id="nc1">
      <div class="n-name">1 · Factor común</div>
      <div class="n-formula">ka + kb = k(a + b)</div>
      <div class="n-ex">Ej: 8x³ + 12x² = 4x²(2x + 3)</div>
    </div>
    <div class="n-card" id="nc2">
      <div class="n-name">2 · Diferencia de cuadrados</div>
      <div class="n-formula">a² − b² = (a+b)(a−b)</div>
      <div class="n-ex">Ej: x² − 25 = (x+5)(x−5)</div>
    </div>
    <div class="n-card" id="nc3">
      <div class="n-name">3 · Trinomio cuadrado perfecto</div>
      <div class="n-formula">a² ± 2ab + b² = (a ± b)²</div>
      <div class="n-ex">Ej: x² + 6x + 9 = (x+3)²</div>
    </div>
  </div>
  <div id="tip4" style="margin-top:.75rem;background:rgba(255,94,0,.1);border:1px solid rgba(255,94,0,.28);border-radius:10px;padding:.7rem 1rem;font-size:.8rem;">
    💡 <strong>Truco ICFES:</strong> Para el trinomio, verifica que el término medio = 2 × √(primero) × √(último)
  </div>
</div>`;
}
function a4(){
  gsap.timeline()
    .from('#t4',{y:-30,opacity:0,duration:.5,ease:'power2.out'})
    .from(['#nc1','#nc2','#nc3'],{y:28,opacity:0,duration:.45,stagger:.18,ease:'power2.out'})
    .from('#tip4',{x:-18,opacity:0,duration:.4},'-=.1');
}

function s5(el){
  el.innerHTML=`
<div>
  <div class="s-tag">Mini Quiz · 3 Preguntas</div>
  <div class="s-title" id="t5">¿Cuánto aprendiste?</div>
  <div id="q-wrap"></div>
  <div id="q-final" style="display:none;text-align:center;padding:1rem 0;">
    <div id="q-score" style="font-size:2.8rem;font-weight:900;margin-bottom:.4rem;"></div>
    <div id="q-msg" style="color:var(--muted);font-size:.88rem;margin-bottom:1rem;"></div>
    <button onclick="restartQ()" style="background:var(--purple);border:none;color:#fff;padding:.55rem 1.4rem;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;">🔄 Reintentar</button>
  </div>
</div>`;
  renderQ(0);
}
function renderQ(i){
  if(i>=quiz.length){setTimeout(showScore,400);return;}
  const q=quiz[i];
  const w=document.getElementById('q-wrap');
  if(!w)return;
  w.innerHTML=`
<div style="font-size:.68rem;color:var(--muted);margin-bottom:.4rem;">Pregunta ${i+1} de ${quiz.length}</div>
<div class="q-q">${q.q}</div>
<div class="q-opts" id="qo${i}">${q.opts.map((o,j)=>`<button class="q-opt" onclick="ansQ(${i},${j})" id="qo${i}-${j}"><span style="display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:50%;background:rgba(124,58,237,.22);border:1px solid rgba(124,58,237,.45);font-size:.72rem;font-weight:700;flex-shrink:0;letter-spacing:0;">\${String.fromCharCode(65+j)}</span><span>\${o}</span></button>`).join('')}</div>
<div class="q-fb" id="qf${i}"></div>`;
  gsap.from('.q-opt',{x:-18,duration:.3,stagger:.06,ease:'power2.out'});
}
function ansQ(qi,oi){
  if(qAns[qi]!==null)return;
  qAns[qi]=oi;
  const q=quiz[qi];
  document.querySelectorAll(`#qo${qi} .q-opt`).forEach((b,i)=>{
    b.classList.add('locked');b.style.pointerEvents='none';
    if(i===q.ok)b.classList.add('ok');
    else if(i===oi)b.classList.add('bad');
  });
  const fb=document.getElementById(`qf${qi}`);
  if(fb){fb.className='q-fb '+(oi===q.ok?'ok':'bad');fb.textContent=(oi===q.ok?'✅ ':'❌ ')+q.fb;}
  setTimeout(()=>renderQ(qi+1),2200);
}
function showScore(){
  const ok=qAns.filter((a,i)=>a===quiz[i].ok).length;
  const pct=Math.round(ok/quiz.length*100);
  const w=document.getElementById('q-wrap');
  const f=document.getElementById('q-final');
  if(w)w.innerHTML='';
  if(f){
    f.style.display='block';
    const e=pct===100?'🏆':pct>=66?'⭐':'📚';
    const m=pct===100?'¡Perfecto! Dominas esta lección.':pct>=66?'¡Bien! Sigue practicando.':'Repasa la lección e intenta de nuevo.';
    document.getElementById('q-score').textContent=`${e} ${ok}/${quiz.length}`;
    document.getElementById('q-msg').textContent=m;
    gsap.from('#q-final',{scale:.8,opacity:0,duration:.5,ease:'back.out(1.7)'});
  }
}
function restartQ(){
  qAns.fill(null);
  const f=document.getElementById('q-final');
  if(f)f.style.display='none';
  renderQ(0);
}
function a5(){
  gsap.from('#t5',{y:-30,opacity:0,duration:.5,ease:'power2.out'});
}

makeDots();
render();
animate();
</script>
</body>
</html>

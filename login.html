<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Total | PROGRAMA-PRI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-login">
    
    <a href="index.html" class="back-btn">← Volver al Inicio</a>

    <main class="login-split">
        <!-- Lado Izquierdo: Visual Maximalista -->
        <section class="login-visual">
            <div class="liquid-bg"></div>
            <!-- Tipografía masiva con desborde y text-stroke -->
            <h1 class="massive-text">INGRESA<br>AL<br><span class="outline-text">FUTURO</span></h1>
        </section>

        <!-- Lado Derecho: Formulario Superpuesto -->
        <section class="login-form-area">
            <div class="glass-form">
                <h2>Acceso PRI</h2>
                <p>Plataforma exclusiva para el talento de Tumaco.</p>
                
                <!-- El formulario redirige temporalmente al Dashboard para simular el ingreso -->
                <form action="dashboard.html">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" required placeholder="estudiante@correo.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary btn-full">Entrar al Sistema</button>
                </form>
                
                <p class="register-hint">¿No tienes cuenta? <a href="#">Solicita acceso</a></p>
            </div>
        </section>
    </main>

</body>
</html>

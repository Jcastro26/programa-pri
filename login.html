<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Total | PROGRAMA-PRI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-login">
    
    <a href="index.html" class="back-btn">← Volver al Inicio</a>

    <main class="login-split">
        <!-- Lado Izquierdo: Visual Maximalista -->
        <div class="login-visual">
    <!-- CAPAS DE LA MAREA VIVA -->
    <div class="liquid-bg">
        <div class="marea-layer layer-1"></div>
        <div class="marea-layer layer-2"></div>
        <div class="marea-layer layer-3"></div>
    </div>
    
    <h1 class="massive-text">
        <span>INGRESA</span>
        <span>AL</span>
        <span class="outline-text">FUTURO</span>
    </h1>
</div>

        <!-- Lado Derecho: Formulario Superpuesto -->
<div class="login-form-area">
    <div class="glass-form">
        <h2>ACCESO PRI</h2>
        <p class="form-subtitle">Plataforma exclusiva para el talento de Tumaco.</p>
        
        <form>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="estudiante@correo.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary">Entrar al Sistema</button>
            
            <!-- CONTENEDOR CORREGIDO PARA EL FOOTER -->
            <div class="form-footer">
                ¿No tienes cuenta? <a href="#">Solicita acceso</a>
            </div>
        </form>
    </div>
</div>
<!-- Script del Menú Móvil -->
    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');

        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('is-active'); /* Transforma la hamburguesa en X */
            navLinks.classList.toggle('active');      /* Desliza el menú inmersivo */
        });
    </script>

    <!--aqui -->

    
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biología · Taller Interactivo</title>
<style>
  :root{--azul:#021a36;--naranja:#ff5e00;--teal:#38bdf8;--verde:#22c55e;--oro:#ffd700;--blanco:#f0f4f8;--fuente:'Montserrat',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--azul);color:var(--blanco);font-family:var(--fuente);display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
  #header{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;background:rgba(2,10,26,.9);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
  #header-title{font-size:.72rem;font-weight:900;letter-spacing:.5px;}
  #header-sub{font-size:.55rem;color:rgba(240,244,248,.4);letter-spacing:1px;margin-top:.1rem;}
  #pts-badge{background:rgba(255,94,0,.18);border:1px solid rgba(255,94,0,.4);color:var(--naranja);font-size:.62rem;font-weight:900;padding:.3rem .7rem;border-radius:20px;}
  #btn-cerrar{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--blanco);font-family:var(--fuente);font-size:.58rem;font-weight:700;padding:.3rem .7rem;border-radius:8px;cursor:pointer;}
  #btn-cerrar:hover{background:rgba(255,255,255,.14);}
  #progress-bar-wrap{height:3px;background:rgba(255,255,255,.07);flex-shrink:0;}
  #progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--verde),var(--teal));transition:width .5s ease;}
  #chat{flex:1;overflow-y:auto;padding:.8rem 1rem;display:flex;flex-direction:column;gap:.6rem;scroll-behavior:smooth;}
  .bubble-wrap{display:flex;align-items:flex-end;gap:.45rem;}
  .bubble-wrap.bot{flex-direction:row;}
  .bubble-wrap.user{flex-direction:row-reverse;}
  .avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
  .avatar.bot{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);}
  .avatar.user{background:rgba(255,94,0,.15);border:1px solid rgba(255,94,0,.3);}
  .bubble{max-width:82%;padding:.55rem .8rem;border-radius:14px;font-size:.75rem;line-height:1.55;}
  .bubble.bot{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:4px;}
  .bubble.user{background:rgba(255,94,0,.18);border:1px solid rgba(255,94,0,.3);border-bottom-right-radius:4px;}
  .bubble strong{color:var(--teal);}
  .bubble em{color:var(--oro);}
  .tip{background:rgba(34,197,94,.08);border-left:3px solid var(--verde);padding:.45rem .65rem;border-radius:0 8px 8px 0;font-size:.7rem;margin:.3rem 0;color:rgba(240,244,248,.85);}
  .check{color:var(--verde);font-weight:900;}
  .img-placeholder{background:rgba(255,255,255,.05);border:1.5px dashed rgba(34,197,94,.35);border-radius:8px;padding:.55rem .7rem;margin:.3rem 0;font-size:.68rem;color:rgba(34,197,94,.65);text-align:center;}
  #options-area{display:none;padding:.5rem 1rem .65rem;flex-shrink:0;}
  #options-grid{display:flex;flex-direction:column;gap:.4rem;}
  .opt-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.13);color:rgba(240,244,248,.8);font-family:var(--fuente);font-size:.72rem;font-weight:700;padding:.6rem .9rem;border-radius:10px;cursor:pointer;text-align:left;line-height:1.4;}
  .opt-btn:hover{background:rgba(255,94,0,.14);border-color:rgba(255,94,0,.45);}
  .opt-btn.selected{background:rgba(255,94,0,.22);border-color:rgba(255,94,0,.6);}
  .opt-btn:disabled{opacity:.4;cursor:not-allowed;}
  #input-area{display:none;padding:.5rem 1rem .9rem;flex-shrink:0;}
  #input-row{display:flex;gap:.5rem;}
  #txt-input{flex:1;background:rgba(2,14,36,.7);border:1px solid rgba(255,255,255,.14);color:var(--blanco);font-family:var(--fuente);font-size:.78rem;padding:.55rem .9rem;border-radius:10px;outline:none;}
  #txt-input:focus{border-color:var(--teal);}
  #btn-send{background:rgba(56,189,248,.85);color:var(--azul);border:none;font-family:var(--fuente);font-size:.65rem;font-weight:900;padding:.55rem 1rem;border-radius:10px;cursor:pointer;}
  #fin-overlay{display:none;position:fixed;inset:0;background:rgba(2,10,26,.85);backdrop-filter:blur(10px);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;text-align:center;padding:2rem;}
  #fin-overlay.show{display:flex;}
  #fin-title{font-size:clamp(1.2rem,5vw,2rem);font-weight:900;color:var(--oro);}
  #fin-pts{font-size:.75rem;color:rgba(240,244,248,.6);}
  #fin-btn{font-family:var(--fuente);font-size:.65rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:.65rem 1.5rem;background:var(--naranja);color:#fff;border:none;border-radius:10px;cursor:pointer;}

/* ══ AB-NEON TALLER ══ */
@keyframes _pt{0%,100%{opacity:.13;}50%{opacity:.18;}}
#progress-bar{transition:width .65s cubic-bezier(.34,1.56,.64,1)!important;box-shadow:0 0 12px rgba(56,189,248,.5)!important;}
.opt-btn:hover{box-shadow:0 0 14px rgba(255,94,0,.35)!important;}
.opt-btn.selected{box-shadow:0 0 18px rgba(255,94,0,.45)!important;}
.bubble.bot{box-shadow:0 0 0 1px rgba(56,189,248,.08);}
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="header">
  <div>
    <div id="header-title">🧬 Biología — ICFES</div>
    <div id="header-sub">Taller interactivo · PROGRAMA-PRI</div>
  </div>
  <div style="display:flex;align-items:center;gap:.6rem;">
    <span id="pts-badge">0 pts</span>
    <button id="btn-cerrar" onclick="cerrarTaller()">✕ Cerrar</button>
  </div>
</div>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="chat"></div>
<div id="options-area"><div id="options-grid"></div></div>
<div id="input-area">
  <div id="input-row">
    <input id="txt-input" type="text" placeholder="Escribe aquí…" maxlength="200">
    <button id="btn-send">Enviar →</button>
  </div>
</div>
<div id="fin-overlay">
  <div id="fin-title">🏆 ¡Biología dominada!</div>
  <p style="font-size:.85rem;color:rgba(240,244,248,.7);max-width:340px;line-height:1.55;">Repasaste célula, genética, ecosistemas, evolución y fisiología humana. ¡Estás listo/a para el ICFES!</p>
  <div id="fin-pts"></div>
  <button id="fin-btn" onclick="cerrarTaller()">Volver al dashboard</button>
</div>

<script>

/* ═══ AB ENGINE TALLER ═══ */
var _AB_T=true;
(function(){
  var cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.08;';
  document.body.insertBefore(cv,document.body.firstChild);
  var ctx=cv.getContext('2d');
  var S=['x','y','²','F','v','Σ','π','+','−','=','a','b','n'];
  var C=['#7c3aed','#38bdf8','#10b981','#ff5e00'];
  var P=[];
  function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  rsz();window.addEventListener('resize',rsz);
  for(var i=0;i<24;i++)P.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.28,vy:-(Math.random()*.35+.06),
    s:S[Math.floor(Math.random()*S.length)],sz:9+Math.random()*12,
    a:.12+Math.random()*.38,c:C[Math.floor(Math.random()*C.length)],
    rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.009});
  (function tk(){ctx.clearRect(0,0,cv.width,cv.height);P.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;
    if(p.y<-30){p.y=cv.height+20;p.x=Math.random()*cv.width;}
    if(p.x<-20)p.x=cv.width+20;if(p.x>cv.width+20)p.x=-20;
    ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.c;
    ctx.font='bold '+p.sz+'px Courier New';
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillText(p.s,0,0);ctx.restore();
  });requestAnimationFrame(tk);})();
})();

let pts=0,paso=0;
const TOTAL_PASOS=10;
const chat=document.getElementById('chat');
const optGrid=document.getElementById('options-grid');
const ptsEl=document.getElementById('pts-badge');
const progressBar=document.getElementById('progress-bar');

function sumarPts(n){pts+=n;ptsEl.textContent=pts+' pts';}
function avanzarBarra(){paso=Math.min(paso+1,TOTAL_PASOS);progressBar.style.width=(paso/TOTAL_PASOS*100)+'%';}
function limpiarOpciones(){optGrid.innerHTML='';document.getElementById('options-area').style.display='none';document.getElementById('input-area').style.display='none';}
function addBot(html,delay=0){return new Promise(r=>{setTimeout(()=>{const w=document.createElement('div');w.className='bubble-wrap bot';w.innerHTML=`<div class="avatar bot">🧬</div><div class="bubble bot">${html}</div>`;chat.appendChild(w);chat.scrollTop=chat.scrollHeight;r();},delay);});}
function addUser(t){const w=document.createElement('div');w.className='bubble-wrap user';w.innerHTML=`<div class="avatar user">🧑</div><div class="bubble user">${t}</div>`;chat.appendChild(w);chat.scrollTop=chat.scrollHeight;}
function mostrarOpciones(ops){document.getElementById('options-area').style.display='block';optGrid.innerHTML='';ops.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op.label;b.onclick=()=>{document.querySelectorAll('.opt-btn').forEach(x=>x.disabled=true);b.classList.add('selected');addUser(op.label);limpiarOpciones();setTimeout(()=>op.fn(),400);};optGrid.appendChild(b);});}
function mostrarInput(ph,fn){document.getElementById('input-area').style.display='block';const inp=document.getElementById('txt-input');inp.placeholder=ph;inp.value='';inp.focus();const s=()=>{const v=inp.value.trim();if(!v)return;addUser(v);limpiarOpciones();setTimeout(()=>fn(v),400);};document.getElementById('btn-send').onclick=s;inp.onkeydown=e=>{if(e.key==='Enter')s();};}

async function paso0(){
  await addBot(`¡Bienvenido/a al taller de <strong>Biología ICFES</strong>! 🧬<br><br>
El ICFES evalúa Biología dentro de <em>Ciencias Naturales</em> junto con Química y Física.<br><br>
Los grandes temas son:<br>
<strong>• La célula</strong> — unidad de la vida.<br>
<strong>• Genética y herencia</strong> — ADN, genes, cromosomas.<br>
<strong>• Ecosistemas</strong> — relaciones entre seres vivos.<br>
<strong>• Evolución</strong> — Darwin y selección natural.<br>
<strong>• Fisiología humana</strong> — sistemas del cuerpo.<br>
<strong>• Biología molecular</strong> — fotosíntesis y respiración celular.<br><br>
¿Comenzamos?`, 300);
  mostrarOpciones([
    { label: '🚀 ¡Sí, arrancamos!', fn:()=>{addBot(`¡Perfecto! Empezamos con la célula — la unidad básica de la vida.`,300);setTimeout(paso1,1200);} },
    { label: '🤔 ¿Qué tanto vale Biología en el ICFES?', fn:()=>{addBot(`Ciencias Naturales (Bio + Química + Física) vale <strong>~30 preguntas</strong> del ICFES. ¡Vale muchísimo! Vamos a repasar todo.`,300);setTimeout(paso1,1500);} },
  ]);
}

async function paso1(){
  avanzarBarra();
  await addBot(`<strong>La Célula</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: comparación célula procariota vs eucariota — señalando núcleo, membrana, pared celular, mitocondria, ribosomas]</div><br>
La diferencia principal entre una célula <strong>procariota</strong> y una <strong>eucariota</strong> es:`, 400);
  mostrarOpciones([
    { label: '🔵 La procariota tiene núcleo definido y la eucariota no', fn:()=>{addBot(`Al contrario — es la eucariota la que tiene núcleo definido. Las procariotas (bacterias) tienen ADN libre en el citoplasma.`,300);setTimeout(paso2,1600);} },
    { label: '🟢 La eucariota tiene núcleo definido; la procariota no tiene membrana nuclear', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> Las <strong>procariotas</strong> (bacterias, arqueas) no tienen núcleo membranoso. Las <strong>eucariotas</strong> (animales, plantas, hongos, protistas) sí.`,300);setTimeout(paso2,1600);} },
    { label: '⚪ Las dos tienen las mismas organelas', fn:()=>{addBot(`No — las procariotas no tienen mitocondrias, retículo endoplasmático ni aparato de Golgi. Las eucariotas sí tienen organelas especializadas.`,300);setTimeout(paso2,1600);} },
  ]);
}

async function paso2(){
  avanzarBarra();
  await addBot(`<strong>Fotosíntesis y Respiración Celular</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: ecuación general de fotosíntesis: 6CO₂ + 6H₂O + luz → C₆H₁₂O₆ + 6O₂ — con cloroplasto ilustrado]</div><br>
La fotosíntesis ocurre en los <strong>cloroplastos</strong> y produce glucosa y oxígeno. La respiración celular ocurre en las <strong>mitocondrias</strong> y hace lo contrario.<br><br>
¿Qué organela es el "motor energético" de la célula?`, 400);
  mostrarOpciones([
    { label: '🟢 Ribosoma', fn:()=>{addBot(`Los ribosomas <em>sintetizan proteínas</em>, no producen energía. El motor energético es la mitocondria.`,300);setTimeout(paso3,1600);} },
    { label: '⚡ Mitocondria', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> La mitocondria es donde ocurre la <strong>respiración celular aeróbica</strong>: produce ATP (adenosín trifosfato), la moneda energética de la célula.`,300);setTimeout(paso3,1600);} },
    { label: '💧 Vacuola', fn:()=>{addBot(`La vacuola almacena agua, nutrientes o desechos. La energía celular la produce la <strong>mitocondria</strong>.`,300);setTimeout(paso3,1600);} },
  ]);
}

async function paso3(){
  avanzarBarra();
  await addBot(`<strong>Genética — ADN y Cromosomas</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: jerarquía: gen → ADN → cromosoma → núcleo celular — con doble hélice]</div><br>
El ADN está organizado en <strong>genes</strong> → <strong>cromosomas</strong> → <strong>núcleo</strong>.<br>
Los humanos tenemos <em>23 pares de cromosomas</em> (46 en total).<br><br>
Los cromosomas sexuales en los humanos son:`, 400);
  mostrarOpciones([
    { label: '🧬 XX en hombres, XY en mujeres', fn:()=>{addBot(`Al contrario — las mujeres son <strong>XX</strong> y los hombres <strong>XY</strong>. El cromosoma Y determina el sexo masculino.`,300);setTimeout(paso4,1600);} },
    { label: '🧬 XX en mujeres, XY en hombres', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> Las mujeres tienen dos cromosomas X (<strong>XX</strong>); los hombres tienen un X y un Y (<strong>XY</strong>). El espermatozoide determina el sexo del bebé.`,300);setTimeout(paso4,1600);} },
    { label: '🧬 Solo hay un tipo de cromosoma sexual', fn:()=>{addBot(`Existen dos tipos: <strong>X</strong> e <strong>Y</strong>. Las mujeres (XX) tienen dos X; los hombres (XY) tienen uno de cada uno.`,300);setTimeout(paso4,1600);} },
  ]);
}

async function paso4(){
  avanzarBarra();
  await addBot(`<strong>Leyes de Mendel y Herencia</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: cuadrado de Punnett para un cruce Aa × Aa — mostrando proporción 3:1 fenotípica]</div><br>
En un cruce entre dos individuos <strong>Aa</strong> (heterocigotos) para un rasgo con dominancia simple:<br>
¿Cuántos de cada 4 hijos serán fenotípicamente recesivos (aa)?`, 400);
  mostrarOpciones([
    { label: '1 de 4 (25%)', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> El cuadrado de Punnett da: AA, Aa, Aa, aa → <strong>1 recesivo de 4</strong>. La proporción fenotípica es 3 dominantes : 1 recesivo.`,300);setTimeout(paso5,1600);} },
    { label: '2 de 4 (50%)', fn:()=>{addBot(`50% sería si uno de los padres fuera recesivo (Aa × aa). Con Aa × Aa la proporción recesiva es <strong>1:4 (25%)</strong>.`,300);setTimeout(paso5,1600);} },
    { label: '4 de 4 (100%)', fn:()=>{addBot(`100% recesivo ocurriría con aa × aa. Con Aa × Aa, solo <strong>1 de 4</strong> hereda los dos alelos recesivos.`,300);setTimeout(paso5,1600);} },
  ]);
}

async function paso5(){
  avanzarBarra();
  await addBot(`<strong>Ecosistemas y Relaciones Ecológicas</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: cadena alimentaria — productor → consumidor primario → consumidor secundario → descomponedor]</div><br>
En un ecosistema, los <strong>productores</strong> son los seres vivos que fabrican su propio alimento usando energía solar.<br><br>
¿Cuál de estos organismos es un <em>productor</em>?`, 400);
  mostrarOpciones([
    { label: '🌿 Las plantas con clorofila', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Exacto! ✅ <strong>+15 pts.</strong> Las plantas son <strong>autótrofos fotosintéticos</strong> — producen glucosa con luz solar, CO₂ y agua. Son la base de las cadenas alimentarias.`,300);setTimeout(paso6,1600);} },
    { label: '🦁 Los leones', fn:()=>{addBot(`Los leones son <strong>consumidores terciarios</strong> — dependen de otros animales para alimentarse. No producen su propio alimento.`,300);setTimeout(paso6,1600);} },
    { label: '🍄 Los hongos', fn:()=>{addBot(`Los hongos son <strong>descomponedores</strong> — degradan materia orgánica muerta. No producen su propio alimento por fotosíntesis.`,300);setTimeout(paso6,1600);} },
  ]);
}

async function paso6(){
  avanzarBarra();
  await addBot(`<strong>Relaciones entre organismos</strong><br><br>
<strong>• Mutualismo (+/+):</strong> ambos se benefician. Ej: abeja y flor.<br>
<strong>• Comensalismo (+/0):</strong> uno se beneficia, el otro no se afecta. Ej: rémora y tiburón.<br>
<strong>• Parasitismo (+/-):</strong> uno se beneficia, el otro es perjudicado. Ej: pulga y perro.<br>
<strong>• Competencia (-/-):</strong> ambos compiten por recursos.<br>
<strong>• Depredación (+/-):</strong> un depredador caza a su presa.<br><br>
¿Qué tipo de relación es la de los líquenes? (alga + hongo conviven y ambos se benefician)`, 400);
  mostrarOpciones([
    { label: '🤝 Mutualismo', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> El alga produce alimento por fotosíntesis y el hongo proporciona estructura y absorbe agua — ambos ganan. ¡Ejemplo clásico de mutualismo!`,300);setTimeout(paso7,1600);} },
    { label: '🦠 Parasitismo', fn:()=>{addBot(`En el parasitismo uno daña al otro. Aquí ambos organismos del liquen se <em>benefician mutuamente</em> — es <strong>mutualismo</strong>.`,300);setTimeout(paso7,1600);} },
    { label: '🐡 Comensalismo', fn:()=>{addBot(`En el comensalismo uno se beneficia y el otro es indiferente (0). En los líquenes <strong>ambos</strong> obtienen beneficios — eso es <strong>mutualismo</strong>.`,300);setTimeout(paso7,1600);} },
  ]);
}

async function paso7(){
  avanzarBarra();
  await addBot(`<strong>Evolución y Selección Natural</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: árbol evolutivo (cladograma) mostrando divergencia de especies a partir de ancestro común]</div><br>
Darwin propuso que las especies evolucionan mediante <strong>selección natural</strong>: los individuos con variaciones favorables para el ambiente sobreviven y se reproducen más.<br><br>
¿Cuál de estas afirmaciones describe correctamente la selección natural?`, 400);
  mostrarOpciones([
    { label: '🧠 Los animales cambian porque quieren adaptarse', fn:()=>{addBot(`Eso sería la teoría de Lamarck. La selección natural de Darwin NO implica voluntad — las variaciones <em>ya existen</em> en la población y el ambiente selecciona las más favorables.`,300);setTimeout(paso8,1600);} },
    { label: '🌿 Los individuos con variaciones favorables sobreviven y transmiten esos rasgos', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Exacto! ✅ <strong>+15 pts.</strong> La selección natural actúa sobre variaciones <em>ya existentes</em>. Los más aptos sobreviven y se reproducen → sus genes pasan a la siguiente generación.`,300);setTimeout(paso8,1600);} },
    { label: '🔬 Las mutaciones siempre son beneficiosas', fn:()=>{addBot(`La mayoría de mutaciones son neutras o perjudiciales. Solo las que dan ventaja en un ambiente específico son favorecidas por la selección natural.`,300);setTimeout(paso8,1600);} },
  ]);
}

async function paso8(){
  avanzarBarra();
  await addBot(`<strong>Sistemas del Cuerpo Humano</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: esquema del sistema circulatorio humano — corazón, arterias, venas, capilares con flujo de sangre oxigenada y desoxigenada]</div><br>
¿Cuál es la función principal del sistema <strong>circulatorio</strong>?`, 400);
  mostrarOpciones([
    { label: '🫁 Intercambiar gases con el ambiente', fn:()=>{addBot(`Esa es la función del sistema <strong>respiratorio</strong>. El sistema circulatorio <em>transporta</em> esos gases (y nutrientes, hormonas, desechos) por el cuerpo.`,300);setTimeout(paso9,1600);} },
    { label: '❤️ Transportar oxígeno, nutrientes, hormonas y desechos por el cuerpo', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> El sistema circulatorio (corazón + vasos + sangre) es el sistema de transporte del cuerpo. La sangre lleva O₂, glucosa, hormonas y recoge CO₂ y urea.`,300);setTimeout(paso9,1600);} },

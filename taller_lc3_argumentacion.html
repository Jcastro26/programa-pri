function s1(el){el.innerHTML=`<div><div class="s-tag">Concepto base</div><div class="s-title" id="t1">Estructura del Argumento</div><div class="s-sub">Todo argumento bien formado tiene tres partes</div><div class="formula" id="f1">PREMISAS → razonamiento → CONCLUSIÓN (= TESIS)</div><div id="st1" class="step"><div class="step-n">1</div><div><strong>Tesis:</strong> la posición que el autor defiende. Suele ir al inicio o al final del texto.</div></div><div id="st2" class="step"><div class="step-n">2</div><div><strong>Premisas:</strong> las razones o evidencias que apoyan la tesis. Pueden ser hechos, estadísticas o ejemplos.</div></div><div class="example" id="e1"><div style="font-size:.58rem;font-weight:700;letter-spacing:2px;color:var(--teal);margin-bottom:.28rem;">⚡ TRUCO ICFES</div>Busca el conector "por lo tanto / en conclusión / así que" → lo que sigue es la <strong>conclusión</strong>. Lo anterior son las <strong>premisas</strong>.</div></div>`;}

function s2(el){el.innerHTML=`<div><div class="s-tag">Clasificación</div><div class="s-title" id="t2">Las 5 Falacias del ICFES</div><div class="s-sub">Argumentos inválidos que parecen válidos</div><div style="margin-top:.35rem;"><div class="ctype-card" id="ct1"><div class="ctype-name" style="color:#fb923c;">Ad Hominem</div><div class="ctype-words" style="color:#fb923c;">Ataca al hablante, no al argumento.</div><div class="ctype-use">Ej: No puedes opinar sobre economía si eres pobre.</div></div>
<div class="ctype-card" id="ct2"><div class="ctype-name" style="color:#7dd3fc;">Hombre de Paja</div><div class="ctype-words" style="color:#7dd3fc;">Distorsiona el argumento del otro para rebatirlo.</div><div class="ctype-use">Ej: Quieren quitarnos TODAS las armas.</div></div>
<div class="ctype-card" id="ct3"><div class="ctype-name" style="color:#6ee7b7;">Pendiente Resbaladiza</div><div class="ctype-words" style="color:#6ee7b7;">Afirma que A inevitablemente llevará a un extremo B.</div><div class="ctype-use">Ej: Si legalizamos el cannabis, luego vendrá la heroína.</div></div>
<div class="ctype-card" id="ct4"><div class="ctype-name" style="color:#c4b5fd;">Falsa Dicotomía</div><div class="ctype-words" style="color:#c4b5fd;">Presenta solo dos opciones cuando hay más.</div><div class="ctype-use">Ej: O estás con nosotros o estás contra nosotros.</div></div>
<div class="ctype-card" id="ct5"><div class="ctype-name" style="color:#fbbf24;">Generalización Apresurada</div><div class="ctype-words" style="color:#fbbf24;">Concluye sobre todos a partir de pocos casos.</div><div class="ctype-use">Ej: Dos médicos antipáticos → todos los médicos son así.</div></div></div></div>`;}
function a2(){gsap.timeline().from('#t2',{y:-55,rotation:3,opacity:0,duration:.62,ease:'elastic.out(1,.5)'}).from(['#ct1','#ct2','#ct3','#ct4','#ct5'],{y:72,rotation:-3,opacity:0,duration:.54,stagger:.13,ease:'back.out(2.2)'},'-=.1');}
function s3(el){_sel=null;el.innerHTML=`<div><div class="s-tag">🎮 Juego 1 · Identifica la falacia</div><div class="s-title" id="t3">¿Qué falacia es esta?</div><div class="s-sub">Lee el argumento y selecciona la falacia correcta</div><div class="conn-area" id="ca3"><div class="passage">"No deberías escuchar las propuestas de ese candidato — él ni siquiera terminó el bachillerato."</div><div class="chips-row"><span class="conn-chip type-adv" onclick="selectChip(this,'Ad Hominem' )">Ad Hominem</span><span class="conn-chip type-cons" onclick="selectChip(this,'Hombre de Paja' )">Hombre de Paja</span><span class="conn-chip type-add" onclick="selectChip(this,'Pendiente Resbaladiza' )">Pendiente Resbaladiza</span><span class="conn-chip type-caus" onclick="selectChip(this,'Falsa Dicotomía' )">Falsa Dicotomía</span><span class="conn-chip type-cons" onclick="selectChip(this,'Generalización' )">Generalización</span></div><div class="hint-text" id="hints3">👆 ¿El argumento ataca la idea o a la persona que la expresa?</div><div style="text-align:center;margin-top:.7rem;"><span id="slot3" class="conn-chip type-add" style="font-size:.72rem;border-style:dashed;opacity:.7;" onclick="tryPlace('slot3','Ad Hominem','#10b981')">✓ Confirmar selección</span></div><div class="fb-msg" id="fb3">✅ AD HOMINEM — descalifica al candidato por sus credenciales, no por sus ideas. ✓</div></div></div>`;}
function a3(){gsap.timeline().from('#t3',{y:-55,rotation:-3,opacity:0,duration:.62,ease:'elastic.out(1,.5)'}).from('#ca3',{scale:.83,opacity:0,duration:.5,ease:'back.out(2)'},'-=.15').from('.conn-chip',{y:32,opacity:0,scale:.55,duration:.44,stagger:.09,ease:'elastic.out(1,.5)'},'-=.1');}
function s4(el){_sel=null;el.innerHTML=`<div><div class="s-tag">🎮 Juego 2 · Otra falacia</div><div class="s-title" id="t4">¿Y esta?</div><div class="s-sub">Identifica qué tipo de argumento falaz se usa</div><div class="conn-area" id="ca4"><div class="passage">"Si les permitimos a los estudiantes elegir sus temas, pronto nadie aprenderá matemáticas y el país quedará sin ingenieros."</div><div class="chips-row"><span class="conn-chip type-adv" onclick="selectChip(this,'Ad Hominem' )">Ad Hominem</span><span class="conn-chip type-cons" onclick="selectChip(this,'Hombre de Paja' )">Hombre de Paja</span><span class="conn-chip type-add" onclick="selectChip(this,'Pendiente Resbaladiza' )">Pendiente Resbaladiza</span><span class="conn-chip type-caus" onclick="selectChip(this,'Falsa Dicotomía' )">Falsa Dicotomía</span><span class="conn-chip type-cons" onclick="selectChip(this,'Generalización' )">Generalización</span></div><div class="hint-text" id="hints4">👆 ¿El argumento asume que una decisión llevará inevitablemente a un extremo catastrófico?</div><div style="text-align:center;margin-top:.7rem;"><span id="slot4" class="conn-chip type-cons" style="font-size:.72rem;border-style:dashed;opacity:.7;" onclick="tryPlace('slot4','Pendiente Resbaladiza','#38bdf8')">✓ Confirmar selección</span></div><div class="fb-msg" id="fb4">✅ PENDIENTE RESBALADIZA — asume sin evidencia que elegir temas → colapso educativo. ✓</div></div></div>`;}

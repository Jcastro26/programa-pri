<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Números y Álgebra | Programa PRI</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#021226; --surface:#0a1f38; --card:#0d2a4a;
  --orange:#ff5e00; --teal:#38bdf8; --green:#10b981; --red:#f87171;
  --gold:#fbbf24; --text:#e8f0f8; --muted:rgba(232,240,248,.45);
  --border:rgba(56,189,248,.18);
  --font-t:'Montserrat',sans-serif; --font-b:'Inter',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;position:relative;}

/* ── HEADER ── */
.hdr{padding:.75rem 1rem .5rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0;border-bottom:1px solid var(--border);}
.hdr-icon{font-size:1.4rem;}
.hdr-title{font-family:var(--font-t);font-size:.78rem;font-weight:900;color:var(--orange);letter-spacing:.5px;line-height:1.2;}
.hdr-sub{font-family:var(--font-b);font-size:.6rem;color:var(--muted);}
.hdr-pts{margin-left:auto;font-family:var(--font-t);font-size:.72rem;font-weight:700;color:var(--gold);white-space:nowrap;}

/* ── PROGRESS BAR ── */
.prog-wrap{height:4px;background:rgba(255,255,255,.08);flex-shrink:0;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--orange),var(--teal));transition:width .4s ease;border-radius:0 2px 2px 0;}

/* ── STAGE AREA ── */
#stage{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin-bottom:.9rem;}
.card-label{font-family:var(--font-t);font-size:.55rem;font-weight:700;letter-spacing:1.5px;color:var(--orange);text-transform:uppercase;margin-bottom:.4rem;}
.card h2{font-family:var(--font-t);font-size:1.1rem;font-weight:900;line-height:1.3;margin-bottom:.6rem;}
.card p{font-family:var(--font-b);font-size:.78rem;line-height:1.65;color:rgba(232,240,248,.85);}
.card p+p{margin-top:.5rem;}
.highlight{background:rgba(255,94,0,.12);border-left:3px solid var(--orange);padding:.6rem .9rem;border-radius:0 8px 8px 0;margin:.7rem 0;font-family:var(--font-b);font-size:.76rem;line-height:1.6;}
.formula{font-family:monospace;font-size:.88rem;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.18);padding:.35rem .7rem;border-radius:6px;display:inline-block;color:var(--teal);margin:.3rem 0;}

/* ── OPCIONES QUIZ ── */
.opciones{display:flex;flex-direction:column;gap:.55rem;margin-top:.9rem;}
.op{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:.75rem 1rem;cursor:pointer;font-family:var(--font-b);font-size:.78rem;line-height:1.4;transition:all .18s ease;user-select:none;}
.op:active{transform:scale(.97);}
.op.correcto{background:rgba(16,185,129,.12);border-color:var(--green);color:var(--green);}
.op.incorrecto{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red);}
.op.disabled{pointer-events:none;}

/* ── FEEDBACK ── */
.feedback{border-radius:10px;padding:.75rem 1rem;margin-top:.7rem;font-family:var(--font-b);font-size:.76rem;line-height:1.5;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#86efac;}
.feedback.ko{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:#fca5a5;}

/* ── JUEGO MÚLTIPLOS ── */
.mult-game{margin-top:.8rem;}
.mult-number{display:flex;align-items:center;gap:.8rem;margin:.5rem 0;}
.mult-num-badge{font-family:var(--font-t);font-size:1.2rem;font-weight:900;color:var(--teal);width:3rem;text-align:center;}
.mult-choices{display:flex;gap:.5rem;}
.mult-btn{padding:.4rem .9rem;border-radius:8px;border:1.5px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;font-family:var(--font-t);font-size:.65rem;font-weight:700;transition:all .15s;color:var(--text);}
.mult-btn.picked-si{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green);}
.mult-btn.picked-no{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red);}
.mult-btn.correct-glow{box-shadow:0 0 0 2px var(--green);}
.mult-btn.wrong-glow{box-shadow:0 0 0 2px var(--red);}

/* ── ÁRBOL FACTORES ── */
.factor-tree{display:flex;flex-direction:column;align-items:center;gap:.3rem;margin:.8rem 0;}
.ft-row{display:flex;align-items:center;gap:.5rem;font-family:monospace;font-size:.9rem;}
.ft-num{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);border-radius:6px;padding:.3rem .7rem;color:var(--teal);min-width:2.5rem;text-align:center;}
.ft-div{color:var(--muted);font-size:.75rem;}
.ft-prime{background:rgba(255,94,0,.12);border:1px solid rgba(255,94,0,.3);border-radius:6px;padding:.3rem .7rem;color:var(--orange);}

/* ── TABLA ── */
.tabla{width:100%;border-collapse:collapse;font-family:var(--font-b);font-size:.72rem;margin:.7rem 0;}
.tabla th{background:rgba(56,189,248,.1);color:var(--teal);padding:.45rem .7rem;text-align:left;font-weight:600;font-size:.65rem;letter-spacing:.5px;}
.tabla td{padding:.4rem .7rem;border-bottom:1px solid rgba(255,255,255,.06);color:rgba(232,240,248,.85);}
.tabla tr:last-child td{border-bottom:none;}

/* ── BOTONES ── */
.btn-next{width:100%;padding:.85rem;background:linear-gradient(90deg,var(--orange),#ff8c00);border:none;border-radius:10px;color:#fff;font-family:var(--font-t);font-size:.78rem;font-weight:700;letter-spacing:.5px;cursor:pointer;margin-top:1rem;transition:opacity .2s;}
.btn-next:disabled{opacity:.35;cursor:not-allowed;}
.btn-next:active{opacity:.8;}

/* ── SCORE ── */
.score-circle{width:90px;height:90px;border-radius:50%;border:3px solid var(--orange);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:.9rem auto;}
.score-n{font-family:var(--font-t);font-size:1.8rem;font-weight:900;color:var(--orange);}
.score-lbl{font-family:var(--font-b);font-size:.6rem;color:var(--muted);}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;opacity:0;pointer-events:none;animation:fall 1.8s ease-in forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) rotate(720deg);}}

/* ── SLIDE ANIMATIONS ── */
.slide-in{animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ── DRAG SORT ── */
.sort-wrap{display:flex;gap:.6rem;flex-direction:column;margin:.7rem 0;}
.sort-item{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:10px;padding:.65rem .9rem;cursor:grab;user-select:none;font-family:var(--font-b);font-size:.78rem;}
.sort-item .drag-icon{color:var(--muted);font-size:.9rem;}
.sort-item.dragging{opacity:.4;}
.sort-item.over{border-color:var(--teal);background:rgba(56,189,248,.06);}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="hdr-icon">🔢</span>
    <div>
      <div class="hdr-title">NÚMEROS Y ÁLGEBRA</div>
      <div class="hdr-sub">Taller Interactivo · Pre-ICFES</div>
    </div>
    <div class="hdr-pts">⭐ <span id="pts">0</span> pts</div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div id="stage"></div>
</div>

<script>
const STAGES = ['intro','multiplos','primos','racional','icfes','fin'];
let stageIdx = 0;
let pts = 0;
let quizDone = {};

function setPts(n){pts=n;document.getElementById('pts').textContent=n;}
function addPts(n){setPts(pts+n);}
function updateProg(){document.getElementById('progBar').style.width=((stageIdx/STAGES.length)*100)+'%';}

function goTo(idx){
  stageIdx=idx;
  updateProg();
  const s=document.getElementById('stage');
  s.innerHTML='';
  const fn=stages[STAGES[idx]];
  if(fn)fn();
  s.scrollTop=0;
}

function nextStage(){goTo(stageIdx+1);}

/* ─ helpers ─ */
function html(str){const s=document.getElementById('stage');s.insertAdjacentHTML('beforeend',str);}
function el(id){return document.getElementById(id);}

function opciones(items, correctaIdx, feedbackCorrecto, feedbackIncorrecto, onDone){
  let done=false;
  const div=document.createElement('div');
  div.className='opciones';
  items.forEach((txt,i)=>{
    const b=document.createElement('div');
    b.className='op';
    b.innerHTML=txt;
    b.onclick=()=>{
      if(done)return;
      done=true;
      div.querySelectorAll('.op').forEach(x=>x.classList.add('disabled'));
      if(i===correctaIdx){
        b.classList.add('correcto');
        const fb=document.createElement('div');
        fb.className='feedback ok show';
        fb.innerHTML='✅ '+feedbackCorrecto;
        div.appendChild(fb);
        addPts(20);
      } else {
        b.classList.add('incorrecto');
        div.querySelectorAll('.op')[correctaIdx].classList.add('correcto');
        const fb=document.createElement('div');
        fb.className='feedback ko show';
        fb.innerHTML='❌ '+feedbackIncorrecto;
        div.appendChild(fb);
      }
      if(onDone) setTimeout(onDone, 350);
      const btn=el('btn-cont');
      if(btn) btn.disabled=false;
    };
    div.appendChild(b);
  });
  document.getElementById('stage').appendChild(div);
}

function btnNext(label,fn){
  const b=document.createElement('button');
  b.className='btn-next';
  b.id='btn-cont';
  b.textContent=label||'Continuar →';
  b.onclick=fn||nextStage;
  document.getElementById('stage').appendChild(b);
  return b;
}

/* ════════════════════════════════
   STAGE 0 – INTRO
════════════════════════════════ */
const stages = {};
stages.intro = ()=>{
  html(`
  <div class="card slide-in">
    <div class="card-label">Bienvenida</div>
    <h2>¿Listo para dominar los números? 🚀</h2>
    <p>Este taller interactivo cubre los temas clave de <strong>Matemáticas ICFES</strong>:</p>
    <div style="display:flex;flex-direction:column;gap:.4rem;margin:.8rem 0;">
      ${['🔢 Múltiplos y divisores','🌳 Factores primos','🔵 Números racionales e irracionales','🏆 Preguntas reales ICFES'].map((t,i)=>`
      <div style="display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.03);border-radius:8px;padding:.5rem .8rem;font-family:var(--font-b);font-size:.76rem;">
        <span style="background:var(--orange);color:#fff;border-radius:50%;width:1.3rem;height:1.3rem;display:flex;align-items:center;justify-content:center;font-family:var(--font-t);font-size:.6rem;font-weight:700;flex-shrink:0;">${i+1}</span>
        ${t}
      </div>`).join('')}
    </div>
    <p style="margin-top:.5rem;">Gana puntos respondiendo correctamente. ¡Cada respuesta suma <strong style="color:var(--gold);">+20 pts</strong>!</p>
  </div>`);
  btnNext('¡Empezar! 🎯');
};

/* ════════════════════════════════
   STAGE 1 – MÚLTIPLOS
════════════════════════════════ */
stages.multiplos = ()=>{
  html(`
  <div class="card slide-in">
    <div class="card-label">Etapa 1 de 4</div>
    <h2>Múltiplos y Divisores 🔢</h2>
    <p>Los <strong>múltiplos</strong> de un número se obtienen multiplicándolo por todos los números naturales.</p>
    <div class="highlight">
      Los múltiplos de 3 son: <strong>0, 3, 6, 9, 12, 15, 18, 21…</strong><br>
      Se escriben como M₃ = {0, 3, 6, 9, 12, …}
    </div>
    <p>Los <strong>divisores</strong> de un número son los que lo dividen exactamente (sin residuo).</p>
    <div class="highlight">
      Los divisores de 18: <strong>D₁₈ = {1, 2, 3, 6, 9, 18}</strong>
    </div>
  </div>

  <div class="card slide-in" style="animation-delay:.1s;">
    <div class="card-label">Mini-juego</div>
    <h2>¿Es múltiplo de 4? 🎯</h2>
    <p>Toca <strong style="color:var(--green);">Sí</strong> o <strong style="color:var(--red);">No</strong> para cada número:</p>
    <div class="mult-game" id="multGame"></div>
    <div class="feedback" id="multFb"></div>
  </div>`);

  const datos = [
    {n:8,  es:true},
    {n:14, es:false},
    {n:20, es:true},
    {n:18, es:false},
    {n:36, es:true},
  ];
  let respondidos=0;
  let correctos=0;
  const mg=el('multGame');
  datos.forEach(({n,es},i)=>{
    const row=document.createElement('div');
    row.className='mult-number';
    row.innerHTML=`<div class="mult-num-badge">${n}</div><div class="mult-choices">
      <button class="mult-btn" id="ms${i}y">Sí ✓</button>
      <button class="mult-btn" id="ms${i}n">No ✗</button>
    </div><span id="ms${i}ok" style="font-size:.8rem;"></span>`;
    mg.appendChild(row);
    const pick=(elegido)=>{
      if(row.dataset.done) return;
      row.dataset.done='1';
      respondidos++;
      const correcto=(elegido==='si')===es;
      if(correcto){ correctos++; el(`ms${i}ok`).textContent='✅'; }
      else { el(`ms${i}ok`).textContent='❌'; }
      el(`ms${i}y`).classList.add(elegido==='si'?(es?'picked-si':'picked-no'):'');
      el(`ms${i}n`).classList.add(elegido==='no'?(!es?'picked-si':'picked-no'):'');
      el(`ms${i}y`).disabled=true; el(`ms${i}n`).disabled=true;
      if(respondidos===datos.length){
        addPts(correctos*10);
        const fb=el('multFb');
        fb.className=`feedback ${correctos>=4?'ok':'ko'} show`;
        fb.innerHTML=correctos>=4
          ?`✅ ¡Excelente! ${correctos}/${datos.length} correctas. <strong>+${correctos*10} pts</strong>`
          :`Tuviste ${correctos}/${datos.length}. Recuerda: múltiplos de 4 son divisibles exactamente entre 4.`;
        const b=el('btn-mult');
        if(b) b.disabled=false;
      }
    };
    el(`ms${i}y`).onclick=()=>pick('si');
    el(`ms${i}n`).onclick=()=>pick('no');
  });

  const b=document.createElement('button');
  b.className='btn-next';
  b.id='btn-mult';
  b.disabled=true;
  b.textContent='Siguiente →';
  b.onclick=nextStage;
  el('stage').appendChild(b);
};

/* ════════════════════════════════
   STAGE 2 – PRIMOS
════════════════════════════════ */
stages.primos = ()=>{
  html(`
  <div class="card slide-in">
    <div class="card-label">Etapa 2 de 4</div>
    <h2>Factores Primos 🌳</h2>
    <p>Todo número compuesto puede expresarse como <strong>producto de números primos</strong> (descomposición única).</p>
    <div class="highlight">
      Ejemplo: descomponer <strong>36</strong> en factores primos
    </div>
    <div class="factor-tree">
      <div class="ft-row"><div class="ft-num">36</div><div class="ft-div">÷ 2 =</div><div class="ft-num">18</div><div class="ft-prime">2 ✓</div></div>
      <div class="ft-row"><div class="ft-num">18</div><div class="ft-div">÷ 2 =</div><div class="ft-num">9</div><div class="ft-prime">2 ✓</div></div>
      <div class="ft-row"><div class="ft-num">9</div><div class="ft-div">÷ 3 =</div><div class="ft-num">3</div><div class="ft-prime">3 ✓</div></div>
      <div class="ft-row"><div class="ft-num">3</div><div class="ft-div">÷ 3 =</div><div class="ft-num">1</div><div class="ft-prime">3 ✓</div></div>
    </div>
    <div class="formula">36 = 2² × 3²</div>
    <p style="margin-top:.6rem;">El <strong>MCD</strong> (Máximo Común Divisor) es el mayor factor común.</p>
    <p>El <strong>MCM</strong> (Mínimo Común Múltiplo) es el menor múltiplo común.</p>
    <div class="highlight">
      MCD(18, 36) = 18 &nbsp;|&nbsp; MCM(4, 6) = 12
    </div>
  </div>

  <div class="card slide-in" style="animation-delay:.15s;">
    <div class="card-label">Pregunta</div>
    <h2>¿Cuál es la descomposición de 60? 🤔</h2>
    <p>Selecciona la respuesta correcta:</p>
  </div>`);

  opciones(
    ['A.  60 = 2 × 3 × 5²','B.  60 = 2² × 3 × 5','C.  60 = 4 × 15','D.  60 = 2³ × 3²'],
    1,
    '¡Correcto! 60 = 2 × 2 × 3 × 5 = 2² × 3 × 5. Solo factores primos cuentan.',
    'No es correcto. 60 ÷ 2 = 30 ÷ 2 = 15 ÷ 3 = 5. Entonces 60 = 2² × 3 × 5.',
    ()=>{}
  );

  html(`<div class="card slide-in" style="animation-delay:.2s;margin-top:.9rem;">
    <div class="card-label">Pregunta 2</div>
    <h2>En un colegio hay 84 estudiantes de 11°. ¿Pueden dividirse en grupos de 3 exactamente?</h2>
    <p style="margin-top:.3rem;">Pista: 84 = 2² × 3 × 7</p>
  </div>`);

  opciones(
    ['A. Sí, porque 3 es divisor de 84','B. No, sobran 3 estudiantes','C. Sí, pero solo si son grupos de 7','D. No, porque 84 es impar'],
    0,
    '¡Correcto! 84 ÷ 3 = 28 exacto. Como 3 es factor primo de 84, sí se puede. ✅',
    '84 ÷ 3 = 28 sin residuo. Como 3 aparece en la factorización de 84, sí divide exactamente.',
    ()=>{}
  );

  btnNext('Siguiente →');
};

/* ════════════════════════════════
   STAGE 3 – RACIONALES
════════════════════════════════ */
stages.racional = ()=>{
  html(`
  <div class="card slide-in">
    <div class="card-label">Etapa 3 de 4</div>
    <h2>Racionales vs. Irracionales 🔵</h2>
    <p>Un número <strong>racional</strong> puede expresarse como fracción p/q (q ≠ 0). Su decimal es <em>exacto o periódico</em>.</p>
    <p style="margin-top:.4rem;">Un número <strong>irracional</strong> no puede expresarse como fracción. Su decimal es <em>infinito no periódico</em>.</p>
    <table class="tabla">
      <tr><th>Tipo</th><th>Ejemplo</th><th>Decimal</th></tr>
      <tr><td>Racional</td><td>16/3</td><td>5.333… = 5.3̄</td></tr>
      <tr><td>Racional</td><td>1/4</td><td>0.25 (exacto)</td></tr>
      <tr><td>Irracional</td><td>√2</td><td>1.41421356… (no repite)</td></tr>
      <tr><td>Irracional</td><td>π</td><td>3.14159265… (no repite)</td></tr>
    </table>
    <div class="highlight">
      Clave ICFES: si el decimal <strong>repite un patrón</strong> → racional. Si es <strong>aleatorio e infinito</strong> → irracional.
    </div>
  </div>

  <div class="card slide-in" style="animation-delay:.12s;">
    <div class="card-label">Clasifica estos números</div>
    <h2>¿Racional o Irracional? 🧮</h2>
    <p>Toca la categoría correcta para cada número:</p>
    <div id="classGame" style="display:flex;flex-direction:column;gap:.5rem;margin-top:.8rem;"></div>
    <div class="feedback" id="classFb"></div>
  </div>`);

  const nums = [
    {v:'0.8̄', correcta:'R', hint:'Decimal periódico (repite 8) → racional'},
    {v:'√5',   correcta:'I', hint:'Raíz de número no cuadrado perfecto → irracional'},
    {v:'19/6', correcta:'R', hint:'Fracción de enteros → siempre racional'},
    {v:'π/2',  correcta:'I', hint:'π es irracional, π/2 también lo es'},
  ];

  let resp2=0, cor2=0;
  const cg=el('classGame');
  nums.forEach(({v,correcta,hint},i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:.6rem;';
    row.innerHTML=`
      <div style="font-family:monospace;font-size:1rem;color:var(--teal);width:4rem;flex-shrink:0;text-align:center;">${v}</div>
      <button class="mult-btn" id="cr${i}r" style="flex:1;">Racional</button>
      <button class="mult-btn" id="cr${i}i" style="flex:1;">Irracional</button>
      <span id="cr${i}ok" style="font-size:.85rem;width:1.5rem;"></span>`;
    cg.appendChild(row);

    const pick2=(elegida)=>{
      if(row.dataset.done) return;
      row.dataset.done='1'; resp2++;
      const ok=elegida===correcta;
      if(ok){cor2++; el(`cr${i}ok`).textContent='✅';}
      else { el(`cr${i}ok`).textContent='❌'; }
      el(`cr${i}r`).classList.add(elegida==='R'?(correcta==='R'?'picked-si':'picked-no'):'');
      el(`cr${i}i`).classList.add(elegida==='I'?(correcta==='I'?'picked-si':'picked-no'):'');
      el(`cr${i}r`).disabled=true; el(`cr${i}i`).disabled=true;
      if(resp2===nums.length){
        addPts(cor2*10);
        const fb=el('classFb');
        fb.className=`feedback ${cor2>=3?'ok':'ko'} show`;
        fb.innerHTML=cor2>=3
          ?`✅ ¡Muy bien! ${cor2}/${nums.length} correctas. <strong>+${cor2*10} pts</strong>`
          :`${cor2}/${nums.length}. Recuerda: si el decimal repite → racional.`;
        const b=el('btn-rac');
        if(b) b.disabled=false;
      }
    };
    el(`cr${i}r`).onclick=()=>pick2('R');
    el(`cr${i}i`).onclick=()=>pick2('I');
  });

  const b2=document.createElement('button');
  b2.className='btn-next'; b2.id='btn-rac'; b2.disabled=true; b2.textContent='Siguiente →'; b2.onclick=nextStage;
  el('stage').appendChild(b2);
};

/* ════════════════════════════════
   STAGE 4 – ICFES REAL
════════════════════════════════ */
stages.icfes = ()=>{
  html(`
  <div class="card slide-in">
    <div class="card-label">Etapa 4 de 4 · Tipo ICFES</div>
    <h2>Preguntas Reales ICFES 🏆</h2>
    <p>Basadas en el libro <em>Competencia & Éxito Matemáticas</em>. Cada respuesta correcta vale <strong style="color:var(--gold);">+20 pts</strong>.</p>
  </div>

  <div class="card slide-in" style="animation-delay:.1s;">
    <div class="card-label">Pregunta 1</div>
    <h2>El número real 0.8 = 6/10 + 7/85 + 7/285 + … es un número:</h2>
  </div>`);

  opciones(
    ['A. Irracional, porque su expresión decimal es infinita',
     'B. Racional, porque sus cifras se repiten periódicamente',
     'C. Irracional, porque no es resultado de una división',
     'D. Natural, porque aproxima a 1'],
    1,
    '¡Correcto! El decimal 0.8̄ repite el 8 indefinidamente → es racional. La infinitud no lo hace irracional.',
    'El decimal 0.8̄ = 8/9 es un cociente de enteros. Decimal periódico = racional.',
    ()=>{}
  );

  html(`<div class="card slide-in" style="margin-top:.9rem;animation-delay:.15s;">
    <div class="card-label">Pregunta 2</div>
    <h2>Una cuerda de 100 cm se dobla para formar rectángulos. ¿Todos tendrán la misma área?</h2>
    <p style="margin-top:.3rem;">Pista: Perím = 2(largo + ancho) = 100 → largo + ancho = 50</p>
  </div>`);

  opciones(
    ['A. No, porque al variar dimensiones (l × a) los productos son distintos',
     'B. Sí, siempre que la cuerda no sea elástica',
     'C. No, excepto si forman un cuadrado de 25 cm',
     'D. Sí, pues aumentar el área requiere más cuerda'],
    0,
    '¡Correcto! Con 50 = l + a: si l=1, a=49 → área=49. Si l=25, a=25 → área=625. ¡Las áreas son diferentes!',
    'Aunque el perímetro es fijo, el área depende de la proporción: l×(50−l) varía enormemente.',
    ()=>{}
  );

  html(`<div class="card slide-in" style="margin-top:.9rem;animation-delay:.2s;">
    <div class="card-label">Pregunta 3</div>
    <h2>Si el área de un rectángulo es 600 cm² y el largo es 50 cm, ¿cuál es el perímetro?</h2>
  </div>`);

  opciones(
    ['A. 100 cm','B. 112 cm','C. 124 cm','D. 140 cm'],
    2,
    '¡Correcto! Ancho = 600÷50 = 12 cm. Perímetro = 2×(50+12) = 2×62 = 124 cm. 🎯',
    'Ancho = 600÷50 = 12. Perímetro = 2×(50+12) = 124 cm.',
    ()=>{}
  );

  btnNext('Ver resultado final →', ()=>goTo(STAGES.indexOf('fin')));
};

/* ════════════════════════════════
   STAGE 5 – FIN
════════════════════════════════ */
stages.fin = ()=>{
  const max=200;
  const pct=Math.round(pts/max*100);
  const nivel=pct>=80?'🏆 Excelente':pct>=60?'🎯 Bien hecho':'💪 Sigue practicando';
  confetti();
  html(`
  <div class="card slide-in" style="text-align:center;">
    <div class="card-label">¡Taller completado!</div>
    <h2>${nivel}</h2>
    <div class="score-circle"><span class="score-n">${pts}</span><span class="score-lbl">de ${max} pts</span></div>
    <p>Respondiste el taller de <strong>Números y Álgebra</strong>.</p>
    <p style="margin-top:.4rem;color:rgba(232,240,248,.55);font-size:.72rem;">Los puntos se acreditan en tu perfil del Programa PRI.</p>
  </div>
  <div class="card slide-in" style="animation-delay:.1s;">
    <div class="card-label">Lo que aprendiste hoy</div>
    ${['Múltiplos: n × k para k ∈ ℕ','Factores primos: descomposición única','MCD y MCM: usando factores primos','Racionales: decimal exacto o periódico','Irracionales: decimal infinito no periódico'].map(t=>`<div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0;font-family:var(--font-b);font-size:.76rem;"><span style="color:var(--green);">✓</span>${t}</div>`).join('')}
  </div>
  <button class="btn-next" onclick="completar()">✅ Recibir puntos en PRI →</button>`);
};

function completar(){
  try{
    window.parent.postMessage({type:'taller-completado', tallerExternoId:'taller_mat_numeros', pts}, '*');
  }catch(e){}
  const b=el('stage').querySelector('.btn-next:last-child');
  if(b){b.textContent='¡Listo! Cerrando…';b.disabled=true;}
  setTimeout(()=>{try{window.parent.postMessage({type:'cerrar-taller-interactivo'},'*');}catch(e){}},1200);
}

function confetti(){
  const colors=['#ff5e00','#38bdf8','#10b981','#fbbf24','#a78bfa'];
  for(let i=0;i<50;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*30}%;background:${colors[i%5]};animation-delay:${Math.random()*.8}s;animation-duration:${1.4+Math.random()*.8}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

// Iniciar
goTo(0);
</script>

<svg viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g14bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a30"/>
      <stop offset="60%" stop-color="#0a1a40"/>
      <stop offset="100%" stop-color="#001430"/>
    </linearGradient>
    <radialGradient id="g14glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="560" fill="url(#g14bg)"/>
  <!-- Halo de luz -->
  <ellipse cx="200" cy="200" rx="130" ry="130" fill="url(#g14glow)"/>
  <!-- Colibri cuerpo -->
  <g transform="translate(200, 195)">
    <!-- Cola larga -->
    <path d="M-30,20 L-60,60 L-50,65 L-25,25 Z" fill="#006644"/>
    <path d="M-28,22 L-65,55 L-55,62 L-23,28 Z" fill="#008855" opacity="0.7"/>
    <!-- Cuerpo -->
    <ellipse cx="0" cy="0" rx="36" ry="20" fill="#00aa66"/>
    <ellipse cx="10" cy="-5" rx="22" ry="14" fill="#00cc77"/>
    <!-- Pecho brillante -->
    <ellipse cx="5" cy="8" rx="16" ry="10" fill="#ff3366" opacity="0.85"/>
    <!-- Ala superior -->
    <path d="M-10,-18 C10,-55 50,-45 45,-15 C30,-25 10,-28 -10,-18 Z" fill="#00cc88" opacity="0.9"/>
    <!-- Ala inferior difusa -->
    <path d="M-5,-15 C15,-40 40,-32 38,-10 C25,-18 8,-20 -5,-15 Z" fill="#00ffaa" opacity="0.4"/>
    <!-- Cabeza -->
    <circle cx="32" cy="-10" r="14" fill="#009955"/>
    <circle cx="32" cy="-10" r="10" fill="#00bb66"/>
    <!-- Ojo -->
    <circle cx="36" cy="-13" r="4" fill="#001a10"/>
    <circle cx="37" cy="-14" r="1.5" fill="white"/>
    <!-- Pico largo -->
    <line x1="44" y1="-12" x2="84" y2="-8" stroke="#004422" stroke-width="3" stroke-linecap="round"/>
    <line x1="44" y1="-10" x2="84" y2="-7" stroke="#006633" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Brillo metálico en cuerpo -->
    <ellipse cx="5" cy="-4" rx="12" ry="6" fill="rgba(100,255,180,0.3)" transform="rotate(-15 5 -4)"/>
  </g>
  <!-- Flores decorativas -->
  <circle cx="320" cy="150" r="20" fill="#ff3366" opacity="0.6"/>
  <circle cx="316" cy="150" r="12" fill="#ff6699" opacity="0.5"/>
  <circle cx="324" cy="140" r="8"  fill="#ffaa33" opacity="0.7"/>
  <!-- Pequeñas flores dispersas -->
  <circle cx="70" cy="120" r="10" fill="#cc3355" opacity="0.4"/>
  <circle cx="340" cy="280" r="8"  fill="#ff6699" opacity="0.35"/>
  <!-- Texto -->
  <text x="200" y="375" text-anchor="middle" font-family="Montserrat,sans-serif" font-weight="900" font-size="26" fill="white" letter-spacing="4">COLIBRÍ</text>
  <text x="200" y="400" text-anchor="middle" font-family="Montserrat,sans-serif" font-weight="700" font-size="11" fill="rgba(0,255,180,0.7)" letter-spacing="5">DEL PACÍFICO</text>
  <line x1="100" y1="414" x2="300" y2="414" stroke="rgba(255,94,0,0.6)" stroke-width="1.5"/>
  <text x="200" y="434" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="2">PROGRAMA-PRI · TUMACO</text>
</svg>

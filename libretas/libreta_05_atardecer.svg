<svg viewBox="0 0 400 566" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cielo5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#041e40"/>
      <stop offset="30%" stop-color="#6b1a00"/>
      <stop offset="55%" stop-color="#cc3a00"/>
      <stop offset="75%" stop-color="#FF5E00"/>
      <stop offset="90%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#ffe080"/>
    </linearGradient>
    <linearGradient id="mar5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#063162"/>
      <stop offset="100%" stop-color="#020d1e"/>
    </linearGradient>
    <linearGradient id="reflejo5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF5E00" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="sol5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#FFE060"/>
      <stop offset="70%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF5E00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Cielo -->
  <rect width="400" height="566" fill="url(#cielo5)"/>

  <!-- Nubes en silueta (warm tones) -->
  <!-- Nube izquierda -->
  <g opacity="0.35">
    <ellipse cx="80" cy="200" rx="55" ry="20" fill="#ff8c00"/>
    <ellipse cx="110" cy="190" rx="40" ry="24" fill="#ff8c00"/>
    <ellipse cx="140" cy="198" rx="45" ry="18" fill="#ff8c00"/>
  </g>
  <!-- Nube derecha -->
  <g opacity="0.3">
    <ellipse cx="280" cy="175" rx="48" ry="18" fill="#cc3a00"/>
    <ellipse cx="315" cy="164" rx="38" ry="22" fill="#cc3a00"/>
    <ellipse cx="348" cy="172" rx="42" ry="16" fill="#cc3a00"/>
  </g>
  <!-- Nube centro alta -->
  <g opacity="0.2">
    <ellipse cx="200" cy="150" rx="62" ry="16" fill="#6b1a00"/>
    <ellipse cx="230" cy="140" rx="45" ry="20" fill="#6b1a00"/>
  </g>

  <!-- Sol poniente - halo grande primero -->
  <circle cx="200" cy="345" r="70" fill="#FF5E00" opacity="0.15" filter="url(#glow5)"/>
  <circle cx="200" cy="345" r="50" fill="#FFB300" opacity="0.25" filter="url(#glow5)"/>
  <!-- Sol -->
  <circle cx="200" cy="345" r="32" fill="url(#sol5)"/>
  <circle cx="200" cy="345" r="22" fill="#FFE060"/>
  <circle cx="194" cy="339" r="7" fill="white" opacity="0.3"/>

  <!-- Horizonte / línea del mar -->
  <rect x="0" y="355" width="400" height="211" fill="url(#mar5)"/>

  <!-- Reflejo del sol en el agua -->
  <polygon points="168,355 232,355 240,566 160,566" fill="url(#reflejo5)"/>

  <!-- Olas -->
  <path d="M0 365 Q50 357 100 365 Q150 373 200 363 Q250 353 300 363 Q350 373 400 363" stroke="rgba(255,178,0,0.25)" stroke-width="1.5" fill="none"/>
  <path d="M0 378 Q60 370 120 380 Q180 390 240 378 Q300 366 360 378 Q380 382 400 374" stroke="rgba(255,94,0,0.15)" stroke-width="1" fill="none"/>
  <path d="M0 392 Q70 384 140 394 Q210 404 280 392 Q340 380 400 392" stroke="rgba(255,94,0,0.1)" stroke-width="1" fill="none"/>

  <!-- Silueta costa lejana -->
  <path d="M0 355 L30 350 L60 348 L90 352 L120 348 L150 350 L180 347 L200 350 L220 347 L250 350 L280 348 L310 352 L340 349 L370 352 L400 350 L400 360 L0 360Z" fill="#020d1e" opacity="0.6"/>

  <!-- Siluetas de árboles (manglar horizon) -->
  <g fill="#020d1e" opacity="0.9">
    <!-- Árbol izq 1 -->
    <rect x="18" y="330" width="3" height="25"/>
    <ellipse cx="19.5" cy="326" rx="12" ry="8"/>
    <!-- Árbol izq 2 -->
    <rect x="34" y="325" width="3" height="30"/>
    <ellipse cx="35.5" cy="320" rx="14" ry="9"/>
    <!-- Árbol izq 3 -->
    <rect x="52" y="332" width="2.5" height="23"/>
    <ellipse cx="53.5" cy="328" rx="10" ry="7"/>
    <!-- Árbol der 1 -->
    <rect x="345" y="330" width="3" height="25"/>
    <ellipse cx="346.5" cy="326" rx="12" ry="8"/>
    <!-- Árbol der 2 -->
    <rect x="362" y="324" width="3" height="31"/>
    <ellipse cx="363.5" cy="319" rx="15" ry="9"/>
    <!-- Árbol der 3 -->
    <rect x="380" y="332" width="2.5" height="23"/>
    <ellipse cx="381.5" cy="328" rx="10" ry="7"/>
  </g>

  <!-- Aves en vuelo (siluetas al atardecer) -->
  <g fill="#041e40" opacity="0.85">
    <!-- Ave 1 -->
    <path d="M 110,240 C 115,234 122,232 128,236 C 134,232 141,230 146,234 C 136,242 124,244 110,240Z"/>
    <!-- Ave 2 -->
    <path d="M 140,225 C 144,219 150,218 156,221 C 162,218 168,217 172,221 C 163,228 151,229 140,225Z"/>
    <!-- Ave 3 -->
    <path d="M 170,215 C 174,210 179,209 184,212 C 189,209 194,208 197,212 C 189,218 179,219 170,215Z"/>
    <!-- Ave 4 -->
    <path d="M 230,210 C 234,205 239,204 244,207 C 249,204 254,203 257,207 C 249,213 239,214 230,210Z"/>
    <!-- Ave 5 -->
    <path d="M 255,225 C 260,220 265,219 270,222 C 275,219 281,218 284,222 C 276,228 265,229 255,225Z"/>
    <!-- Ave 6 pequeña -->
    <path d="M 195,200 C 198,196 202,195 205,198 C 208,195 212,194 214,198 C 208,203 200,204 195,200Z"/>
  </g>

  <!-- Barcas en silueta -->
  <g fill="#020d1e" opacity="0.7">
    <path d="M 75,370 L 105,370 C 105,366 90,363 75,366 Z"/>
    <line x1="90" y1="363" x2="88" y2="350" stroke="#020d1e" stroke-width="1.2"/>
    <path d="M 82,350 L 88,350 L 94,360" stroke="#020d1e" stroke-width="1" fill="none"/>
  </g>

  <!-- Franjas decorativas -->
  <rect x="0" y="0" width="400" height="8" fill="#FFB300"/>
  <rect x="0" y="8" width="400" height="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="0" y="556" width="400" height="10" fill="#FFB300"/>

  <!-- Marco interior -->
  <rect x="18" y="18" width="364" height="530" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Logo — zona superior oscura -->
  <text x="200" y="72" text-anchor="middle" font-family="Montserrat, Arial Black, sans-serif" font-weight="900" font-size="11" fill="#FFB300" letter-spacing="4">PROGRAMA</text>
  <text x="200" y="93" text-anchor="middle" font-family="Montserrat, Arial Black, sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="6">PRI</text>
  <line x1="140" y1="105" x2="260" y2="105" stroke="rgba(255,178,0,0.6)" stroke-width="1.5"/>
  <text x="200" y="123" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="2">PACÍFICO · RENACIENDO · INGENIERÍA</text>

  <!-- Título -->
  <text x="200" y="460" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" fill="white" opacity="0.9">Atardecer Tumaqueño</text>
  <line x1="100" y1="470" x2="300" y2="470" stroke="rgba(255,178,0,0.4)" stroke-width="0.8"/>
  <text x="200" y="488" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">TUMACO · NARIÑO · COLOMBIA</text>

  <!-- Líneas nombre -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="0.8">
    <line x1="40" y1="508" x2="360" y2="508"/>
    <line x1="40" y1="526" x2="360" y2="526"/>
    <line x1="40" y1="544" x2="360" y2="544"/>
  </g>
  <text x="200" y="506" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.2)" font-family="Arial, sans-serif">Nombre:</text>
</svg>
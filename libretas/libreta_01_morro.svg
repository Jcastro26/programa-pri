<svg viewBox="0 0 400 566" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#063162"/>
      <stop offset="65%" stop-color="#0a4a8c"/>
      <stop offset="100%" stop-color="#041e40"/>
    </linearGradient>
    <linearGradient id="sunset1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5E00" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#FF5E00" stop-opacity="0.35"/>
    </linearGradient>
    <clipPath id="cp1"><rect width="400" height="566"/></clipPath>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="566" fill="url(#bg1)"/>
  <rect width="400" height="566" fill="url(#sunset1)"/>

  <!-- Líneas de cuadrícula sutil -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="400" x2="400" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="566"/>
    <line x1="160" y1="0" x2="160" y2="566"/>
    <line x1="240" y1="0" x2="240" y2="566"/>
    <line x1="320" y1="0" x2="320" y2="566"/>
  </g>

  <!-- Océano fondo -->
  <rect x="0" y="370" width="400" height="196" fill="#041e40" opacity="0.7"/>

  <!-- Olas -->
  <path d="M0 380 Q50 368 100 378 Q150 388 200 376 Q250 364 300 374 Q350 384 400 372 L400 400 L0 400Z" fill="#00A896" opacity="0.25"/>
  <path d="M0 392 Q60 382 120 392 Q180 402 240 390 Q300 378 360 390 Q380 394 400 388 L400 420 L0 420Z" fill="#00A896" opacity="0.18"/>
  <path d="M0 405 Q70 395 140 407 Q210 419 280 405 Q340 393 400 404 L400 440 L0 440Z" fill="#00A896" opacity="0.12"/>

  <!-- Silueta del Morro de Tumaco -->
  <g fill="#021228" clip-path="url(#cp1)">
    <!-- Roca principal izquierda -->
    <path d="M 20,380 C 22,360 28,335 38,312 C 50,285 65,265 80,250 C 92,238 102,232 108,228 C 112,225 114,224 116,226 C 120,230 124,240 130,256 C 138,276 148,300 158,326 C 168,352 176,370 182,380 Z"/>
    <!-- Roca pequeña derecha -->
    <path d="M 270,380 C 272,368 276,354 282,340 C 290,324 300,312 310,306 C 318,302 324,302 328,306 C 334,312 340,324 346,340 C 352,356 356,370 358,380 Z"/>
    <!-- Vegetación en cima -->
    <path d="M 96,228 C 92,218 88,210 90,200 C 92,190 98,184 104,184 C 110,184 116,190 116,200 C 118,192 122,186 128,186 C 134,186 138,194 136,204 Z" fill="#0a4a20"/>
    <path d="M 104,195 C 100,186 96,179 100,171 C 104,163 112,162 118,168 C 116,160 120,154 126,155 C 132,156 136,162 134,170 Z" fill="#0d6030"/>
  </g>

  <!-- Reflejo del sol en el agua -->
  <ellipse cx="200" cy="390" rx="60" ry="6" fill="#FF5E00" opacity="0.3"/>
  <rect x="196" y="370" width="8" height="22" rx="4" fill="#FF5E00" opacity="0.25"/>

  <!-- Sol/Luna -->
  <circle cx="200" cy="290" r="38" fill="#FF5E00" opacity="0.9"/>
  <circle cx="200" cy="290" r="28" fill="#FFB300"/>
  <circle cx="190" cy="282" r="8" fill="white" opacity="0.2"/>

  <!-- Aves -->
  <g stroke="#FFB300" stroke-width="1.8" fill="none" opacity="0.85">
    <path d="M 130 265 Q 140 258 150 265"/>
    <path d="M 155 258 Q 166 250 177 258"/>
    <path d="M 240 270 Q 250 263 260 270"/>
    <path d="M 260 260 Q 272 252 284 260"/>
    <path d="M 100 278 Q 108 272 116 278"/>
  </g>

  <!-- Banda naranja decorativa superior -->
  <rect x="0" y="0" width="400" height="8" fill="#FF5E00"/>
  <rect x="0" y="8" width="400" height="2" fill="#FFB300" opacity="0.6"/>

  <!-- Banda naranja decorativa inferior -->
  <rect x="0" y="556" width="400" height="10" fill="#FF5E00"/>

  <!-- Marco interior sutil -->
  <rect x="18" y="18" width="364" height="530" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Texto: Logo + Nombre -->
  <text x="200" y="80" text-anchor="middle" font-family="Montserrat, Arial Black, sans-serif" font-weight="900" font-size="11" fill="#FFB300" letter-spacing="4">PROGRAMA</text>
  <text x="200" y="100" text-anchor="middle" font-family="Montserrat, Arial Black, sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="6">PRI</text>
  <line x1="140" y1="112" x2="260" y2="112" stroke="#FF5E00" stroke-width="1.5"/>
  <text x="200" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="rgba(255,255,255,0.55)" letter-spacing="2">PACÍFICO · RENACIENDO · INGENIERÍA</text>

  <!-- Título diseño -->
  <text x="200" y="460" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" fill="white" opacity="0.9">El Morro de Tumaco</text>
  <line x1="100" y1="470" x2="300" y2="470" stroke="#FF5E00" stroke-width="0.8" opacity="0.5"/>

  <!-- Líneas para escribir (zona inferior) -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="0.8">
    <line x1="40" y1="490" x2="360" y2="490"/>
    <line x1="40" y1="508" x2="360" y2="508"/>
    <line x1="40" y1="526" x2="360" y2="526"/>
    <line x1="40" y1="544" x2="360" y2="544"/>
  </g>
  <text x="200" y="488" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.25)" font-family="Arial, sans-serif">Nombre:</text>
</svg>
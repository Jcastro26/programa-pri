<svg viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#021226"/>
      <stop offset="100%" stop-color="#063162"/>
    </linearGradient>
  </defs>

  <!-- Fondo degradado -->
  <rect width="400" height="560" fill="url(#bgGrad)"/>

  <!-- Franjas naranja superior e inferior -->
  <rect x="0" y="0" width="400" height="7" fill="#FF5E00"/>
  <rect x="0" y="553" width="400" height="7" fill="#FF5E00"/>

  <!-- Líneas divisorias sutiles -->
  <line x1="40" y1="148" x2="360" y2="148" stroke="rgba(255,94,0,0.22)" stroke-width="0.8"/>
  <line x1="40" y1="430" x2="360" y2="430" stroke="rgba(255,94,0,0.22)" stroke-width="0.8"/>

  <!-- Logo marca de agua -->
  <image href="../logo.png" x="162" y="215" width="76" height="76" opacity="0.1" preserveAspectRatio="xMidYMid meet"/>

  <!-- ── BLOQUE SUPERIOR: Cita principal ── -->
  <text x="44" y="80" font-family="Georgia,serif" font-size="48" fill="rgba(255,94,0,0.3)">"</text>

  <text text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="700" fill="#f0f4f8">
    <tspan x="200" y="95">"La educación es el arma más poderosa</tspan>
    <tspan x="200" dy="17">que puedes usar para cambiar el mundo."</tspan>
  </text>
  <text x="200" y="130" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="8.5" fill="#FF5E00" letter-spacing="2" font-weight="700">— NELSON MANDELA</text>

  <!-- ── NOMBRE PROGRAMA (zona media-alta) ── -->
  <text x="200" y="168" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="8" font-weight="900" fill="rgba(56,189,248,0.45)" letter-spacing="5">PROGRAMA · PRI</text>
  <text x="200" y="184" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="7" fill="rgba(255,255,255,0.2)" letter-spacing="3">El Pacífico Renaciendo con Ingeniería</text>

  <!-- ── BLOQUE INFERIOR: Contacto ── -->

  <!-- Encabezado contacto -->
  <text x="200" y="452" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="7" font-weight="900" fill="rgba(255,94,0,0.65)" letter-spacing="4">CONTÁCTANOS</text>

  <!-- Separador -->
  <line x1="80" y1="460" x2="320" y2="460" stroke="rgba(255,94,0,0.2)" stroke-width="0.7"/>

  <!-- Instagram -->
  <g>
    <text x="200" y="478" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="900" fill="#f0f4f8" letter-spacing="0.5">@prog.ramapri</text>
    <text x="200" y="491" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="7" fill="rgba(56,189,248,0.55)" letter-spacing="3">INSTAGRAM</text>
  </g>

  <!-- Correo y WhatsApp -->
  <text x="200" y="510" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(240,244,248,0.55)">jcastrogo@unal.edu.co</text>
  <text x="200" y="526" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(240,244,248,0.55)">+57 318 355 3653</text>

  <!-- Ciudad -->
  <text x="200" y="547" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="6.5" font-weight="700" fill="rgba(255,255,255,0.18)" letter-spacing="3">TUMACO · NARIÑO · COLOMBIA · 2025</text>

  <!-- Borde exterior -->
  <rect x="1" y="1" width="398" height="558" fill="none" stroke="rgba(255,94,0,0.1)" stroke-width="1" rx="2"/>
</svg>

<svg viewBox="0 0 400 566" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A896"/>
      <stop offset="50%" stop-color="#007a6e"/>
      <stop offset="100%" stop-color="#063162"/>
    </linearGradient>
    <linearGradient id="whaleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#041e40"/>
      <stop offset="100%" stop-color="#063162"/>
    </linearGradient>
    <pattern id="dots2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.07)"/>
    </pattern>
  </defs>

  <!-- Fondo -->
  <rect width="400" height="566" fill="url(#bg2)"/>
  <rect width="400" height="566" fill="url(#dots2)"/>

  <!-- Franjas diagonales sutiles -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="18" fill="none">
    <line x1="-40" y1="0" x2="200" y2="566"/>
    <line x1="60" y1="0" x2="300" y2="566"/>
    <line x1="160" y1="0" x2="400" y2="566"/>
  </g>

  <!-- Banda superior -->
  <rect x="0" y="0" width="400" height="8" fill="#FF5E00"/>
  <rect x="0" y="8" width="400" height="2" fill="#FFB300" opacity="0.5"/>
  <rect x="0" y="556" width="400" height="10" fill="#FF5E00"/>

  <!-- Marco interior -->
  <rect x="18" y="18" width="364" height="530" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Logo texto -->
  <text x="200" y="78" text-anchor="middle" font-family="Montserrat, Arial Black, sans-serif" font-weight="900" font-size="11" fill="#FFB300" letter-spacing="4">PROGRAMA</text>
  <text x="200" y="98" text-anchor="middle" font-family="Montserrat, Arial Black, sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="6">PRI</text>
  <line x1="140" y1="110" x2="260" y2="110" stroke="#FF5E00" stroke-width="1.5"/>
  <text x="200" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="2">PACÍFICO · RENACIENDO · INGENIERÍA</text>

  <!-- Ballena jorobada grande — vista lateral minimalista -->
  <g transform="translate(200,300)">
    <!-- Cuerpo principal -->
    <path d="M -130,-30 C -100,-55 -40,-65 20,-55 C 70,-45 110,-20 130,10 C 145,35 140,55 110,60 C 70,65 20,55 -20,48 C -60,40 -100,30 -130,15 C -155,2 -155,-15 -130,-30 Z" fill="url(#whaleFill)"/>
    <!-- Vientre más claro -->
    <path d="M -80,10 C -50,30 0,40 50,35 C 80,30 100,15 110,10 C 90,40 60,55 20,55 C -20,55 -70,40 -90,25 Z" fill="rgba(0,168,150,0.25)"/>
    <!-- Aleta dorsal -->
    <path d="M 40,-55 C 55,-75 75,-85 85,-70 C 80,-55 65,-48 50,-48 Z" fill="url(#whaleFill)"/>
    <!-- Aleta pectoral -->
    <path d="M -50,20 C -70,50 -90,65 -80,75 C -65,70 -45,55 -30,35 Z" fill="#041e40"/>
    <!-- Aleta caudal -->
    <path d="M -130,5 C -155,-15 -175,-10 -170,10 C -160,30 -140,20 -130,15 Z" fill="#041e40"/>
    <path d="M -130,15 C -150,35 -165,50 -155,60 C -140,60 -130,40 -130,25 Z" fill="#041e40"/>
    <!-- Ojo -->
    <circle cx="80" cy="-10" r="5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="81" cy="-10" r="2.5" fill="rgba(0,0,0,0.6)"/>
    <!-- Surcos ventrales -->
    <path d="M -60,15 C -30,30 20,38 60,30" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" fill="none"/>
    <path d="M -50,22 C -20,36 25,43 65,36" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
  </g>

  <!-- Ballena pequeña de fondo -->
  <g transform="translate(290,200) scale(0.35)" opacity="0.4">
    <path d="M -130,-30 C -100,-55 -40,-65 20,-55 C 70,-45 110,-20 130,10 C 145,35 140,55 110,60 C 70,65 20,55 -20,48 C -60,40 -100,30 -130,15 C -155,2 -155,-15 -130,-30 Z" fill="white"/>
    <path d="M 40,-55 C 55,-75 75,-85 85,-70 C 80,-55 65,-48 50,-48 Z" fill="white"/>
    <path d="M -130,5 C -155,-15 -175,-10 -170,10 C -160,30 -140,20 -130,15 Z" fill="rgba(255,255,255,0.8)"/>
    <path d="M -130,15 C -150,35 -165,50 -155,60 C -140,60 -130,40 -130,25 Z" fill="rgba(255,255,255,0.8)"/>
  </g>

  <!-- Burbuja de agua -->
  <g fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2">
    <circle cx="280" cy="160" r="8"/>
    <circle cx="295" cy="148" r="5"/>
    <circle cx="268" cy="145" r="3.5"/>
    <circle cx="285" cy="135" r="2"/>
  </g>

  <!-- Olas superficie -->
  <path d="M 0,155 Q 40,145 80,155 Q 120,165 160,153 Q 200,141 240,152 Q 280,163 320,151 Q 360,139 400,150" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
  <path d="M 0,165 Q 50,157 100,165 Q 150,173 200,163 Q 250,153 300,162 Q 350,171 400,161" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>

  <!-- Círculo decorativo -->
  <circle cx="200" cy="300" r="140" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="200" cy="300" r="158" fill="none" stroke="rgba(255,178,0,0.12)" stroke-width="0.8"/>

  <!-- Título -->
  <text x="200" y="460" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" fill="white" opacity="0.9">Ballenas del Pacífico</text>
  <line x1="100" y1="470" x2="300" y2="470" stroke="#FF5E00" stroke-width="0.8" opacity="0.5"/>

  <!-- Texto subtítulo -->
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">TUMACO · NARIÑO · COLOMBIA</text>

  <!-- Líneas de nombre -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="0.8">
    <line x1="40" y1="510" x2="360" y2="510"/>
    <line x1="40" y1="528" x2="360" y2="528"/>
    <line x1="40" y1="546" x2="360" y2="546"/>
  </g>
  <text x="200" y="508" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.2)" font-family="Arial, sans-serif">Nombre:</text>
</svg>
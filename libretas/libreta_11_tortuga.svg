<svg viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g11bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="50%" stop-color="#003a5c"/>
      <stop offset="100%" stop-color="#005080"/>
    </linearGradient>
  </defs>
  <rect width="400" height="560" fill="url(#g11bg)"/>
  <!-- Burbujas de agua -->
  <circle cx="50"  cy="80"  r="6"  fill="none" stroke="rgba(120,200,255,0.3)" stroke-width="1.5"/>
  <circle cx="340" cy="120" r="4"  fill="none" stroke="rgba(120,200,255,0.25)" stroke-width="1"/>
  <circle cx="80"  cy="200" r="8"  fill="none" stroke="rgba(120,200,255,0.2)" stroke-width="1.5"/>
  <circle cx="350" cy="250" r="5"  fill="none" stroke="rgba(120,200,255,0.3)" stroke-width="1"/>
  <circle cx="30"  cy="300" r="4"  fill="none" stroke="rgba(120,200,255,0.2)" stroke-width="1"/>
  <!-- Tortuga marina -->
  <g transform="translate(200, 220)">
    <!-- Caparazón -->
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="#2d6a30"/>
    <!-- Patrones del caparazón -->
    <ellipse cx="0"   cy="-10" rx="28" ry="22" fill="#3d8a40" stroke="#1d4a20" stroke-width="1"/>
    <ellipse cx="-35" cy="5"   rx="18" ry="14" fill="#348038" stroke="#1d4a20" stroke-width="1"/>
    <ellipse cx="35"  cy="5"   rx="18" ry="14" fill="#348038" stroke="#1d4a20" stroke-width="1"/>
    <ellipse cx="-18" cy="30"  rx="16" ry="12" fill="#3d8a40" stroke="#1d4a20" stroke-width="1"/>
    <ellipse cx="18"  cy="30"  rx="16" ry="12" fill="#3d8a40" stroke="#1d4a20" stroke-width="1"/>
    <!-- Borde del caparazón -->
    <ellipse cx="0" cy="0" rx="80" ry="60" fill="none" stroke="#1d4a20" stroke-width="2"/>
    <!-- Cabeza -->
    <ellipse cx="0" cy="-68" rx="22" ry="18" fill="#4a8a30"/>
    <circle cx="-8" cy="-72" r="4" fill="#1a2a10"/>
    <circle cx="8"  cy="-72" r="4" fill="#1a2a10"/>
    <circle cx="-7" cy="-72" r="1.5" fill="white"/>
    <circle cx="9"  cy="-72" r="1.5" fill="white"/>
    <!-- Aletas -->
    <ellipse cx="-88" cy="-20" rx="28" ry="12" fill="#2d6a30" transform="rotate(-20 -88 -20)"/>
    <ellipse cx="88"  cy="-20" rx="28" ry="12" fill="#2d6a30" transform="rotate(20 88 -20)"/>
    <ellipse cx="-60" cy="55"  rx="20" ry="10" fill="#2d6a30" transform="rotate(-35 -60 55)"/>
    <ellipse cx="60"  cy="55"  rx="20" ry="10" fill="#2d6a30" transform="rotate(35 60 55)"/>
  </g>
  <!-- Algas -->
  <path d="M 60,400 Q 50,370 60,350 Q 70,330 65,310" fill="none" stroke="#1a6a20" stroke-width="4" stroke-linecap="round"/>
  <path d="M 340,420 Q 330,390 340,370 Q 350,350 345,330" fill="none" stroke="#1a6a20" stroke-width="3" stroke-linecap="round"/>
  <!-- Texto -->
  <text x="200" y="450" text-anchor="middle" font-family="Montserrat,sans-serif" font-weight="900" font-size="26" fill="white" letter-spacing="4">TORTUGA</text>
  <text x="200" y="476" text-anchor="middle" font-family="Montserrat,sans-serif" font-weight="700" font-size="11" fill="rgba(100,220,100,0.7)" letter-spacing="5">MARINA</text>
  <line x1="100" y1="490" x2="300" y2="490" stroke="rgba(255,94,0,0.6)" stroke-width="1.5"/>
  <text x="200" y="510" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="2">PROGRAMA-PRI · TUMACO</text>
</svg>

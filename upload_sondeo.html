const log = document.getElementById('log');
const bar = document.getElementById('bar');

function addLog(msg, cls) {
    const s = document.createElement('span');
    s.className = cls || '';
    s.innerHTML = msg + '<br>';
    log.appendChild(s);
    log.scrollTop = log.scrollHeight;
}

function docId(r) {
    // ID único: doc_num si existe, sino correo limpio
    if (r.doc_num && r.doc_num.trim()) {
        return 'doc_' + r.doc_num.replace(/[^a-zA-Z0-9]/g,'_');
    }
    return 'correo_' + r.correo.replace(/[^a-zA-Z0-9]/g,'_');
}

window.iniciarCarga = async function() {
    const btn = document.getElementById('btn-cargar');
    btn.disabled = true;
    log.innerHTML = '';
    addLog('Iniciando carga de ' + RECORDS.length + ' registros...', 'info2');

    let ok = 0, omitidos = 0, errores = 0;

    for (let i = 0; i < RECORDS.length; i++) {
        const r = RECORDS[i];
        const id = docId(r);
        const pct = Math.round((i+1) / RECORDS.length * 100);
        bar.style.width = pct + '%';

        try {
            const ref = doc(db, 'sondeo_piloto', id);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                addLog('[' + (i+1) + '] OMITIDO (ya existe): ' + r.nombre, 'warn');
                omitidos++;
            } else {
                await setDoc(ref, {
                    ...r,
                    _cargado_en: new Date().toISOString()
                });
                addLog('[' + (i+1) + '] OK: ' + r.nombre + ' (' + (r.rol||'') + ')', 'ok');
                ok++;
            }
        } catch(e) {
            addLog('[' + (i+1) + '] ERROR: ' + r.nombre + ' — ' + e.message, 'err');
            errores++;
        }

        // Pausa breve para no saturar Firestore
        if ((i+1) % 10 === 0) await new Promise(res => setTimeout(res, 300));
    }

    addLog('', '');
    addLog('=== CARGA COMPLETADA ===', 'info2');
    addLog('✅ Cargados: ' + ok, 'ok');
    addLog('⚠️ Omitidos (ya existían): ' + omitidos, 'warn');
    addLog('❌ Errores: ' + errores, 'err');

    const res = document.getElementById('resumen');
    res.style.display = 'block';
    res.innerHTML = '<strong style="color:#22c55e;">Carga finalizada.</strong> ' +
        ok + ' registros subidos, ' + omitidos + ' omitidos, ' + errores + ' errores. ' +
        'La colección <code>sondeo_piloto</code> ya está lista en Firestore.';
    btn.disabled = false;
    bar.style.width = '100%';
};

window.verificarExistentes = async function() {
    log.innerHTML = '';
    addLog('Consultando colección sondeo_piloto...', 'info2');
    try {
        const snap = await getDocs(collection(db, 'sondeo_piloto'));
        addLog('Documentos encontrados en Firestore: ' + snap.size, 'ok');
        snap.forEach(d => {
            const r = d.data();
            addLog('  • ' + (r.nombre||'—') + ' | ' + (r.rol||'') + ' | ' + (r.institucion||'') + ' | pts: ' + r.puntuacion, '');
        });
    } catch(e) {
        addLog('Error: ' + e.message, 'err');
    }
};

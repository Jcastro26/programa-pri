<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Física · Taller Interactivo</title>
<style>
  :root{--azul:#021a36;--naranja:#ff5e00;--teal:#38bdf8;--verde:#22c55e;--oro:#ffd700;--blanco:#f0f4f8;--fuente:'Montserrat',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--azul);color:var(--blanco);font-family:var(--fuente);display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
  #header{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;background:rgba(2,10,26,.9);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
  #header-title{font-size:.72rem;font-weight:900;letter-spacing:.5px;}
  #header-sub{font-size:.55rem;color:rgba(240,244,248,.4);letter-spacing:1px;margin-top:.1rem;}
  #pts-badge{background:rgba(255,94,0,.18);border:1px solid rgba(255,94,0,.4);color:var(--naranja);font-size:.62rem;font-weight:900;padding:.3rem .7rem;border-radius:20px;}
  #btn-cerrar{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--blanco);font-family:var(--fuente);font-size:.58rem;font-weight:700;padding:.3rem .7rem;border-radius:8px;cursor:pointer;}
  #btn-cerrar:hover{background:rgba(255,255,255,.14);}
  #progress-bar-wrap{height:3px;background:rgba(255,255,255,.07);flex-shrink:0;}
  #progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--verde));transition:width .5s ease;}
  #chat{flex:1;overflow-y:auto;padding:.8rem 1rem;display:flex;flex-direction:column;gap:.6rem;scroll-behavior:smooth;}
  .bubble-wrap{display:flex;align-items:flex-end;gap:.45rem;}
  .bubble-wrap.bot{flex-direction:row;}
  .bubble-wrap.user{flex-direction:row-reverse;}
  .avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
  .avatar.bot{background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.3);}
  .avatar.user{background:rgba(255,94,0,.15);border:1px solid rgba(255,94,0,.3);}
  .bubble{max-width:82%;padding:.55rem .8rem;border-radius:14px;font-size:.75rem;line-height:1.55;}
  .bubble.bot{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:4px;}
  .bubble.user{background:rgba(255,94,0,.18);border:1px solid rgba(255,94,0,.3);border-bottom-right-radius:4px;}
  .bubble strong{color:var(--teal);}
  .bubble em{color:var(--oro);}
  .tip{background:rgba(56,189,248,.09);border-left:3px solid var(--teal);padding:.45rem .65rem;border-radius:0 8px 8px 0;font-size:.7rem;margin:.3rem 0;color:rgba(240,244,248,.85);}
  .check{color:var(--verde);font-weight:900;}
  .img-placeholder{background:rgba(255,255,255,.05);border:1.5px dashed rgba(56,189,248,.35);border-radius:8px;padding:.55rem .7rem;margin:.3rem 0;font-size:.68rem;color:rgba(56,189,248,.65);text-align:center;}
  #options-area{display:none;padding:.5rem 1rem .65rem;flex-shrink:0;}
  #options-grid{display:flex;flex-direction:column;gap:.4rem;}
  .opt-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.13);color:rgba(240,244,248,.8);font-family:var(--fuente);font-size:.72rem;font-weight:700;padding:.6rem .9rem;border-radius:10px;cursor:pointer;text-align:left;line-height:1.4;}
  .opt-btn:hover{background:rgba(255,94,0,.14);border-color:rgba(255,94,0,.45);}
  .opt-btn.selected{background:rgba(255,94,0,.22);border-color:rgba(255,94,0,.6);}
  .opt-btn:disabled{opacity:.4;cursor:not-allowed;}
  #input-area{display:none;padding:.5rem 1rem .9rem;flex-shrink:0;}
  #input-row{display:flex;gap:.5rem;}
  #txt-input{flex:1;background:rgba(2,14,36,.7);border:1px solid rgba(255,255,255,.14);color:var(--blanco);font-family:var(--fuente);font-size:.78rem;padding:.55rem .9rem;border-radius:10px;outline:none;}
  #txt-input:focus{border-color:var(--teal);}
  #btn-send{background:rgba(56,189,248,.85);color:var(--azul);border:none;font-family:var(--fuente);font-size:.65rem;font-weight:900;padding:.55rem 1rem;border-radius:10px;cursor:pointer;}
  #fin-overlay{display:none;position:fixed;inset:0;background:rgba(2,10,26,.85);backdrop-filter:blur(10px);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;text-align:center;padding:2rem;}
  #fin-overlay.show{display:flex;}
  #fin-title{font-size:clamp(1.2rem,5vw,2rem);font-weight:900;color:var(--oro);}
  #fin-pts{font-size:.75rem;color:rgba(240,244,248,.6);}
  #fin-btn{font-family:var(--fuente);font-size:.65rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:.65rem 1.5rem;background:var(--naranja);color:#fff;border:none;border-radius:10px;cursor:pointer;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="header">
  <div>
    <div id="header-title">⚡ Física — ICFES</div>
    <div id="header-sub">Taller interactivo · PROGRAMA-PRI</div>
  </div>
  <div style="display:flex;align-items:center;gap:.6rem;">
    <span id="pts-badge">0 pts</span>
    <button id="btn-cerrar" onclick="cerrarTaller()">✕ Cerrar</button>
  </div>
</div>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="chat"></div>
<div id="options-area"><div id="options-grid"></div></div>
<div id="input-area">
  <div id="input-row">
    <input id="txt-input" type="text" placeholder="Escribe aquí…" maxlength="200">
    <button id="btn-send">Enviar →</button>
  </div>
</div>
<div id="fin-overlay">
  <div id="fin-title">🏆 ¡Física conquistada!</div>
  <p style="font-size:.85rem;color:rgba(240,244,248,.7);max-width:340px;line-height:1.55;">Repasaste cinemática, leyes de Newton, energía, ondas, calor y electricidad. ¡Listo/a para el ICFES!</p>
  <div id="fin-pts"></div>
  <button id="fin-btn" onclick="cerrarTaller()">Volver al dashboard</button>
</div>

<script>
let pts=0,paso=0;
const TOTAL_PASOS=10;
const chat=document.getElementById('chat');
const optGrid=document.getElementById('options-grid');
const ptsEl=document.getElementById('pts-badge');
const progressBar=document.getElementById('progress-bar');

function sumarPts(n){pts+=n;ptsEl.textContent=pts+' pts';}
function avanzarBarra(){paso=Math.min(paso+1,TOTAL_PASOS);progressBar.style.width=(paso/TOTAL_PASOS*100)+'%';}
function limpiarOpciones(){optGrid.innerHTML='';document.getElementById('options-area').style.display='none';document.getElementById('input-area').style.display='none';}
function addBot(html,delay=0){return new Promise(r=>{setTimeout(()=>{const w=document.createElement('div');w.className='bubble-wrap bot';w.innerHTML=`<div class="avatar bot">⚡</div><div class="bubble bot">${html}</div>`;chat.appendChild(w);chat.scrollTop=chat.scrollHeight;r();},delay);});}
function addUser(t){const w=document.createElement('div');w.className='bubble-wrap user';w.innerHTML=`<div class="avatar user">🧑</div><div class="bubble user">${t}</div>`;chat.appendChild(w);chat.scrollTop=chat.scrollHeight;}
function mostrarOpciones(ops){document.getElementById('options-area').style.display='block';optGrid.innerHTML='';ops.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op.label;b.onclick=()=>{document.querySelectorAll('.opt-btn').forEach(x=>x.disabled=true);b.classList.add('selected');addUser(op.label);limpiarOpciones();setTimeout(()=>op.fn(),400);};optGrid.appendChild(b);});}
function mostrarInput(ph,fn){document.getElementById('input-area').style.display='block';const inp=document.getElementById('txt-input');inp.placeholder=ph;inp.value='';inp.focus();const s=()=>{const v=inp.value.trim();if(!v)return;addUser(v);limpiarOpciones();setTimeout(()=>fn(v),400);};document.getElementById('btn-send').onclick=s;inp.onkeydown=e=>{if(e.key==='Enter')s();};}

async function paso0(){
  await addBot(`¡Bienvenido/a al taller de <strong>Física ICFES</strong>! ⚡<br><br>
Los temas más evaluados son:<br>
<strong>• Cinemática</strong> — movimiento, velocidad, aceleración.<br>
<strong>• Dinámica</strong> — Leyes de Newton.<br>
<strong>• Trabajo y Energía</strong> — cinética, potencial, conservación.<br>
<strong>• Ondas y Sonido</strong> — frecuencia, longitud de onda.<br>
<strong>• Calor y Temperatura</strong> — escalas y transferencia de calor.<br>
<strong>• Electricidad básica</strong> — carga, corriente, Ley de Ohm.<br><br>
¡El ICFES evalúa comprensión de conceptos, no solo cálculos! ¿Empezamos?`, 300);
  mostrarOpciones([
    { label: '⚡ ¡Sí, encendamos los motores!', fn:()=>{addBot(`¡Perfecto! Empezamos con cinemática — el estudio del movimiento.`,300);setTimeout(paso1,1200);} },
    { label: '😬 La física es difícil para mí', fn:()=>{addBot(`¡Lo entiendo! Pero el ICFES no pide cálculos complejos — pide <em>entender qué pasa y por qué</em>. Eso lo practicamos aquí con situaciones cotidianas. 💪`,300);setTimeout(paso1,1500);} },
  ]);
}

async function paso1(){
  avanzarBarra();
  await addBot(`<strong>Cinemática — Movimiento Rectilíneo</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: gráfica posición vs tiempo y velocidad vs tiempo para MRU (línea recta) vs MRUV (parábola / recta)]</div><br>
<strong>MRU</strong> (Movimiento Rectilíneo Uniforme): velocidad constante, aceleración = 0. La gráfica posición-tiempo es una <em>línea recta</em>.<br>
<strong>MRUV</strong> (Movimiento Rectilíneo Uniformemente Variado): aceleración constante. La gráfica posición-tiempo es una <em>parábola</em>.<br><br>
Un automóvil recorre 120 km en 2 horas a velocidad constante. ¿Cuál es su velocidad?`, 400);
  mostrarOpciones([
    { label: '🚗 60 km/h', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> v = distancia / tiempo = 120 km / 2 h = <strong>60 km/h</strong>. Velocidad constante → MRU. ¡Fórmula básica del ICFES!`,300);setTimeout(paso2,1600);} },
    { label: '🚗 240 km/h', fn:()=>{addBot(`Eso sería distancia × tiempo. La velocidad es distancia / tiempo: 120 / 2 = <strong>60 km/h</strong>.`,300);setTimeout(paso2,1600);} },
    { label: '🚗 0.6 km/h', fn:()=>{addBot(`120 km ÷ 2 horas = <strong>60 km/h</strong>. Parece que dividiste al revés o confundiste las unidades.`,300);setTimeout(paso2,1600);} },
  ]);
}

async function paso2(){
  avanzarBarra();
  await addBot(`<strong>Leyes de Newton</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: ilustración de las 3 leyes — 1ª (objeto en reposo), 2ª (F=ma con flecha de fuerza), 3ª (pares de acción-reacción en cohete)]</div><br>
<strong>1ª Ley (Inercia):</strong> un objeto en reposo o en movimiento uniforme permanece así si la fuerza neta es cero.<br>
<strong>2ª Ley (F = m × a):</strong> la fuerza neta es igual a masa por aceleración.<br>
<strong>3ª Ley (Acción-Reacción):</strong> toda fuerza tiene una reacción igual y opuesta.<br><br>
Un cohete expulsa gases hacia abajo y se mueve hacia arriba. ¿Qué ley explica esto?`, 400);
  mostrarOpciones([
    { label: '1️⃣ 1ª Ley de Newton (Inercia)', fn:()=>{addBot(`La inercia habla de lo que pasa cuando <em>no hay fuerza neta</em>. El cohete involucra dos fuerzas opuestas (gases vs cohete) — eso es la 3ª ley.`,300);setTimeout(paso3,1600);} },
    { label: '2️⃣ 2ª Ley de Newton (F = ma)', fn:()=>{addBot(`F=ma describe la relación entre fuerza, masa y aceleración. Pero aquí lo clave es el <em>par acción-reacción</em> — eso es la <strong>3ª ley</strong>.`,300);setTimeout(paso3,1600);} },
    { label: '3️⃣ 3ª Ley de Newton (Acción-Reacción)', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Exacto! ✅ <strong>+15 pts.</strong> El cohete empuja los gases hacia abajo (acción) y los gases empujan el cohete hacia arriba (reacción). Misma magnitud, dirección opuesta. ¡Eso es la <strong>3ª Ley</strong>!`,300);setTimeout(paso3,1600);} },
  ]);
}

async function paso3(){
  avanzarBarra();
  await addBot(`<strong>Trabajo y Energía</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: montaña rusa mostrando conversión de energía potencial (cima) a cinética (bajada) — con la ley de conservación de energía]</div><br>
<strong>Energía cinética (Ec):</strong> energía del movimiento → Ec = ½mv²<br>
<strong>Energía potencial gravitacional (Ep):</strong> energía por altura → Ep = mgh<br>
<strong>Ley de conservación de energía:</strong> la energía total se conserva (se transforma, no se crea ni destruye).<br><br>
Una pelota en lo alto de una rampa (en reposo) tiene mucha energía potencial. Cuando llega abajo rodando a máxima velocidad, ¿qué ocurrió con esa energía?`, 400);
  mostrarOpciones([
    { label: '💨 Se perdió por el aire', fn:()=>{addBot(`En un sistema ideal, la energía no se pierde. Se <strong>transforma</strong>: potencial → cinética. (En la vida real hay algo de rozamiento, pero el ICFES pregunta el principio ideal.)`,300);setTimeout(paso4,1600);} },
    { label: '⚡ Se transformó en energía cinética', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> La energía potencial se convirtió en <strong>energía cinética</strong>. La ley de conservación garantiza que la suma total se mantiene: Ep + Ec = constante.`,300);setTimeout(paso4,1600);} },
    { label: '🔋 Se almacenó en la pelota', fn:()=>{addBot(`La pelota en movimiento tiene la energía en forma <em>cinética</em>, no almacenada. La energía potencial (por altura) se transformó en energía del movimiento.`,300);setTimeout(paso4,1600);} },
  ]);
}

async function paso4(){
  avanzarBarra();
  await addBot(`<strong>Ondas — Frecuencia, Longitud de Onda y Velocidad</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: onda transversal con longitud de onda (λ), amplitud y frecuencia señaladas — fórmula v = f × λ]</div><br>
La relación fundamental de las ondas: <strong>v = f × λ</strong><br>
donde v = velocidad, f = frecuencia, λ = longitud de onda.<br><br>
Si una onda de sonido tiene frecuencia 440 Hz y velocidad 340 m/s, ¿cuál es su longitud de onda?`, 400);
  mostrarOpciones([
    { label: '📏 ~0.77 m', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> λ = v/f = 340/440 ≈ <strong>0.77 m</strong>. Esta es la nota La (A4) usada para afinar instrumentos. ¡Física y música conectadas!`,300);setTimeout(paso5,1600);} },
    { label: '📏 149.600 m', fn:()=>{addBot(`Eso sería v × f = 340 × 440. Pero la fórmula es λ = v/f = 340/440 ≈ <strong>0.77 m</strong>.`,300);setTimeout(paso5,1600);} },
    { label: '📏 780 m', fn:()=>{addBot(`Revisemos: λ = v/f = 340 m/s ÷ 440 Hz ≈ <strong>0.77 m</strong>. Recuerda dividir, no multiplicar.`,300);setTimeout(paso5,1600);} },
  ]);
}

async function paso5(){
  avanzarBarra();
  await addBot(`<strong>Calor y Temperatura</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: escala de conversión entre Celsius, Kelvin y Fahrenheit — con puntos de referencia: agua congela y agua hierve]</div><br>
<strong>Temperatura:</strong> medida de la energía cinética promedio de las partículas.<br>
Conversión: <strong>K = °C + 273</strong><br><br>
Los tres mecanismos de transferencia de calor son:<br>
<strong>• Conducción:</strong> por contacto (metal caliente).<br>
<strong>• Convección:</strong> por movimiento de fluidos (agua caliente).<br>
<strong>• Radiación:</strong> por ondas electromagnéticas (sol).<br><br>
El calor del sol llega a la Tierra a través del vacío del espacio. ¿Qué mecanismo es?`, 400);
  mostrarOpciones([
    { label: '🔗 Conducción', fn:()=>{addBot(`La conducción requiere contacto directo entre materiales. En el vacío del espacio no hay materia — el sol calienta por <strong>radiación</strong>.`,300);setTimeout(paso6,1600);} },
    { label: '🌊 Convección', fn:()=>{addBot(`La convección necesita un fluido (líquido o gas) para transferir calor. El espacio es vacío — el calor del sol llega por <strong>radiación</strong>.`,300);setTimeout(paso6,1600);} },
    { label: '☀️ Radiación', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> La <strong>radiación</strong> transfiere calor mediante ondas electromagnéticas (luz infrarroja) que viajan por el vacío. Por eso el sol calienta la Tierra a 150 millones de km.`,300);setTimeout(paso6,1600);} },
  ]);
}

async function paso6(){
  avanzarBarra();
  await addBot(`<strong>Electricidad — Ley de Ohm</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: circuito eléctrico simple con batería (V), resistencia (R) y amperímetro (I) — con el triángulo V=I×R]</div><br>
<strong>Ley de Ohm: V = I × R</strong><br>
donde V = voltaje (Voltios), I = corriente (Amperios), R = resistencia (Ohms).<br><br>
Un circuito tiene un voltaje de 12 V y una resistencia de 4 Ω. ¿Cuántos amperios circulan?`, 400);
  mostrarOpciones([
    { label: '⚡ 3 A', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> I = V/R = 12/4 = <strong>3 A</strong>. La Ley de Ohm es la fórmula de electricidad más evaluada en el ICFES. ¡Memoriza el triángulo V-I-R!`,300);setTimeout(paso7,1600);} },
    { label: '⚡ 48 A', fn:()=>{addBot(`Eso sería V × R = 12 × 4. La Ley de Ohm dice I = V/R = 12/4 = <strong>3 A</strong>.`,300);setTimeout(paso7,1600);} },
    { label: '⚡ 8 A', fn:()=>{addBot(`I = V/R = 12 ÷ 4 = <strong>3 A</strong>. Revisa la división: 12 entre 4.`,300);setTimeout(paso7,1600);} },
  ]);
}

async function paso7(){
  avanzarBarra();
  await addBot(`<strong>Presión y Fluidos</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: submarino con profundidad aumentando y presión indicada con flechas crecientes — fórmula P = F/A y P hidrostática = ρgh]</div><br>
La <strong>presión</strong> es la fuerza por unidad de área: <strong>P = F/A</strong><br>
La presión hidrostática aumenta con la profundidad: P = ρ × g × h<br><br>
¿Por qué un submarino siente mayor presión a mayor profundidad?`, 400);
  mostrarOpciones([
    { label: '🌊 Por la temperatura del agua', fn:()=>{addBot(`La temperatura disminuye con la profundidad, pero no es la causa de la presión. La presión aumenta porque hay más <em>columna de agua</em> encima.`,300);setTimeout(paso8,1600);} },
    { label: '💧 Porque hay más columna de agua encima que ejerce su peso', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Correcto! ✅ <strong>+15 pts.</strong> P = ρgh — a mayor profundidad (h), más agua encima y más presión. Por eso los submarinos tienen cascos muy resistentes.`,300);setTimeout(paso8,1600);} },
    { label: '🐟 Por la densidad de los peces', fn:()=>{addBot(`Los seres vivos no generan la presión del agua. La presión hidrostática depende de la profundidad y la densidad del <em>líquido</em>.`,300);setTimeout(paso8,1600);} },
  ]);
}

async function paso8(){
  avanzarBarra();
  await addBot(`<strong>Movimiento Circular y Gravitación</strong><br><br>
<div class="img-placeholder">📸 [IMAGEN: planeta orbitando el sol con fuerza centrípeta señalada hacia el centro — Ley de Gravitación Universal de Newton]</div><br>
Para que un objeto haga un movimiento circular, necesita una <strong>fuerza centrípeta</strong> — siempre apunta hacia el centro de la trayectoria.<br><br>
En el caso de los planetas orbitando al sol, ¿qué fuerza actúa como fuerza centrípeta?`, 400);
  mostrarOpciones([
    { label: '🚀 La velocidad del planeta', fn:()=>{addBot(`La velocidad es tangencial al círculo, no centrípeta. La fuerza que mantiene la órbita circular es la <strong>gravedad</strong>.`,300);setTimeout(paso9,1600);} },
    { label: '🌟 La gravedad del sol sobre el planeta', fn:()=>{sumarPts(15);avanzarBarra();addBot(`¡Exacto! ✅ <strong>+15 pts.</strong> La <strong>fuerza gravitacional</strong> del sol atrae al planeta hacia el centro y actúa como fuerza centrípeta. Sin ella, el planeta saldría disparado en línea recta (1ª ley de Newton).`,300);setTimeout(paso9,1600);} },
    { label: '💨 La presión del viento solar', fn:()=>{addBot(`El viento solar existe pero es despreciable para mantener órbitas. La fuerza dominante es la <strong>gravedad</strong> según la Ley de Newton de la gravitación universal.`,300);setTimeout(paso9,1600);} },
  ]);
}

async function paso9(){
  avanzarBarra();
  await addBot(`¡Física completada con éxito! ⚡🎉<br><br>
Lo que dominaste:<br><br>
<span class="check">✅</span> <strong>Cinemática:</strong> MRU, MRUV, v = d/t.<br>
<span class="check">✅</span> <strong>Leyes de Newton:</strong> inercia, F=ma, acción-reacción.<br>
<span class="check">✅</span> <strong>Energía:</strong> cinética, potencial, conservación.<br>
<span class="check">✅</span> <strong>Ondas:</strong> v = f × λ.<br>
<span class="check">✅</span> <strong>Calor:</strong> conducción, convección, radiación.<br>
<span class="check">✅</span> <strong>Electricidad:</strong> Ley de Ohm V = IR.<br>
<span class="check">✅</span> <strong>Presión:</strong> P = F/A y presión hidrostática.<br>
<span class="check">✅</span> <strong>Movimiento circular y gravitación.</strong><br><br>

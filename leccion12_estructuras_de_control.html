<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lección 12 · Estructuras de Control — Programa PRI</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06101f;--card:#0d1e38;--purple:#7c3aed;--ps:rgba(124,58,237,.15);--orange:#ff5e00;--teal:#38bdf8;--green:#10b981;--red:#ef4444;--text:#e8f4ff;--muted:#6b9ab8;--border:rgba(255,255,255,.09);}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;padding:1rem;gap:.75rem;max-width:860px;margin:0 auto;}
#topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#prog-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--orange));border-radius:2px;transition:width .5s ease;}
#slide-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
#slide-inner{flex:1;padding:1.6rem 1.8rem;overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-start;gap:.5rem;}#slide-inner>div{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;gap:.6rem;}
#nav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);padding:.55rem 1.4rem;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;}
.nav-btn:hover:not(:disabled){background:var(--purple);border-color:var(--purple);transform:translateY(-1px);}
.nav-btn:disabled{opacity:.25;cursor:not-allowed;}
#dots{display:flex;gap:6px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s;}
.dot.active{background:var(--purple);transform:scale(1.4);}
.s-tag{font-size:.58rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);margin-bottom:.6rem;}
.s-title{font-size:1.75rem;font-weight:900;line-height:1.2;margin-bottom:.4rem;background:linear-gradient(120deg,#fff 30%,var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-sub{font-size:.88rem;color:var(--muted);margin-bottom:1.2rem;}
.formula{background:var(--ps);border:1px solid rgba(124,58,237,.35);border-radius:12px;padding:.9rem 1.4rem;font-size:1.1rem;font-weight:700;text-align:center;color:#c4b5fd;font-family:'Courier New',monospace;margin:.9rem 0;}
.step{display:flex;align-items:flex-start;gap:.7rem;margin:.45rem 0;font-size:.87rem;line-height:1.5;}
.step-n{min-width:26px;height:26px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:1px;}
.q-q{font-size:.93rem;font-weight:600;margin-bottom:.9rem;}
.q-opts{display:flex;flex-direction:column;gap:.38rem;flex:1;}#qw{flex:1;display:flex;flex-direction:column;min-height:0;}
.q-opt{padding:.55rem .9rem;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);cursor:pointer;font-size:.83rem;transition:border-color .2s,box-shadow .2s;text-align:left;color:var(--text);flex:1;display:flex;align-items:center;}
.q-opt:hover:not(.locked){background:rgba(124,58,237,.2);border-color:var(--purple);}
.q-opt.ok{background:rgba(16,185,129,.18);border-color:var(--green);color:#a7f3d0;}
.q-opt.bad{background:rgba(239,68,68,.14);border-color:var(--red);color:#fca5a5;}
.q-fb{margin-top:.65rem;font-size:.82rem;padding:.5rem .75rem;border-radius:8px;display:none;}
.q-fb.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#a7f3d0;display:block;}
.q-fb.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;display:block;}

/* ══ AB-NEON ENGINE ══ */
@keyframes _card-pulse{0%,100%{box-shadow:0 0 30px rgba(124,58,237,.08),inset 0 1px 0 rgba(255,255,255,.03);}50%{box-shadow:0 0 65px rgba(124,58,237,.2),0 0 110px rgba(56,189,248,.05),inset 0 1px 0 rgba(255,255,255,.06);}}
@keyframes _prog-glow{0%,100%{box-shadow:0 0 10px rgba(124,58,237,.6);}50%{box-shadow:0 0 26px rgba(124,58,237,.95),0 0 50px rgba(56,189,248,.22);}}
#slide-card{animation:_card-pulse 3s ease-in-out infinite;border-color:rgba(124,58,237,.3)!important;background:rgba(7,13,27,.96)!important;}
#prog-fill{transition:width .65s cubic-bezier(.34,1.56,.64,1)!important;animation:_prog-glow 2.5s ease-in-out infinite;background:linear-gradient(90deg,#7c3aed,#ff5e00,#38bdf8)!important;}
#prog-track{overflow:visible!important;}
.nav-btn:hover:not(:disabled){box-shadow:0 0 22px rgba(124,58,237,.6)!important;transform:translateY(-2px)!important;}
.dot.active{box-shadow:0 0 10px rgba(124,58,237,.75);background:#7c3aed!important;transform:scale(1.55)!important;}
.step-n{box-shadow:0 0 12px rgba(124,58,237,.5);}
.q-opt:hover:not(.locked){box-shadow:0 0 12px rgba(124,58,237,.22);}
.q-opt.ok{box-shadow:0 0 16px rgba(16,185,129,.28);}
.s-tag{text-shadow:0 0 12px rgba(56,189,248,.55);}
.formula{box-shadow:0 0 22px rgba(124,58,237,.13),inset 0 1px 0 rgba(255,255,255,.04)!important;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span style="font-size:.6rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.22);text-transform:uppercase;">PROGRAMA·PRI · PROGRAMACIÓN</span>
    <span id="counter" style="font-size:.7rem;color:var(--muted);">1 / 5</span>
  </div>
  <div id="prog-track"><div id="prog-fill" style="width:20.00%;"></div></div>
  <div id="slide-card"><div id="slide-inner"></div></div>
  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>← Anterior</button>
    <div id="dots"></div>
    <button class="nav-btn" id="btn-next" onclick="go(1)">Siguiente →</button>
  </div>
</div>
<script>

/* ═══ AB ENGINE v2 ═══ */
var _AB_LOADED=true;
(function(){
  var cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.13;';
  document.body.insertBefore(cv,document.body.firstChild);
  var ap=document.getElementById('app');if(ap){ap.style.position='relative';ap.style.zIndex='1';}
  var ctx=cv.getContext('2d');
  var S=['x','y','a','b','²','³','√','∑','π','+','−','=','(',')','^','n','v','F'];
  var C=['#7c3aed','#38bdf8','#10b981','#ff5e00','#a78bfa'];
  var P=[];
  function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  rsz();window.addEventListener('resize',rsz);
  for(var i=0;i<36;i++)P.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.33,vy:-(Math.random()*.43+.07),
    s:S[Math.floor(Math.random()*S.length)],sz:10+Math.random()*15,
    a:.17+Math.random()*.58,c:C[Math.floor(Math.random()*C.length)],
    rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.011});
  (function tk(){
    ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;
      if(p.y<-30){p.y=cv.height+20;p.x=Math.random()*cv.width;}
      if(p.x<-20)p.x=cv.width+20;if(p.x>cv.width+20)p.x=-20;
      ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.c;
      ctx.font='bold '+p.sz+'px Courier New';
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillText(p.s,0,0);ctx.restore();
    });requestAnimationFrame(tk);
  })();
})();
function burst(el,color,count){
  count=count||12;if(!el||!el.getBoundingClientRect)return;
  var r=el.getBoundingClientRect();
  var cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(var i=0;i<count;i++){
    var p=document.createElement('div');var sz=3+Math.random()*7;
    p.style.cssText='position:fixed;left:'+cx+'px;top:'+cy+'px;width:'+sz+'px;height:'+sz+'px;background:'+color+';border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);';
    document.body.appendChild(p);
    var ang=Math.random()*Math.PI*2,d=35+Math.random()*75;
    (function(el_){gsap.to(el_,{x:Math.cos(ang)*d,y:Math.sin(ang)*d-Math.random()*25,opacity:0,scale:0,duration:.5+Math.random()*.45,ease:'power2.out',onComplete:function(){el_.remove();}});})(p);
  }
}

const TOTAL=5;let cur=0,busy=false;const qAns=[null,null,null];
const quiz=[
  {q:"¿Qué ejecuta el bloque 'else'?",opts:["Siempre","Cuando if es true","Cuando if es false","Nunca"],ok:2,fb:"else se ejecuta cuando la condición del if es FALSE ✓"},
  {q:"for(let i=0;i<3;i++) — ¿cuántas veces se ejecuta?",opts:["2","3","4","0"],ok:1,fb:"i=0,1,2 → 3 iteraciones (i<3 es false cuando i=3) ✓"},
  {q:"¿Cuál es la diferencia entre for y while?",opts:["No hay diferencia","for=N veces contadas, while=hasta condición","while es más rápido","for no tiene condición"],ok:1,fb:"for para repeticiones contadas; while cuando no sabes cuántas veces ✓"},
];
function s0(el){el.innerHTML=`<div style="text-align:center;padding:.5rem 0;"><div class="s-tag">Lección 12 · PROGRAMACIÓN</div><div class="s-title" id="t0" style="font-size:1.9rem;">Estructuras de Control</div><div class="s-sub" id="s0">Condicionales If-Else y ciclos For/While con ejemplos visuales</div><div id="i0" style="font-size:2.4rem;margin:1rem 0;">🔀 🔁 ⚡</div></div>`;}
function a0(){gsap.timeline().from('#t0',{y:-60,rotation:-3,opacity:0,duration:.65,ease:'elastic.out(1,.5)'}).from('#s0',{y:-22,opacity:0,duration:.42,ease:'power2.out'},'-=.28').from('#i0',{scale:.15,rotation:-22,opacity:0,duration:.68,ease:'elastic.out(1,.45)'});}
function s1(el){el.innerHTML=`<div><div class="s-tag">Condicional</div><div class="s-title" id="t1">If - Else: El Decisor</div><div class="s-sub">Ejecuta código DIFERENTE según si una condición es verdadera o falsa</div><div class="formula" id="f1">if (condición) { ...verdadero } else { ...falso }</div><div id="st0_0" class="step"><div class="step-n">1</div><div><strong>If</strong><br>Si la condición es TRUE, ejecuta el bloque dentro del if<br><span style="color:var(--muted);font-size:.8rem;">if (nota >= 60) { aprobo = true }</span></div></div><div id="st0_1" class="step"><div class="step-n">2</div><div><strong>Else</strong><br>Si la condición es FALSE, ejecuta el bloque del else<br><span style="color:var(--muted);font-size:.8rem;">else { aprobo = false }</span></div></div><div id="st0_2" class="step"><div class="step-n">3</div><div><strong>Else if</strong><br>Para múltiples condiciones encadenadas<br><span style="color:var(--muted);font-size:.8rem;">if(A) ... else if(B) ... else ...</span></div></div></div>`;}
function a1(){gsap.timeline().from('#t1',{y:-52,rotation:-3,opacity:0,duration:.6,ease:'elastic.out(1,.5)'}).from('#f1',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1').from(['#st0_0','#st0_1','#st0_2'],{x:-38,opacity:0,duration:.4,stagger:.17,ease:'back.out(2)'});}
function s2(el){el.innerHTML=`<div><div class="s-tag">For</div><div class="s-title" id="t2">Ciclo For: Repetición Contada</div><div class="s-sub">Repite un bloque un número determinado de veces</div><div class="formula" id="f2">for (inicio; condición; incremento) { ... }</div><div id="st1_0" class="step"><div class="step-n">1</div><div><strong>Estructura</strong><br>for(let i=0; i<10; i++) — comienza en 0, termina antes de 10, salta de 1 en 1<br><span style="color:var(--muted);font-size:.8rem;">i es el contador: 0,1,2,3...9 = 10 veces</span></div></div><div id="st1_1" class="step"><div class="step-n">2</div><div><strong>Uso típico</strong><br>Recorrer listas, repetir N veces una operación, generar tablas<br><span style="color:var(--muted);font-size:.8rem;">for(i=1;i<=10;i++) console.log(i*7) — tabla del 7</span></div></div><div id="st1_2" class="step"><div class="step-n">3</div><div><strong>Cuidado</strong><br>El ciclo for puede causar bucle infinito si la condición nunca es falsa<br><span style="color:var(--muted);font-size:.8rem;">for(;;) corre para siempre — ¡bug!</span></div></div></div>`;}
function a2(){gsap.timeline().from('#t2',{y:-52,rotation:-3,opacity:0,duration:.6,ease:'elastic.out(1,.5)'}).from('#f2',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1').from(['#st1_0','#st1_1','#st1_2'],{x:-38,opacity:0,duration:.4,stagger:.17,ease:'back.out(2)'});}
function s3(el){el.innerHTML=`<div><div class="s-tag">While</div><div class="s-title" id="t3">Ciclo While: Repetición Condicional</div><div class="s-sub">Repite mientras una condición sea verdadera — no sabes cuántas veces</div><div class="formula" id="f3">while (condición) { ...código... }</div><div id="st2_0" class="step"><div class="step-n">1</div><div><strong>Diferencia</strong><br>while no sabe cuántas veces repetirá — depende de que la condición sea false<br><span style="color:var(--muted);font-size:.8rem;">for = N veces exactas; while = hasta que algo cambie</span></div></div><div id="st2_1" class="step"><div class="step-n">2</div><div><strong>Ejemplo</strong><br>while(saldo>0) { gastar(); } — gasta mientras haya dinero<br><span style="color:var(--muted);font-size:.8rem;">¡Verificar que la condición eventualmente sea false!</span></div></div><div id="st2_2" class="step"><div class="step-n">3</div><div><strong>Do-While</strong><br>do { ...código... } while(condición) — ejecuta AL MENOS una vez<br><span style="color:var(--muted);font-size:.8rem;">La diferencia: comprueba la condición al final</span></div></div></div>`;}
function a3(){gsap.timeline().from('#t3',{y:-52,rotation:-3,opacity:0,duration:.6,ease:'elastic.out(1,.5)'}).from('#f3',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1').from(['#st2_0','#st2_1','#st2_2'],{x:-38,opacity:0,duration:.4,stagger:.17,ease:'back.out(2)'});}
function s4(el){el.innerHTML=`<div><div class="s-tag">Mini Quiz · 3 Preguntas</div><div class="s-title" id="t4">¿Cuánto aprendiste?</div><div id="qw"></div><div id="qf" style="display:none;text-align:center;padding:.8rem 0;"><div id="qs" style="font-size:2.6rem;font-weight:900;margin-bottom:.35rem;"></div><div id="qm" style="color:var(--muted);font-size:.88rem;margin-bottom:.9rem;"></div><button onclick="rQ()" style="background:var(--purple);border:none;color:#fff;padding:.5rem 1.3rem;border-radius:9px;font-size:.82rem;font-weight:700;cursor:pointer;">🔄 Reintentar</button></div></div>`;rQ2(0);}
function a4(){gsap.from('#t4',{y:-52,rotation:-3,opacity:0,duration:.6,ease:'elastic.out(1,.5)'});}
function render(){[s0,s1,s2,s3,s4][cur](document.getElementById('slide-inner'));}
function anim(){[a0,a1,a2,a3,a4][cur]();}
function go(d){if(busy)return;const n=cur+d;if(n<0||n>=TOTAL)return;busy=true;const el=document.getElementById('slide-inner');gsap.to(el,{opacity:0,x:d<0?65:-65,scale:.94,duration:.28,ease:'power3.in',onComplete:()=>{cur=n;upd();render();gsap.fromTo(el,{opacity:0,x:d<0?-65:65,scale:.94},{opacity:1,x:0,scale:1,duration:.38,ease:'power3.out',onComplete:()=>{anim();busy=false;}});}});}
function upd(){document.getElementById('counter').textContent=`${cur+1} / 5`;document.getElementById('prog-fill').style.width=`${((cur+1)/5)*100}%`;document.getElementById('btn-prev').disabled=cur===0;document.getElementById('btn-next').disabled=cur===TOTAL-1;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));}
function mkDots(){const c=document.getElementById('dots');for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.onclick=()=>{if(!busy){const dr=i-cur;if(!dr)return;cur=i-dr;go(dr);}};c.appendChild(d);}}
function rQ2(i){if(i>=quiz.length){setTimeout(showSc,400);return;}const q=quiz[i];const w=document.getElementById('qw');if(!w)return;w.innerHTML=`<div style="font-size:.68rem;color:var(--muted);margin-bottom:.4rem;">Pregunta ${i+1} de ${quiz.length}</div><div class="q-q">${q.q}</div><div class="q-opts" id="qo${i}">${q.opts.map((o,j)=>`<button class="q-opt" onclick="ansQ(${i},${j})" id="qo${i}-${j}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}</div><div class="q-fb" id="qf${i}"></div>`;gsap.from('.q-opt',{y:20,duration:.3,stagger:.07,ease:'back.out(2)'});}
function ansQ(qi,oi){if(qAns[qi]!==null)return;qAns[qi]=oi;const q=quiz[qi];document.querySelectorAll(`#qo${qi} .q-opt`).forEach((b,i)=>{b.classList.add('locked');b.style.pointerEvents='none';if(i===q.ok)b.classList.add('ok');else if(i===oi)b.classList.add('bad');});const fb=document.getElementById(`qf${qi}`);if(fb){fb.className='q-fb '+(oi===q.ok?'ok':'bad');fb.textContent=(oi===q.ok?'✅ ':'❌ ')+q.fb;}var _b=document.getElementById('qo'+qi+'-'+oi);if(oi===q.ok){if(_b){burst(_b,'#10b981',16);gsap.from(_b,{scale:1.1,duration:.4,ease:'elastic.out(1,.4)'});}}else if(_b){gsap.to(_b,{keyframes:[{x:-5},{x:5},{x:-4},{x:4},{x:0}],duration:.4,ease:'none'});}setTimeout(()=>rQ2(qi+1),2100);}
function showSc(){const ok=qAns.filter((a,i)=>a===quiz[i].ok).length;const w=document.getElementById('qw');const f=document.getElementById('qf');if(w)w.innerHTML='';if(f){f.style.display='block';const e=ok===quiz.length?'🏆':ok>=2?'⭐':'📚';document.getElementById('qs').textContent=`${e} ${ok}/${quiz.length}`;document.getElementById('qm').textContent=ok===quiz.length?'¡Perfecto!':ok>=2?'¡Bien! Sigue practicando.':'Repasa la lección.';gsap.from('#qf',{scale:.55,rotation:-6,opacity:0,duration:.72,ease:'elastic.out(1,.42)'});if(ok===quiz.length){var _cc=['#7c3aed','#38bdf8','#10b981','#ff5e00','#fbbf24'];for(var _ii=0;_ii<22;_ii++)(function(_n){setTimeout(function(){var _pp={getBoundingClientRect:function(){return{left:window.innerWidth*.3+Math.random()*window.innerWidth*.4,top:window.innerHeight*.25,width:0,height:0};}};burst(_pp,_cc[_n%_cc.length],5);},_n*88);}(_ii));}}}
function rQ(){qAns.fill(null);document.getElementById('qf').style.display='none';rQ2(0);}
mkDots();render();anim();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lección 13 · Variables y Estructuras — Programa PRI</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06101f;--card:#0d1e38;--purple:#7c3aed;--ps:rgba(124,58,237,.15);--orange:#ff5e00;--teal:#38bdf8;--green:#10b981;--red:#ef4444;--text:#e8f4ff;--muted:#6b9ab8;--border:rgba(255,255,255,.09);}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;padding:1rem;gap:.75rem;max-width:860px;margin:0 auto;}
#topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#prog-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--orange));border-radius:2px;transition:width .5s ease;}
#slide-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
#slide-inner{flex:1;padding:2rem;overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-start;}
#nav{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);padding:.55rem 1.4rem;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;}
.nav-btn:hover:not(:disabled){background:var(--purple);border-color:var(--purple);transform:translateY(-1px);}
.nav-btn:disabled{opacity:.25;cursor:not-allowed;}
#dots{display:flex;gap:6px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s;}
.dot.active{background:var(--purple);transform:scale(1.4);}
.s-tag{font-size:.58rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);margin-bottom:.6rem;}
.s-title{font-size:1.75rem;font-weight:900;line-height:1.2;margin-bottom:.4rem;background:linear-gradient(120deg,#fff 30%,var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-sub{font-size:.88rem;color:var(--muted);margin-bottom:1.2rem;}
.formula{background:var(--ps);border:1px solid rgba(124,58,237,.35);border-radius:12px;padding:.9rem 1.4rem;font-size:1.1rem;font-weight:700;text-align:center;color:#c4b5fd;font-family:'Courier New',monospace;margin:.9rem 0;}
.step{display:flex;align-items:flex-start;gap:.7rem;margin:.45rem 0;font-size:.87rem;line-height:1.5;}
.step-n{min-width:26px;height:26px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:1px;}
.q-q{font-size:.93rem;font-weight:600;margin-bottom:.9rem;}
.q-opts{display:flex;flex-direction:column;gap:.45rem;}
.q-opt{padding:.65rem 1rem;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);cursor:pointer;font-size:.84rem;transition:all .2s;text-align:left;color:var(--text);}
.q-opt:hover:not(.locked){background:rgba(124,58,237,.2);border-color:var(--purple);}
.q-opt.ok{background:rgba(16,185,129,.18);border-color:var(--green);color:#a7f3d0;}
.q-opt.bad{background:rgba(239,68,68,.14);border-color:var(--red);color:#fca5a5;}
.q-fb{margin-top:.65rem;font-size:.82rem;padding:.5rem .75rem;border-radius:8px;display:none;}
.q-fb.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#a7f3d0;display:block;}
.q-fb.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;display:block;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span style="font-size:.6rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.22);text-transform:uppercase;">PROGRAMA·PRI · PROGRAMACIÓN</span>
    <span id="counter" style="font-size:.7rem;color:var(--muted);">1 / 5</span>
  </div>
  <div id="prog-track"><div id="prog-fill" style="width:20.00%;"></div></div>
  <div id="slide-card"><div id="slide-inner"></div></div>
  <div id="nav">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)" disabled>← Anterior</button>
    <div id="dots"></div>
    <button class="nav-btn" id="btn-next" onclick="go(1)">Siguiente →</button>
  </div>
</div>
<script>
const TOTAL=5;let cur=0,busy=false;const qAns=[null,null,null];
const quiz=[
  {q:"Sea arr=[5,10,15]. ¿Qué devuelve arr[1]?",opts:["5","10","15","undefined"],ok:1,fb:"Índice 0=5, índice 1=10, índice 2=15 → arr[1]=10 ✓"},
  {q:"¿Cuál es la diferencia entre let y const?",opts:["No hay diferencia","let permite reasignar, const no","const es más rápido","let solo acepta números"],ok:1,fb:"let puede reasignarse; const es constante — no cambia ✓"},
  {q:"Sea obj={x:3,y:4}. ¿Cómo accedo a y?",opts:["obj[1]","obj.y","obj->y","obj(y)"],ok:1,fb:"Notación de punto: obj.y → 4 ✓"},
];
function s0(el){el.innerHTML=`<div style="text-align:center;padding:.5rem 0;"><div class="s-tag">Lección 13 · PROGRAMACIÓN</div><div class="s-title" id="t0" style="font-size:1.9rem;">Variables y Estructuras</div><div class="s-sub" id="s0">Variables, listas, arreglos y cómo se almacena la información</div><div id="i0" style="font-size:2.4rem;margin:1rem 0;">📦 🗂️ 💾</div></div>`;}
function a0(){gsap.timeline().from('#t0',{y:-35,opacity:0,duration:.6,ease:'power3.out'}).from('#s0',{y:-18,opacity:0,duration:.4},'-=.2').from('#i0',{scale:.2,opacity:0,duration:.5,ease:'back.out(2)'});}
function s1(el){el.innerHTML=`<div><div class="s-tag">Variables</div><div class="s-title" id="t1">Variables: Cajitas de Memoria</div><div class="s-sub">Un nombre que guarda un valor que puede cambiar</div><div class="formula" id="f1">tipo nombre = valor  →  let edad = 17</div><div id="st0_0" class="step"><div class="step-n">1</div><div><strong>Declaración</strong><br>Crear la variable y reservar espacio en memoria<br><span style="color:var(--muted);font-size:.8rem;">let precio = 1500  /  const PI = 3.14</span></div></div><div id="st0_1" class="step"><div class="step-n">2</div><div><strong>Tipos básicos</strong><br>Number (números), String (texto), Boolean (verdadero/falso), null/undefined<br><span style="color:var(--muted);font-size:.8rem;">let nombre='Ana'; let activo=true; let puntos=95</span></div></div><div id="st0_2" class="step"><div class="step-n">3</div><div><strong>Constante</strong><br>const — el valor NO puede cambiar después de ser asignado<br><span style="color:var(--muted);font-size:.8rem;">const GRAVEDAD = 9.8 — no cambia nunca</span></div></div></div>`;}
function a1(){gsap.timeline().from('#t1',{y:-28,opacity:0,duration:.5}).from('#f1',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1').from(['#st0_0','#st0_1','#st0_2'],{x:-25,opacity:0,duration:.35,stagger:.18});}
function s2(el){el.innerHTML=`<div><div class="s-tag">Arreglos</div><div class="s-title" id="t2">Arrays/Listas: Colección Ordenada</div><div class="s-sub">Guardar múltiples valores en una sola variable, accedidos por índice</div><div class="formula" id="f2">let lista = [10, 20, 30]  →  lista[0] = 10</div><div id="st1_0" class="step"><div class="step-n">1</div><div><strong>Índice</strong><br>Los arreglos empiezan en el índice 0, no en 1<br><span style="color:var(--muted);font-size:.8rem;">lista[0]=primer elemento, lista[1]=segundo...</span></div></div><div id="st1_1" class="step"><div class="step-n">2</div><div><strong>Longitud</strong><br>lista.length devuelve cuántos elementos tiene<br><span style="color:var(--muted);font-size:.8rem;">[10,20,30].length = 3</span></div></div><div id="st1_2" class="step"><div class="step-n">3</div><div><strong>Métodos</strong><br>push(añadir al final), pop(quitar del final), indexOf, slice, sort<br><span style="color:var(--muted);font-size:.8rem;">lista.push(40) → [10,20,30,40]</span></div></div></div>`;}
function a2(){gsap.timeline().from('#t2',{y:-28,opacity:0,duration:.5}).from('#f2',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1').from(['#st1_0','#st1_1','#st1_2'],{x:-25,opacity:0,duration:.35,stagger:.18});}
function s3(el){el.innerHTML=`<div><div class="s-tag">Objetos</div><div class="s-title" id="t3">Objetos: Colección de Propiedades</div><div class="s-sub">Agrupar datos relacionados en un solo objeto con nombre:valor</div><div class="formula" id="f3">let alumno = {nombre:'Ana', nota:95, aprobó:true}</div><div id="st2_0" class="step"><div class="step-n">1</div><div><strong>Acceso</strong><br>alumno.nombre → 'Ana'  /  alumno['nota'] → 95<br><span style="color:var(--muted);font-size:.8rem;">Punto o corchetes para acceder a propiedades</span></div></div><div id="st2_1" class="step"><div class="step-n">2</div><div><strong>Mutación</strong><br>alumno.nota = 100 — se puede cambiar el valor<br><span style="color:var(--muted);font-size:.8rem;">Los objetos son mutables por defecto</span></div></div><div id="st2_2" class="step"><div class="step-n">3</div><div><strong>Arrays de objetos</strong><br>[{nombre:'Ana'}, {nombre:'Luis'}] — lista de objetos<br><span style="color:var(--muted);font-size:.8rem;">La estructura más común en aplicaciones reales</span></div></div></div>`;}
function a3(){gsap.timeline().from('#t3',{y:-28,opacity:0,duration:.5}).from('#f3',{scale:.85,opacity:0,duration:.45,ease:'back.out(1.7)'},'-=.1').from(['#st2_0','#st2_1','#st2_2'],{x:-25,opacity:0,duration:.35,stagger:.18});}
function s4(el){el.innerHTML=`<div><div class="s-tag">Mini Quiz · 3 Preguntas</div><div class="s-title" id="t4">¿Cuánto aprendiste?</div><div id="qw"></div><div id="qf" style="display:none;text-align:center;padding:.8rem 0;"><div id="qs" style="font-size:2.6rem;font-weight:900;margin-bottom:.35rem;"></div><div id="qm" style="color:var(--muted);font-size:.88rem;margin-bottom:.9rem;"></div><button onclick="rQ()" style="background:var(--purple);border:none;color:#fff;padding:.5rem 1.3rem;border-radius:9px;font-size:.82rem;font-weight:700;cursor:pointer;">🔄 Reintentar</button></div></div>`;rQ2(0);}
function a4(){gsap.from('#t4',{y:-28,opacity:0,duration:.5});}
function render(){[s0,s1,s2,s3,s4][cur](document.getElementById('slide-inner'));}
function anim(){[a0,a1,a2,a3,a4][cur]();}
function go(d){if(busy)return;const n=cur+d;if(n<0||n>=TOTAL)return;busy=true;const el=document.getElementById('slide-inner');gsap.to(el,{opacity:0,x:d<0?50:-50,duration:.28,ease:'power2.in',onComplete:()=>{cur=n;upd();render();gsap.fromTo(el,{opacity:0,x:d<0?-50:50},{opacity:1,x:0,duration:.35,ease:'power2.out',onComplete:()=>{anim();busy=false;}});}});}
function upd(){document.getElementById('counter').textContent=`${cur+1} / 5`;document.getElementById('prog-fill').style.width=`${((cur+1)/5)*100}%`;document.getElementById('btn-prev').disabled=cur===0;document.getElementById('btn-next').disabled=cur===TOTAL-1;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));}
function mkDots(){const c=document.getElementById('dots');for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.onclick=()=>{if(!busy){const dr=i-cur;if(!dr)return;cur=i-dr;go(dr);}};c.appendChild(d);}}
function rQ2(i){if(i>=quiz.length){setTimeout(showSc,400);return;}const q=quiz[i];const w=document.getElementById('qw');if(!w)return;w.innerHTML=`<div style="font-size:.68rem;color:var(--muted);margin-bottom:.4rem;">Pregunta ${i+1} de ${quiz.length}</div><div class="q-q">${q.q}</div><div class="q-opts" id="qo${i}">${q.opts.map((o,j)=>`<button class="q-opt" onclick="ansQ(${i},${j})" id="qo${i}-${j}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}</div><div class="q-fb" id="qf${i}"></div>`;gsap.from('.q-opt',{y:6,duration:.22,ease:'power2.out'});}
function ansQ(qi,oi){if(qAns[qi]!==null)return;qAns[qi]=oi;const q=quiz[qi];document.querySelectorAll(`#qo${qi} .q-opt`).forEach((b,i)=>{b.classList.add('locked');b.style.pointerEvents='none';if(i===q.ok)b.classList.add('ok');else if(i===oi)b.classList.add('bad');});const fb=document.getElementById(`qf${qi}`);if(fb){fb.className='q-fb '+(oi===q.ok?'ok':'bad');fb.textContent=(oi===q.ok?'✅ ':'❌ ')+q.fb;}setTimeout(()=>rQ2(qi+1),2100);}
function showSc(){const ok=qAns.filter((a,i)=>a===quiz[i].ok).length;const w=document.getElementById('qw');const f=document.getElementById('qf');if(w)w.innerHTML='';if(f){f.style.display='block';const e=ok===quiz.length?'🏆':ok>=2?'⭐':'📚';document.getElementById('qs').textContent=`${e} ${ok}/${quiz.length}`;document.getElementById('qm').textContent=ok===quiz.length?'¡Perfecto!':ok>=2?'¡Bien! Sigue practicando.':'Repasa la lección.';gsap.from('#qf',{scale:.8,opacity:0,duration:.45,ease:'back.out(1.7)'});}}
function rQ(){qAns.fill(null);document.getElementById('qf').style.display='none';rQ2(0);}
mkDots();render();anim();
</script>
</body>
</html>

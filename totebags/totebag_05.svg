<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="220" fill="#3b1f00" opacity="0.1"/>

  <!-- Ilustración -->
  <g transform="scale(0.85) translate(12,10)">
    <!-- Atardecer tumaqueño grande -->
<path d="M20,160 Q80,110 130,115 Q155,118 180,128 L180,160 Z" fill="#7c3aed" opacity="0.6"/>
<circle cx="100" cy="110" r="32" fill="#f97316" opacity="0.9"/>
<path d="M20,135 Q80,112 180,130 L180,160 L20,160 Z" fill="#ea580c" opacity="0.7"/>
<path d="M20,148 Q80,128 180,143 L180,160 L20,160 Z" fill="#c2410c" opacity="0.6"/>
<ellipse cx="100" cy="110" rx="32" ry="12" fill="#fbbf24" opacity="0.5"/>
<path d="M75,145 Q80,128 83,136 Q87,122 92,130 Q97,120 100,126 Q103,120 108,130 Q113,122 117,136 Q120,128 125,145 Z" fill="#1a0a00" opacity="0.7"/>
  </g>

  <!-- Logo PRI -->
  <image href="../logo.png" x="168" y="6" width="26" height="26"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior -->
  <rect x="0" y="162" width="200" height="58" fill="#3b1f00" opacity="0.55"/>

  <!-- Programa PRI -->
  <text x="100" y="175" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="8"
        fill="#fb923c" letter-spacing="2" opacity="0.8">PROGRAMA PRI</text>
  <text x="100" y="186" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-size="7" font-weight="600"
        fill="#fff7ed" letter-spacing="1" opacity="0.8">EL PACÍFICO RENACIENDO CON INGENIERÍA</text>

  <!-- Título -->
  <text x="100" y="202" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="13"
        fill="#fb923c" letter-spacing="2" opacity="1">ATARDECER TUMAQUEÑO</text>
  <text x="100" y="214" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-size="8" font-weight="600"
        fill="#fff7ed" letter-spacing="1" opacity="0.85">Colores del Pacífico</text>
</svg>
<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="220" fill="#1f2937" opacity="0.1"/>

  <!-- Ilustración -->
  <g transform="scale(0.85) translate(12,10)">
    <!-- Marimba grande -->
<rect x="42" y="90" width="16" height="55" rx="3" fill="#92400e" opacity="0.85"/>
<rect x="63" y="82" width="16" height="63" rx="3" fill="#b45309" opacity="0.85"/>
<rect x="84" y="72" width="16" height="73" rx="3" fill="#92400e" opacity="0.85"/>
<rect x="105" y="80" width="16" height="65" rx="3" fill="#b45309" opacity="0.85"/>
<rect x="126" y="88" width="16" height="57" rx="3" fill="#92400e" opacity="0.85"/>
<rect x="147" y="95" width="16" height="50" rx="3" fill="#b45309" opacity="0.85"/>
<circle cx="50" cy="85" r="7" fill="#fbbf24" opacity="0.8"/>
<circle cx="71" cy="76" r="7" fill="#f59e0b" opacity="0.8"/>
<circle cx="92" cy="66" r="7" fill="#fbbf24" opacity="0.8"/>
<circle cx="113" cy="74" r="7" fill="#f59e0b" opacity="0.8"/>
<circle cx="134" cy="82" r="7" fill="#fbbf24" opacity="0.8"/>
<circle cx="155" cy="89" r="7" fill="#f59e0b" opacity="0.8"/>
  </g>

  <!-- Logo PRI -->
  <image href="../logo.png" x="168" y="6" width="26" height="26"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior -->
  <rect x="0" y="162" width="200" height="58" fill="#1f2937" opacity="0.55"/>

  <!-- Programa PRI -->
  <text x="100" y="175" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="8"
        fill="#f9a8d4" letter-spacing="2" opacity="0.8">PROGRAMA PRI</text>
  <text x="100" y="186" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-size="7" font-weight="600"
        fill="#fce7f3" letter-spacing="1" opacity="0.8">EL PACÍFICO RENACIENDO CON INGENIERÍA</text>

  <!-- Título -->
  <text x="100" y="202" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="13"
        fill="#f9a8d4" letter-spacing="2" opacity="1">MARIMBA Y CULTURA</text>
  <text x="100" y="214" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-size="8" font-weight="600"
        fill="#fce7f3" letter-spacing="1" opacity="0.85">Patrimonio Pacífico</text>
</svg>
<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="220" fill="#0a3d6b" opacity="0.1"/>

  <!-- Ilustración -->
  <g transform="scale(0.85) translate(12,10)">
    <!-- Morro de Tumaco -->
<path d="M30,140 Q80,100 100,80 Q120,100 170,140 Z" fill="#1e3a5f" opacity="0.8"/>
<path d="M75,140 Q90,120 100,108 Q110,120 125,140 Z" fill="#0f2340" opacity="0.9"/>
<path d="M30,140 L170,140" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
<circle cx="100" cy="65" r="22" fill="#f97316" opacity="0.85"/>
<path d="M40,110 Q70,90 100,95 Q130,90 160,110" stroke="#f97316" stroke-width="2" fill="none" opacity="0.5"/>
<path d="M30,125 Q80,108 100,115 Q120,108 170,125" stroke="#fb923c" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- Logo PRI -->
  <image href="../logo.png" x="168" y="6" width="26" height="26"
         opacity="0.65" preserveAspectRatio="xMidYMid meet"/>

  <!-- Banda inferior -->
  <rect x="0" y="162" width="200" height="58" fill="#0a3d6b" opacity="0.55"/>

  <!-- Programa PRI -->
  <text x="100" y="175" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="8"
        fill="#38bdf8" letter-spacing="2" opacity="0.8">PROGRAMA PRI</text>
  <text x="100" y="186" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-size="7" font-weight="600"
        fill="#e0f2fe" letter-spacing="1" opacity="0.8">EL PACÍFICO RENACIENDO CON INGENIERÍA</text>

  <!-- Título -->
  <text x="100" y="202" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="13"
        fill="#38bdf8" letter-spacing="2" opacity="1">MORRO DE TUMACO</text>
  <text x="100" y="214" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-size="8" font-weight="600"
        fill="#e0f2fe" letter-spacing="1" opacity="0.85">Símbolo de identidad</text>
</svg>
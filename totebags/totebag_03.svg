<path d="M60,58 Q48,44 40,38 M60,58 Q55,42 62,34" stroke="#15803d" stroke-width="2.5" fill="none"/>
<path d="M138,55 Q148,42 155,36 M138,55 Q148,45 155,50" stroke="#15803d" stroke-width="2.5" fill="none"/>
<ellipse cx="130" cy="76" rx="10" ry="7" fill="#4ade80" opacity="0.7"/>
<ellipse cx="72" cy="72" rx="9" ry="6" fill="#86efac" opacity="0.6"/>
<path d="M50,160 Q75,145 100,150 Q125,145 150,160 Z" fill="#14532d" opacity="0.5"/>
